<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Linkedinmatic - Programador en Tiempo Real</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: { 'sans': ['Outfit', 'sans-serif'] },
                    colors: {
                        base: '#030712',
                        surface: '#111827',
                        surfaceLight: '#1f2937',
                        accent: '#38bdf8',
                        secondary: '#818cf8'
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .glass { @apply bg-surface/40 backdrop-blur-xl border border-white/5 shadow-2xl; }
            .glass-card { @apply bg-surfaceLight/30 backdrop-blur-md border border-white/10 rounded-3xl shadow-lg transition-all duration-300; }
            .text-gradient { @apply bg-clip-text text-transparent bg-gradient-to-r from-accent to-secondary; }
            .hide-scrollbar::-webkit-scrollbar { display: none; }
        }
        body { @apply bg-base text-gray-100 font-sans; }
    </style>
</head>

<body class="w-full min-h-screen flex items-center justify-center relative p-4">
    <div class="relative z-10 w-full md:w-[400px] h-[800px] md:max-h-[90vh] md:rounded-[40px] md:border-[8px] md:border-gray-900 md:shadow-2xl overflow-hidden bg-base flex flex-col">
        
        <!-- Header -->
        <header class="glass w-full px-6 py-5 flex justify-between items-center z-20">
            <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-surfaceLight/50 flex items-center justify-center border border-white/5 hover:bg-white/10 transition-colors">
                <span class="material-symbols-rounded text-gray-300 text-xl">arrow_back</span>
            </button>
            <div class="text-center">
                <h1 class="text-lg font-bold tracking-wide">TASK<span class="text-gradient">MASTER</span></h1>
                <p class="text-[10px] text-accent uppercase tracking-[0.2em] font-bold">v3.0 Cloud Sync</p>
            </div>
            <div class="w-10 h-10"></div>
        </header>

        <main class="flex-1 overflow-y-auto hide-scrollbar px-5 py-6 flex flex-col gap-6">
            
            <!-- Programar Post -->
            <section class="flex flex-col gap-3">
                <label class="text-xs uppercase tracking-[0.15em] text-gray-400 font-bold flex items-center gap-2">
                    <span class="material-symbols-rounded text-[18px] text-accent">add_circle</span>
                    Programar Post de IA
                </label>
                
                <div class="glass-card p-5 flex flex-col gap-4">
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-bold mb-1 block">Borrador Detectado</label>
                        <select id="post-select" class="w-full bg-surface border border-white/10 rounded-xl px-4 py-2 text-sm text-gray-200 outline-none focus:border-accent">
                            <option value="">Cargando borradores...</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase font-bold mb-1 block">Fecha</label>
                            <input type="date" id="schedule-date" class="w-full bg-surface border border-white/10 rounded-xl px-4 py-2 text-sm text-gray-200 outline-none focus:border-accent">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase font-bold mb-1 block">Hora</label>
                            <input type="time" id="schedule-time" class="w-full bg-surface border border-white/10 rounded-xl px-4 py-2 text-sm text-gray-200 outline-none focus:border-accent">
                        </div>
                    </div>

                    <button onclick="scheduleCloud()" id="btn-schedule" class="w-full h-12 rounded-xl bg-gradient-to-r from-accent to-secondary text-white font-bold text-xs tracking-widest uppercase flex items-center justify-center gap-2 shadow-lg hover:scale-[1.02] transition-transform">
                        <span class="material-symbols-rounded">cloud_upload</span>
                        Enviar a la Nube (Google)
                    </button>
                    <p id="size-hint" class="text-[9px] text-center text-gray-500 italic">Sincronizando imagen generada por Google...</p>
                </div>
            </section>

            <!-- Lista Programada -->
            <section class="flex flex-col gap-3">
                <label class="text-xs uppercase tracking-[0.15em] text-gray-400 font-bold flex items-center gap-2">
                    <span class="material-symbols-rounded text-[18px] text-secondary">cloud_done</span>
                    Publicaciones Agendadas
                </label>
                <div id="schedule-list" class="flex flex-col gap-3 pb-8">
                    <p class="text-center text-xs text-gray-500 py-4">Sincronizando con Drive...</p>
                </div>
            </section>
        </main>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxgYPVfo1XM0Q309jIkYeDD6lSIbOnr1DNLh_9CccQdzl_xiAnKw_77-uQFRq5ghFnBBA/exec";
        
        window.addEventListener('DOMContentLoaded', () => {
            loadDrafts();
            refreshQueue(); 
        });

        // 1. CARGAR BORRADORES (Saca la imagen Base64 del LocalStorage si ya la tienes de la pantalla anterior)
        function loadDrafts() {
            const select = document.getElementById('post-select');
            select.innerHTML = '';

            // Revisar si venimos de generar imagen de Google
            const comingFromImage = localStorage.getItem('scheduling_complete_post') === 'true';
            const rawBase64Image = localStorage.getItem('linkedin_confirmed_img'); // En tu app esta es la imagen Real de Google
            const postText = localStorage.getItem('linkedin_current_text') || localStorage.getItem('linkedin_v2_text');

            if (comingFromImage && postText) {
                const opt = document.createElement('option');
                opt.value = "current_draft"; // Referencia interna
                opt.textContent = `[FOTO GOOGLE] ${postText.split('\n')[0].substring(0, 35)}...`;
                select.appendChild(opt);
                return;
            }

            // Fallback: Borrador de texto simple v2
            const current = localStorage.getItem('linkedin_v2_text') || localStorage.getItem('linkedin_current_text');
            if (current) {
                const opt = document.createElement('option');
                opt.value = "text_only";
                opt.textContent = current.split('\n')[0].substring(0, 40) + '...';
                select.appendChild(opt);
            } else {
                const opt = document.createElement('option');
                opt.textContent = "Sin borradores";
                select.appendChild(opt);
            }
        }

        // 2. ENVIAR A GOOGLE DRIVE (LA COLA REAL)
        async function scheduleCloud() {
            const date = document.getElementById('schedule-date').value;
            const time = document.getElementById('schedule-time').value;

            if (!date || !time) {
                alert("Completa la fecha y hora.");
                return;
            }

            const btn = document.getElementById('btn-schedule');
            btn.disabled = true;
            btn.textContent = "SUBIENDO IMAGEN DE GOOGLE...";

            // Recuperar DATOS REALES (Base64) de la imagen generada por Google anteriormente
            const base64Image = localStorage.getItem('linkedin_confirmed_img');
            const postText = localStorage.getItem('linkedin_v2_text') || localStorage.getItem('linkedin_current_text');

            const payload = {
                action: 'schedule',
                id: Date.now(),
                text: postText,
                imageBase64: base64Image, // Aquí se envía el Base64 que mencionabas (la imagen tal cual se genera)
                date: date,
                time: time,
                status: 'pending'
            };

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                localStorage.removeItem('scheduling_complete_post');
                alert("✅ Programado con éxito. Google Drive guardó la imagen generada.");
                refreshQueue(); 
            } catch (err) {
                alert("Error técnico al conectar con Google.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span class="material-symbols-rounded">cloud_upload</span> Enviar a la Nube (Google)';
            }
        }

        async function refreshQueue() {
            const list = document.getElementById('schedule-list');
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'list' })
                });
                const data = await res.json();
                
                list.innerHTML = '';
                if (!data.posts || data.posts.length === 0) {
                    list.innerHTML = '<p class="text-center text-xs text-gray-500 py-4">No hay pendientes en la nube de Google.</p>';
                    return;
                }

                // Ordenar por hora
                data.posts.sort((a,b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));

                data.posts.forEach(post => {
                    const hasImage = !!post.imageFileId;
                    const div = document.createElement('div');
                    div.className = `glass-card p-4 flex justify-between items-center border-l-4 ${hasImage ? 'border-secondary' : 'border-accent'}`;
                    div.innerHTML = `
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-1.5 mb-1">
                                ${hasImage ? '<span class="material-symbols-rounded text-[14px] text-secondary">image</span>' : ''}
                                <h4 class="text-sm font-bold text-gray-100 truncate">${post.text.substring(0, 35)}...</h4>
                            </div>
                            <p class="text-[10px] text-gray-400 flex items-center gap-1">
                                <span class="material-symbols-rounded text-xs">event</span> ${post.date}
                                <span class="material-symbols-rounded text-xs ml-2 text-accent">schedule</span> ${post.time}
                            </p>
                        </div>
                        <button onclick="removeCloud(${post.id})" class="ml-3 text-gray-600 hover:text-red-400 transition-colors">
                            <span class="material-symbols-rounded">delete</span>
                        </button>
                    `;
                    list.appendChild(div);
                });

            } catch (err) {
                list.innerHTML = '<p class="text-center text-xs text-red-400 py-4">Error conectando con la nube.</p>';
            }
        }

        async function removeCloud(id) {
            if (!confirm("¿Eliminar post programado de la nube?")) return;
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'delete', id: id })
                });
                refreshQueue();
            } catch (e) { alert("Error al eliminar."); }
        }
    </script>
</body>
</html>
