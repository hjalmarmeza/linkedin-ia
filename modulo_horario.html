<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Linkedinmatic - Programador en Tiempo Real</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: { 'sans': ['Outfit', 'sans-serif'] },
                    colors: {
                        base: '#030712',
                        surface: '#111827',
                        surfaceLight: '#1f2937',
                        accent: '#38bdf8',
                        secondary: '#818cf8'
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .glass { @apply bg-surface/40 backdrop-blur-xl border border-white/5 shadow-2xl; }
            .glass-card { @apply bg-surfaceLight/30 backdrop-blur-md border border-white/10 rounded-[32px] shadow-lg transition-all duration-300; }
            .text-gradient { @apply bg-clip-text text-transparent bg-gradient-to-r from-accent to-secondary; }
            .hide-scrollbar::-webkit-scrollbar { display: none; }
        }
        body { @apply bg-base text-gray-100 font-sans; }
    </style>
</head>

<body class="w-full min-h-screen flex items-center justify-center relative p-4">
    <div class="relative z-10 w-full md:w-[400px] h-[800px] md:max-h-[90vh] md:rounded-[40px] md:border-[8px] md:border-gray-900 md:shadow-2xl overflow-hidden bg-base flex flex-col">
        
    <header class="w-full max-w-md pt-8 pb-6 px-6 flex justify-between items-center bg-base/80 backdrop-blur sticky top-0 z-50">
        <button onclick="window.location.href='modulo_imagen.html'" class="w-12 h-12 rounded-full bg-surfaceLight/30 flex items-center justify-center border border-white/5 hover:bg-white/10 transition-colors">
            <span class="material-symbols-rounded text-gray-300 text-2xl">arrow_back</span>
        </button>
        <div class="flex flex-col items-center">
            <h1 class="text-lg font-black tracking-tight leading-none">
                POST<span class="text-accent">READY</span> <span class="text-secondary/60 text-xs font-medium ml-1">v4.0</span>
            </h1>
            <p class="text-[9px] text-accent uppercase tracking-[0.2em] font-extrabold mt-1 opacity-80">CENTRO DE PUBLICACIÓN PRO</p>
        </div>
        <div class="w-12 h-12"></div>
    </header>

    <main class="w-full max-w-md flex-1 overflow-y-auto hide-scrollbar px-6 py-8 flex flex-col gap-10">
        
        <!-- Programar Post -->
        <section class="flex flex-col gap-5">
            <label class="text-[11px] uppercase tracking-[0.2em] text-accent/70 font-black flex items-center gap-2">
                <span class="material-symbols-rounded text-xl">add_circle</span>
                PROGRAMAR POST IA
            </label>
            
            <div class="glass-card p-6 flex flex-col gap-6 bg-surface/40 border border-white/5">
                <div>
                    <label class="text-[10px] text-gray-500 uppercase font-black tracking-widest mb-2 block opacity-60">Borrador Detectado</label>
                    <select id="post-select" class="w-full bg-surfaceLight/20 border border-white/10 rounded-2xl px-5 py-4 text-xs font-bold text-gray-200 outline-none focus:border-accent transition-all">
                        <option value="">Cargando borradores...</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-black tracking-widest mb-2 block opacity-60">Fecha</label>
                        <input type="date" id="schedule-date" class="w-full bg-surfaceLight/20 border border-white/10 rounded-2xl px-5 py-4 text-xs font-bold text-gray-200 outline-none focus:border-accent transition-all">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-black tracking-widest mb-2 block opacity-60">Hora</label>
                        <input type="time" id="schedule-time" class="w-full bg-surfaceLight/20 border border-white/10 rounded-2xl px-5 py-4 text-xs font-bold text-gray-200 outline-none focus:border-accent transition-all">
                    </div>
                </div>

                <button onclick="scheduleCloud()" id="btn-schedule" class="w-full h-14 rounded-2xl bg-gradient-to-r from-accent to-secondary text-white font-black text-[10px] tracking-[0.2em] uppercase flex items-center justify-center gap-3 shadow-[0_15px_35px_-5px_rgba(56,189,248,0.4)] active:scale-95 transition-all">
                    <span class="material-symbols-rounded text-xl">cloud_upload</span>
                    ENVIAR A GOOGLE CLOUD
                </button>
                <p id="size-hint" class="text-[9px] text-center text-gray-600 font-bold uppercase tracking-widest opacity-60">Sincronizando imagen IA generada</p>
            </div>
        </section>

        <!-- Lista Programada -->
        <section class="flex flex-col gap-5">
            <label class="text-[11px] uppercase tracking-[0.2em] text-secondary/70 font-black flex items-center gap-2">
                <span class="material-symbols-rounded text-xl">cloud_done</span>
                COLA DE PUBLICACIONES
            </label>
            <div id="schedule-list" class="flex flex-col gap-4 pb-12">
                <div class="animate-pulse space-y-4">
                    <div class="h-20 bg-surfaceLight/10 rounded-3xl border border-white/5"></div>
                    <div class="h-20 bg-surfaceLight/5 rounded-3xl border border-white/5"></div>
                </div>
            </div>
        </section>
    </main>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxgYPVfo1XM0Q309jIkYeDD6lSIbOnr1DNLh_9CccQdzl_xiAnKw_77-uQFRq5ghFnBBA/exec";
        
        window.addEventListener('DOMContentLoaded', () => {
            loadDrafts();
            refreshQueue(); 
        });

        // 1. CARGAR BORRADORES (Saca la imagen Base64 del LocalStorage si ya la tienes de la pantalla anterior)
        function loadDrafts() {
            const select = document.getElementById('post-select');
            select.innerHTML = '';

            // Revisar si venimos de generar imagen de Google
            const comingFromImage = localStorage.getItem('scheduling_complete_post') === 'true';
            const rawBase64Image = localStorage.getItem('linkedin_confirmed_img'); // En tu app esta es la imagen Real de Google
            const postText = localStorage.getItem('linkedin_current_text') || localStorage.getItem('linkedin_v2_text');

            if (comingFromImage && postText) {
                const opt = document.createElement('option');
                opt.value = "current_draft"; // Referencia interna
                opt.textContent = `[FOTO GOOGLE] ${postText.split('\n')[0].substring(0, 35)}...`;
                select.appendChild(opt);
                return;
            }

            // Fallback: Borrador de texto simple v2
            const current = localStorage.getItem('linkedin_v2_text') || localStorage.getItem('linkedin_current_text');
            if (current) {
                const opt = document.createElement('option');
                opt.value = "text_only";
                opt.textContent = current.split('\n')[0].substring(0, 40) + '...';
                select.appendChild(opt);
            } else {
                const opt = document.createElement('option');
                opt.textContent = "Sin borradores";
                select.appendChild(opt);
            }
        }

        // 2. ENVIAR A GOOGLE DRIVE (LA COLA REAL)
        async function scheduleCloud() {
            const date = document.getElementById('schedule-date').value;
            const time = document.getElementById('schedule-time').value;

            if (!date || !time) {
                alert("Completa la fecha y hora.");
                return;
            }

            const btn = document.getElementById('btn-schedule');
            btn.disabled = true;
            btn.textContent = "CONECTANDO CON LA NUBE...";

            const confirmedImg = localStorage.getItem('linkedin_confirmed_img');
            const postText = localStorage.getItem('linkedin_v2_text') || localStorage.getItem('linkedin_current_text');

            const payload = {
                action: 'schedule',
                id: Date.now(),
                text: postText,
                date: date,
                time: time,
                status: 'pending'
            };

            // Detectar si es URL o Base64
            if (confirmedImg && confirmedImg.startsWith('data:')) {
                payload.imageBase64 = confirmedImg;
            } else if (confirmedImg) {
                payload.imageUrl = confirmedImg;
            }

            try {
                // Usamos una petición silenciosa para evitar problemas de redirección de Google Apps Script
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', // GAS requiere no-cors a veces para peticiones simples
                    body: JSON.stringify(payload)
                });
                
                // Como es 'no-cors', no podemos leer la respuesta, pero si no hay excepción, asumimos éxito
                localStorage.removeItem('scheduling_complete_post');
                alert("🚀 ¡Post enviado a la nube! Se ha programado correctamente en tu Google Drive.");
                setTimeout(() => refreshQueue(), 2000); 
            } catch (err) {
                alert("Error al conectar con la nube: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span class="material-symbols-rounded">cloud_upload</span> ENVIAR A GOOGLE CLOUD';
            }
        }

        async function refreshQueue() {
            const list = document.getElementById('schedule-list');
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'list' })
                });
                const data = await res.json();
                
                list.innerHTML = '';
                if (!data.posts || data.posts.length === 0) {
                    list.innerHTML = '<p class="text-center text-xs text-gray-500 py-4">No hay pendientes en la nube de Google.</p>';
                    return;
                }

                // Ordenar por hora
                data.posts.sort((a,b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));

                data.posts.forEach(post => {
                    const hasImage = !!post.imageFileId;
                    const div = document.createElement('div');
                    div.className = `glass-card p-4 flex justify-between items-center border-l-4 ${hasImage ? 'border-secondary' : 'border-accent'}`;
                    div.innerHTML = `
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-1.5 mb-1">
                                ${hasImage ? '<span class="material-symbols-rounded text-[14px] text-secondary">image</span>' : ''}
                                <h4 class="text-sm font-bold text-gray-100 truncate">${post.text.substring(0, 35)}...</h4>
                            </div>
                            <p class="text-[10px] text-gray-400 flex items-center gap-1">
                                <span class="material-symbols-rounded text-xs">event</span> ${post.date}
                                <span class="material-symbols-rounded text-xs ml-2 text-accent">schedule</span> ${post.time}
                            </p>
                        </div>
                        <button onclick="removeCloud(${post.id})" class="ml-3 text-gray-600 hover:text-red-400 transition-colors">
                            <span class="material-symbols-rounded">delete</span>
                        </button>
                    `;
                    list.appendChild(div);
                });

            } catch (err) {
                list.innerHTML = '<p class="text-center text-xs text-red-400 py-4">Error conectando con la nube.</p>';
            }
        }

        async function removeCloud(id) {
            if (!confirm("¿Eliminar post programado de la nube?")) return;
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'delete', id: id })
                });
                refreshQueue();
            } catch (e) { alert("Error al eliminar."); }
        }
    </script>
</body>
</html>
