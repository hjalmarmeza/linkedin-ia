<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Linkedinmatic - Programador Pro</title>

    <!-- Fuentes premium -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: { 'sans': ['Outfit', 'sans-serif'] },
                    colors: {
                        base: '#030712',
                        surface: '#111827',
                        surfaceLight: '#1f2937',
                        accent: '#38bdf8',
                        secondary: '#818cf8',
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .glass { @apply bg-surface/40 backdrop-blur-xl border border-white/5 shadow-2xl; }
            .glass-card { @apply bg-surfaceLight/30 backdrop-blur-md border border-white/10 rounded-3xl shadow-lg transition-all duration-300; }
            .text-gradient { @apply bg-clip-text text-transparent bg-gradient-to-r from-accent to-secondary; }
            .hide-scrollbar::-webkit-scrollbar { display: none; }
        }
        body { @apply bg-base text-gray-100 font-sans; }
    </style>
</head>

<body class="w-full min-h-screen flex items-center justify-center relative p-4">

    <!-- CONTENEDOR MÓVIL (En Desktop simula un iPhone) -->
    <div class="relative z-10 w-full md:w-[400px] h-[800px] md:max-h-[90vh] md:rounded-[40px] md:border-[8px] md:border-gray-900 md:shadow-2xl overflow-hidden bg-base flex flex-col">
        
        <!-- Header -->
        <header class="glass w-full px-6 py-5 flex justify-between items-center z-20">
            <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-surfaceLight/50 flex items-center justify-center border border-white/5 hover:bg-white/10 transition-colors">
                <span class="material-symbols-rounded text-gray-300 text-xl">arrow_back</span>
            </button>
            <div class="text-center">
                <h1 class="text-lg font-bold tracking-wide">TASK<span class="text-gradient">MASTER</span></h1>
                <p class="text-[10px] text-accent uppercase tracking-[0.2em] font-bold">Programador</p>
            </div>
            <div class="w-10 h-10"></div> <!-- Spacer -->
        </header>

        <!-- Contenido principal -->
        <main class="flex-1 overflow-y-auto hide-scrollbar px-5 py-6 flex flex-col gap-6">
            
            <!-- Nueva Programación -->
            <section class="flex flex-col gap-3">
                <label class="text-xs uppercase tracking-[0.15em] text-gray-400 font-bold flex items-center gap-2">
                    <span class="material-symbols-rounded text-[18px] text-accent">add_circle</span>
                    Programar Nuevo Post
                </label>
                
                <div class="glass-card p-5 flex flex-col gap-4">
                    <!-- Selector de Post -->
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-bold mb-1 block">Post Guardado</label>
                        <select id="post-select" class="w-full bg-surface border border-white/10 rounded-xl px-4 py-2 text-sm text-gray-200 outline-none focus:border-accent">
                            <option value="">Cargando posts...</option>
                        </select>
                    </div>

                    <!-- Horario -->
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase font-bold mb-1 block">Fecha</label>
                            <input type="date" id="schedule-date" class="w-full bg-surface border border-white/10 rounded-xl px-4 py-2 text-sm text-gray-200 outline-none focus:border-accent">
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-500 uppercase font-bold mb-1 block">Hora</label>
                            <input type="time" id="schedule-time" class="w-full bg-surface border border-white/10 rounded-xl px-4 py-2 text-sm text-gray-200 outline-none focus:border-accent">
                        </div>
                    </div>

                    <button onclick="schedulePost()" class="w-full h-12 rounded-xl bg-gradient-to-r from-accent to-secondary text-white font-bold text-xs tracking-widest uppercase flex items-center justify-center gap-2 shadow-lg hover:scale-[1.02] transition-transform">
                        <span class="material-symbols-rounded">schedule</span>
                        Agendar Post
                    </button>
                </div>
            </section>

            <!-- Lista de Programados -->
            <section class="flex flex-col gap-3">
                <label class="text-xs uppercase tracking-[0.15em] text-gray-400 font-bold flex items-center gap-2">
                    <span class="material-symbols-rounded text-[18px] text-secondary">event_note</span>
                    Cola de Publicación
                </label>
                
                <div id="schedule-list" class="flex flex-col gap-3">
                    <!-- Los items se cargarán aquí -->
                    <p class="text-center text-xs text-gray-500 py-4">No hay publicaciones programadas.</p>
                </div>
            </section>

        </main>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxyceiNIiq1nXjdGltdpdySvpPX7O6iB2hjkaAdjL-JHGb5mp-4L2e0V0xWRZzwc-NF/exec";

        window.addEventListener('DOMContentLoaded', () => {
            loadDrafts();
            syncFromGAS();
        });

        // ───── CARGAR EL BORRADOR ACTUAL EN EL SELECTOR ─────
        function loadDrafts() {
            const select = document.getElementById('post-select');
            select.innerHTML = '';

            const comingFromPublish = localStorage.getItem('scheduling_complete_post') === 'true';

            if (comingFromPublish) {
                const text = localStorage.getItem('linkedin_current_text');
                const img = localStorage.getItem('linkedin_confirmed_img');
                const row = localStorage.getItem('linkedin_current_row');
                const intention = localStorage.getItem('linkedin_intention');
                const style = localStorage.getItem('linkedin_current_style');

                if (text) {
                    const title = `[FOTO] ${text.split('\n')[0].substring(0, 30)}...`;
                    const option = document.createElement('option');
                    option.value = JSON.stringify({ text, img, row, intention, style, hasImage: !!img });
                    option.textContent = title;
                    select.appendChild(option);
                    select.value = option.value;
                    return;
                }
            }

            const currentText = localStorage.getItem('linkedin_v2_text') || localStorage.getItem('linkedin_current_text');
            if (currentText) {
                const title = currentText.split('\n')[0].substring(0, 30) + '...';
                const option = document.createElement('option');
                option.value = JSON.stringify({ text: currentText, hasImage: false });
                option.textContent = title;
                select.appendChild(option);
            } else {
                const option = document.createElement('option');
                option.textContent = "No hay borradores disponibles";
                select.appendChild(option);
            }
        }

        // ───── AGENDAR: GUARDAR EN GAS + LOCAL ─────
        async function schedulePost() {
            const rawValue = document.getElementById('post-select').value;
            const date = document.getElementById('schedule-date').value;
            const time = document.getElementById('schedule-time').value;

            if (!rawValue || rawValue.startsWith('No hay') || !date || !time) {
                alert("Por favor completa todos los campos.");
                return;
            }

            const postData = JSON.parse(rawValue);
            const newPost = {
                id: Date.now(),
                text: postData.text || '',
                imageUrl: postData.img || '',
                style: postData.style || '',
                intention: postData.intention || '',
                row: postData.row || '',
                hasImage: postData.hasImage || false,
                date: date,
                time: time,
                status: 'pending',
                action: 'saveScheduled'
            };

            // Guardar en localStorage inmediatamente (UX rápida)
            const local = JSON.parse(localStorage.getItem('scheduled_posts') || '[]');
            local.push(newPost);
            localStorage.setItem('scheduled_posts', JSON.stringify(local));
            localStorage.removeItem('scheduling_complete_post');
            renderSchedule(local);

            // Sincronizar con GAS en background
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newPost)
                });
            } catch (err) {
                console.warn('GAS sync error (no-cors ok):', err);
            }

            alert("✅ Post agendado correctamente.");
            document.getElementById('schedule-date').value = '';
            document.getElementById('schedule-time').value = '';
        }

        // ───── SINCRONIZAR DESDE GAS ─────
        async function syncFromGAS() {
            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'getScheduled' })
                });
                const data = await res.json();

                if (data.success && data.posts) {
                    // Mapear al formato local
                    const synced = data.posts.map(p => ({
                        id: p.id,
                        text: p.text,
                        imageUrl: p.imageUrl,
                        style: p.style,
                        hasImage: !!(p.imageUrl),
                        date: p.date,
                        time: p.time,
                        status: p.status
                    }));

                    // Actualizar localStorage con los datos del servidor
                    localStorage.setItem('scheduled_posts', JSON.stringify(synced));
                    renderSchedule(synced);
                }
            } catch (err) {
                // Si GAS falla (CORS en no-cors, red, etc.), usar localStorage como fallback
                console.warn('GAS sync unavailable, using localStorage:', err);
                const local = JSON.parse(localStorage.getItem('scheduled_posts') || '[]');
                renderSchedule(local);
            }
        }

        // ───── ELIMINAR POST ─────
        async function removeScheduled(id) {
            // Eliminar localmente
            let local = JSON.parse(localStorage.getItem('scheduled_posts') || '[]');
            local = local.filter(p => String(p.id) !== String(id));
            localStorage.setItem('scheduled_posts', JSON.stringify(local));
            renderSchedule(local);

            // Sincronizar eliminación con GAS
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'deleteScheduled', id: id })
                });
            } catch (err) {
                console.warn('GAS delete sync error:', err);
            }
        }

        // ───── RENDERIZAR LA COLA ─────
        function renderSchedule(posts) {
            const list = document.getElementById('schedule-list');
            list.innerHTML = '';

            // Separar pendientes y publicados
            const pending = posts.filter(p => p.status === 'pending');
            const published = posts.filter(p => p.status && p.status !== 'pending');

            if (posts.length === 0) {
                list.innerHTML = '<p class="text-center text-xs text-gray-500 py-4">No hay publicaciones programadas.</p>';
                return;
            }

            // Renderizar pendientes
            if (pending.length > 0) {
                const label = document.createElement('p');
                label.className = 'text-[10px] uppercase tracking-widest text-gray-500 font-bold mt-2';
                label.textContent = 'Pendientes';
                list.appendChild(label);

                pending.forEach(post => renderPostItem(post, list, false));
            }

            // Renderizar publicados (los que ya envió el trigger)
            if (published.length > 0) {
                const label = document.createElement('p');
                label.className = 'text-[10px] uppercase tracking-widest text-green-500 font-bold mt-4';
                label.textContent = '✅ Publicados automáticamente';
                list.appendChild(label);

                published.forEach(post => renderPostItem(post, list, true));
            }
        }

        function renderPostItem(post, container, isPublished) {
            const title = (post.text || '').split('\n')[0].substring(0, 40) + '...';
            const hasImage = post.hasImage || !!(post.imageUrl);
            const borderColor = isPublished ? 'border-green-500' : (hasImage ? 'border-secondary shadow-[0_0_10px_rgba(0,242,255,0.15)]' : 'border-accent');
            const item = document.createElement('div');
            item.className = `glass-card p-4 flex justify-between items-center border-l-4 ${borderColor} ${isPublished ? 'opacity-60' : ''}`;
            item.innerHTML = `
                <div class="flex-1">
                    <div class="flex items-center gap-2">
                        ${hasImage ? '<span class="material-symbols-rounded text-[14px] text-secondary">image</span>' : ''}
                        ${isPublished ? '<span class="material-symbols-rounded text-[14px] text-green-400">check_circle</span>' : ''}
                        <h4 class="text-sm font-bold text-gray-100 truncate">${title}</h4>
                    </div>
                    <p class="text-[10px] text-gray-400 mt-1 flex items-center gap-1">
                        <span class="material-symbols-rounded text-xs">calendar_today</span> ${post.date}
                        <span class="material-symbols-rounded text-xs ml-2">schedule</span> ${post.time}
                        ${isPublished ? '<span class="ml-2 text-green-400">· Publicado</span>' : ''}
                    </p>
                </div>
                <button onclick="removeScheduled(${post.id})" class="text-gray-600 hover:text-red-400 transition-colors ml-2">
                    <span class="material-symbols-rounded">delete</span>
                </button>
            `;
            container.appendChild(item);
        }
    </script>
</body>
</html>
