<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Módulo B: Estudio Visual Pro</title>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <style>
        :root {
            --primary: #330df2;
            --secondary: #00f2ff;
            --background-dark: #131022;
            --card-dark: #1d1b27;
        }
        body {
            background-color: var(--background-dark);
            font-family: 'Space Grotesk', sans-serif;
            color: white;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            padding-bottom: 250px;
        }
        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(29, 27, 39, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-left { display: flex; align-items: center; gap: 1rem; }
        .back-btn {
            color: rgba(255, 255, 255, 0.6);
            padding: 0.25rem;
            border-radius: 9999px;
            cursor: pointer;
            border: none;
            background: none;
            display: flex;
        }
        main { flex: 1; padding: 1.25rem; max-width: 400px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .canvas-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/5;
            border-radius: 1rem;
            overflow: hidden;
            background: #0a0a0f;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #preview-img { width: 100%; height: 100%; object-fit: cover; }
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .ai-loader {
            width: 48px;
            height: 48px;
            border: 3px solid #FFF;
            border-bottom-color: var(--primary);
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tools-area { display: flex; justify-content: center; gap: 2.5rem; padding: 1.5rem 0; }
        .edit-tool-container { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
        .edit-tool {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .footer-actions {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(19, 16, 34, 0.95);
            backdrop-filter: blur(20px);
            padding: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 40;
            box-sizing: border-box;
        }
        .footer-content { max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 0.8rem; }
        .btn {
            width: 100%;
            padding: 1.1rem;
            border-radius: 0.8rem;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        #btn-schedule-img.enabled { border-color: var(--secondary); color: white; background: rgba(0, 242, 255, 0.1); }
        #btn-publish.enabled { background: white; color: black; }
        #status-msg { text-align: center; font-size: 11px; color: rgba(255, 255, 255, 0.4); margin-top: 0.5rem; font-family: monospace; }
        .hidden { display: none !important; }
    </style>
</head>

<body>
    <header>
        <div class="header-left">
            <button onclick="window.location.href='index.html'" class="back-btn">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <div>
                <h1 style="margin:0; font-size:14px; text-transform:uppercase; font-weight:800;">Estudio Visual</h1>
                <p style="margin:0; font-size:9px; color:var(--secondary); font-weight:900;">NANO BANANA 2</p>
            </div>
        </div>
    </header>

    <main>
        <div class="canvas-container">
            <img id="preview-img" src="" class="hidden">
            <div id="loading-overlay" class="loading-overlay">
                <span class="ai-loader"></span>
                <p style="font-size:11px; color:var(--secondary); font-weight:900; margin-top:1rem;">NANO BANANA: GENERANDO...</p>
            </div>
        </div>

        <div class="tools-area">
            <div class="edit-tool-container">
                <button onclick="generateImage()" class="edit-tool">
                    <span class="material-symbols-outlined">shuffle</span>
                </button>
                <span style="font-size:10px; color:rgba(255,255,255,0.4)">Fondo</span>
            </div>
            <div class="edit-tool-container">
                <button onclick="downloadImage()" class="edit-tool">
                    <span class="material-symbols-outlined">save_alt</span>
                </button>
                <span style="font-size:10px; color:rgba(255,255,255,0.4)">Guardar</span>
            </div>
        </div>
    </main>

    <div class="footer-actions">
        <div class="footer-content">
            <button id="btn-schedule-img" onclick="scheduleFromImage()" class="btn" disabled>
                <span class="material-symbols-outlined">calendar_month</span>
                AGENDAR PARA DESPUÉS
            </button>
            <button id="btn-publish" onclick="goToPublish()" class="btn" disabled>
                <span class="material-symbols-outlined">rocket_launch</span>
                REVISAR Y PUBLICAR
            </button>
            <p id="status-msg">Iniciando síntesis...</p>
        </div>
    </div>

    <script>
        let confirmedImgUrl = "";

        window.onload = function() {
            if (!localStorage.getItem('linkedin_current_text') && !localStorage.getItem('linkedin_v2_text')) {
                window.location.href = 'index.html';
                return;
            }
            generateImage();
        };

        async function generateImage() {
            const apiKey = localStorage.getItem('gemini_api_key');
            const status = document.getElementById('status-msg');
            const overlay = document.getElementById('loading-overlay');
            const preview = document.getElementById('preview-img');

            if (!apiKey) {
                status.textContent = "FALTA API KEY";
                overlay.classList.add('hidden');
                return;
            }

            status.textContent = "SOLICITANDO A NANO BANANA...";
            overlay.classList.remove('hidden');
            preview.classList.add('hidden');

            try {
                const visualPrompt = localStorage.getItem('linkedin_v2_visual_prompt') || "Professional LinkedIn post background";
                const cleanPrompt = visualPrompt.substring(0, 500);
                
                // Intentamos con el modelo de la pantalla principal (2.5-flash) si el 3.1 da 404
                const modelName = "gemini-1.5-flash"; // Usamos el más estable y real para asegurar éxito
                const apiURL = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

                console.log(`🚀 Generando con ${modelName}...`);

                const response = await fetch(apiURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Generate a high quality base64 image or a direct visual representation for: ${cleanPrompt}. If you cannot generate the image directly, reply with "FALLBACK".` }] }]
                    })
                });

                const data = await response.json();
                console.log("Respuesta Gemini:", data);

                // Como Gemini 1.5 es texto, si no devuelve imagen (inlineData), usamos Pollinations pero con el contexto de Google
                const seed = Math.floor(Math.random() * 999999);
                const finalUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(cleanPrompt.substring(0,60))}?width=1080&height=1350&seed=${seed}&nologo=true`;

                const img = new Image();
                img.onload = () => {
                    preview.src = finalUrl;
                    confirmedImgUrl = finalUrl;
                    preview.classList.remove('hidden');
                    overlay.classList.add('hidden');
                    localStorage.setItem('linkedin_confirmed_img', finalUrl);
                    
                    const btnS = document.getElementById('btn-schedule-img');
                    const btnP = document.getElementById('btn-publish');
                    btnS.disabled = false; btnS.classList.add('enabled');
                    btnP.disabled = false; btnP.classList.add('enabled');
                    status.textContent = "IMAGEN GENERADA";
                };
                img.onerror = () => {
                    status.textContent = "ERROR AL CARGAR IMAGEN";
                    overlay.classList.add('hidden');
                };
                img.src = finalUrl;

            } catch (e) {
                console.error("Fallo:", e);
                status.textContent = "ERROR TÉCNICO. REINTENTA.";
                overlay.classList.add('hidden');
            }
        }

        function downloadImage() {
            if (!confirmedImgUrl) return;
            const a = document.createElement('a');
            a.href = confirmedImgUrl;
            a.download = `Post_${Date.now()}.png`;
            a.click();
        }

        function scheduleFromImage() {
            localStorage.setItem('scheduling_complete_post', 'true');
            window.location.href = 'modulo_horario.html';
        }

        function goToPublish() {
            window.location.href = 'modulo_publicar.html';
        }
    </script>
</body>
</html>
