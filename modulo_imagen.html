<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESTUDIO VISUAL - IA Studio</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: { 'display': ['Outfit', 'sans-serif'] },
                    colors: {
                        base: '#030712',
                        surface: '#0B0B0E',
                        surfaceLight: '#111827',
                        accent: '#38bdf8',
                        secondary: '#818cf8',
                        cardBackground: '#010409'
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .glass { @apply bg-surface/40 backdrop-blur-xl border border-white/5 shadow-2xl; }
            .canvas-glow { @apply shadow-[0_0_50px_-10px_rgba(56,189,248,0.2)]; }
            .btn-circle { @apply w-16 h-16 rounded-full bg-surfaceLight/50 flex flex-col items-center justify-center border border-white/10 hover:bg-white/10 hover:scale-110 active:scale-95 transition-all text-gray-400 font-bold; }
            .btn-circle.active { @apply bg-accent border-accent text-white shadow-[0_0_20px_rgba(56,189,248,0.6)]; }
        }
        body { @apply bg-base text-gray-100 font-display; }
    </style>
</head>

<body class="w-full min-h-screen flex flex-col items-center pb-40">

    <header class="w-full max-w-md pt-10 pb-10 px-6 flex justify-between items-center bg-base/80 backdrop-blur sticky top-0 z-50">
        <button onclick="window.location.href='modulo_texto.html'" class="w-12 h-12 rounded-full bg-surfaceLight/30 flex items-center justify-center border border-white/5 hover:bg-white/10 transition-colors">
            <span class="material-symbols-rounded text-gray-300 text-2xl">arrow_back</span>
        </button>
        <h1 class="text-xl font-bold tracking-[0.1em] uppercase">
            ESTUDIO <span class="text-accent">VISUAL</span>
        </h1>
        <button class="w-12 h-12 rounded-full bg-surfaceLight/30 flex items-center justify-center border border-white/5 hover:bg-white/10 transition-colors">
            <span class="material-symbols-rounded text-gray-300 text-2xl">image</span>
        </button>
    </header>

    <main class="w-full max-w-sm flex flex-col items-center gap-12 mt-4 px-4 flex-1">
        
        <!-- Canvas Visual -->
        <div class="relative w-full aspect-square rounded-[48px] overflow-hidden bg-cardBackground border border-white/5 shadow-2xl group">
            <img id="preview-img" src="" class="w-full h-full object-cover hidden transition duration-1000">
            
            <div id="loading-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-base/90 backdrop-blur-md z-20">
                <div class="animate-spin w-12 h-12 border-4 border-accent/20 border-t-accent rounded-full mb-6"></div>
                <p class="text-[10px] text-accent font-black tracking-[0.4em] uppercase animate-pulse">Sintetizando...</p>
            </div>

            <!-- Watermarks exactos -->
            <div class="absolute top-8 left-8 p-0 opacity-60">
                <p class="text-[9px] text-[#38bdf8] font-black tracking-widest font-mono">[IA_SYS [ONLINE]]</p>
                <p class="text-[7px] text-white/30 font-bold font-mono tracking-tighter">DATA_STK_OVR</p>
            </div>
            
            <p class="absolute bottom-8 right-10 text-[9px] text-white/40 font-bold bg-black/20 backdrop-blur px-2 py-0.5 rounded">By Hjalmar Meza</p>
        </div>

        <!-- Three Circular Buttons - Diseño Screenshot 100% -->
        <div class="w-full flex justify-around items-end px-4">
            <div class="flex flex-col items-center gap-4">
                <button onclick="generateImage()" class="w-16 h-16 rounded-full bg-surfaceLight/40 flex items-center justify-center border border-white/5 hover:bg-white/10 transition-all active:scale-90">
                    <span class="material-symbols-rounded text-3xl text-gray-300">open_in_full</span>
                </button>
                <span class="text-[10px] font-black uppercase tracking-widest text-[#6b7280]">FONDO</span>
            </div>
            
            <div class="flex flex-col items-center gap-4">
                <!-- Filtro con el GLOW del screenshot -->
                <button class="w-16 h-16 rounded-full bg-accent flex items-center justify-center text-white shadow-[0_0_30px_rgba(56,189,248,0.8)] border-2 border-accent/50 active:scale-95 transition-all">
                    <span class="material-symbols-rounded text-3xl">contrast</span>
                </button>
                <span class="text-[10px] font-black uppercase tracking-widest text-[#6b7280]">FILTRO</span>
            </div>

            <div class="flex flex-col items-center gap-4">
                <button onclick="downloadImage()" class="w-16 h-16 rounded-full bg-surfaceLight/40 flex items-center justify-center border border-white/5 hover:bg-white/10 transition-all active:scale-90">
                    <span class="material-symbols-rounded text-3xl text-gray-300">download</span>
                </button>
                <span class="text-[10px] font-black uppercase tracking-widest text-[#6b7280]">GUARDAR</span>
            </div>
        </div>

    </main>

    <!-- Footer con botones alineados 50/50 -->
    <footer class="fixed bottom-8 left-0 w-full px-6 z-40 max-w-md mx-auto left-1/2 -translate-x-1/2">
        <div class="flex gap-3 w-full items-stretch">
            <button id="btn-schedule" onclick="schedulePost()" class="flex-1 h-16 rounded-[24px] border border-white/10 bg-white/5 text-gray-400 font-bold text-[10px] tracking-[0.15em] uppercase flex items-center justify-center gap-2 hover:bg-white/10 transition-all whitespace-nowrap">
                <span class="material-symbols-rounded text-xl">calendar_month</span>
                AGENDAR
            </button>

            <button onclick="goToPublish()" class="flex-[1.2] h-16 rounded-[24px] bg-accent text-white font-black text-[10px] tracking-[0.1em] uppercase flex items-center justify-center gap-2 shadow-[0_15px_40px_-5px_rgba(56,189,248,0.4)] active:scale-95 transition-all whitespace-nowrap">
                PUBLICAR EN LINKEDIN
                <span class="material-symbols-rounded text-xl">ios_share</span>
            </button>
        </div>
    </footer>

    <script>
        let confirmedImgUrl = "";

        window.onload = function () {
            const text = localStorage.getItem('linkedin_v2_text') || localStorage.getItem('linkedin_current_text');
            if (!text) {
                window.location.href = 'modulo_texto.html';
                return;
            }
            generateImage();
        };

        async function generateImage() {
            const googleKey = localStorage.getItem('gemini_api_key');
            const overlay = document.getElementById('loading-overlay');
            const preview = document.getElementById('preview-img');

            if (!googleKey) {
                alert("Configura tu API Key de Google (Gemini).");
                overlay.classList.add('hidden');
                return;
            }

            overlay.classList.remove('hidden');
            preview.classList.add('hidden');

            try {
                const text = localStorage.getItem('linkedin_v2_text') || "";
                const intention = localStorage.getItem('linkedin_intention') || "authority";
                
                const aiPrompt = `Modern artistic cinematic photography, professional office or futuristic background, high contrast, sharp focus, 8k resolution. Subject: ${text.substring(0, 150)}. ${intention} vibe.`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${googleKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: aiPrompt }] }]
                    })
                });

                const data = await response.json();
                const imagePart = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData);

                let finalUrl = "";
                if (imagePart) {
                    finalUrl = `data:${imagePart.inlineData.mimeType};base64,${imagePart.inlineData.data}`;
                } else {
                    const seed = Math.floor(Math.random() * 9999);
                    finalUrl = `https://picsum.photos/seed/${seed}/1080/1350`;
                }

                const img = new Image();
                img.onload = () => {
                    overlay.classList.add('hidden');
                    preview.classList.remove('hidden');
                    preview.src = finalUrl;
                    confirmedImgUrl = finalUrl;
                    localStorage.setItem('linkedin_confirmed_img', finalUrl);
                };
                img.src = finalUrl;

            } catch (e) {
                console.error(e);
                overlay.classList.add('hidden');
            }
        }

        function downloadImage() {
            if (!confirmedImgUrl) return;
            const a = document.createElement('a');
            a.href = confirmedImgUrl;
            a.download = `StudioIA_${Date.now()}.png`;
            a.click();
        }

        function schedulePost() {
            window.location.href = 'modulo_horario.html';
        }

        function goToPublish() {
            window.location.href = 'modulo_publicar.html';
        }
    </script>
</body>
</html>
