<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Módulo B: Estudio Visual Pro</title>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <style>
        :root {
            --primary: #330df2;
            --secondary: #00f2ff;
            --background-dark: #131022;
            --card-dark: #1d1b27;
        }
        body {
            background-color: var(--background-dark);
            font-family: 'Space Grotesk', sans-serif;
            color: white;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            padding-bottom: 250px;
        }
        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(29, 27, 39, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .header-left { display: flex; align-items: center; gap: 1rem; }
        .back-btn {
            color: rgba(255, 255, 255, 0.6);
            padding: 0.25rem;
            border-radius: 9999px;
            cursor: pointer;
            border: none;
            background: none;
            display: flex;
            transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(255, 255, 255, 0.1); color: white; }
        main { flex: 1; padding: 1.25rem; max-width: 400px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .canvas-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/5;
            border-radius: 1rem;
            overflow: hidden;
            background: #0a0a0f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        #preview-img { width: 100%; height: 100%; object-fit: cover; }
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .ai-loader {
            width: 48px;
            height: 48px;
            border: 3px solid #FFF;
            border-bottom-color: var(--primary);
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tools-area { display: flex; justify-content: center; gap: 2.5rem; padding: 1.5rem 0; }
        .edit-tool-container { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
        .edit-tool {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .edit-tool:hover { transform: scale(1.1); border-color: var(--secondary); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); background: rgba(0, 242, 255, 0.05); }
        .tool-label { font-size: 10px; font-weight: bold; text-transform: uppercase; color: rgba(255, 255, 255, 0.4); letter-spacing: 0.15em; }
        .footer-actions {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(19, 16, 34, 0.95);
            backdrop-filter: blur(20px);
            padding: 1.5rem 1.5rem 2.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 40;
            box-sizing: border-box;
        }
        .footer-content { max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 0.8rem; }
        .btn {
            width: 100%;
            padding: 1.1rem;
            border-radius: 0.8rem;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        .btn:disabled { cursor: not-allowed; opacity: 0.3; }
        #btn-schedule-img { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.4); }
        #btn-schedule-img.enabled { border-color: var(--secondary); color: white; background: rgba(0, 242, 255, 0.08); }
        #btn-schedule-img.enabled:active { transform: scale(0.98); }
        #btn-publish { background: none; border-color: rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.3); }
        #btn-publish.enabled { background: white; color: black; border-color: transparent; }
        #btn-publish.enabled:active { transform: scale(0.98); }
        #status-msg { text-align: center; font-size: 11px; color: rgba(255, 255, 255, 0.3); margin-top: 0.4rem; font-family: monospace; text-transform: uppercase; letter-spacing: 0.12em; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>

<body>
    <header>
        <div class="header-left">
            <button onclick="window.location.href='index.html'" class="back-btn">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <div>
                <h1 style="margin:0; font-size:14px; text-transform:uppercase; font-weight:800; letter-spacing:0.05em;">Estudio Visual</h1>
                <p style="margin:0; font-size:9px; color:var(--secondary); font-weight:900; letter-spacing:0.15em;">NANO BANANA 2 • ALPHA</p>
            </div>
        </div>
    </header>

    <main>
        <section class="canvas-container" id="container-viz">
            <img id="preview-img" src="" class="hidden">
            <div id="loading-overlay" class="loading-overlay">
                <span class="ai-loader"></span>
                <p style="font-size:11px; color:var(--secondary); font-weight:900; letter-spacing:0.25em; margin-top:1.5rem; text-align:center;">SINTETIZANDO PIXELES...</p>
            </div>
        </section>

        <section class="tools-area">
            <div class="edit-tool-container">
                <button onclick="generateImage()" class="edit-tool">
                    <span class="material-symbols-outlined" style="color:rgba(255,255,255,0.85)">shuffle</span>
                </button>
                <span class="tool-label">Regenerar</span>
            </div>
            <div class="edit-tool-container">
                <button onclick="downloadImage()" class="edit-tool">
                    <span class="material-symbols-outlined" style="color:rgba(255,255,255,0.85)">save_alt</span>
                </button>
                <span class="tool-label">Guardar</span>
            </div>
        </section>
    </main>

    <div class="footer-actions">
        <div class="footer-content">
            <button id="btn-schedule-img" onclick="scheduleFromImage()" class="btn" disabled>
                <span class="material-symbols-outlined" style="font-size:20px">calendar_month</span>
                AGENDAR PARA DESPUÉS
            </button>

            <button id="btn-publish" onclick="goToPublish()" class="btn" disabled>
                <span class="material-symbols-outlined" style="font-size:20px">rocket_launch</span>
                REVISAR Y PUBLICAR
            </button>

            <p id="status-msg">Iniciando Nano Banana 2...</p>
        </div>
    </div>

    <script>
        let currentText = "";
        let confirmedImgUrl = "";

        window.onload = function () {
            currentText = localStorage.getItem('linkedin_current_text') || localStorage.getItem('linkedin_v2_text');
            if (!currentText) {
                console.error("No text found");
                window.location.href = 'index.html';
                return;
            }
            generateImage();
        };

        async function generateImage() {
            const googleKey = localStorage.getItem('gemini_api_key');
            const overlay = document.getElementById('loading-overlay');
            const preview = document.getElementById('preview-img');
            const status = document.getElementById('status-msg');
            const btnS = document.getElementById('btn-schedule-img');
            const btnP = document.getElementById('btn-publish');

            if (!googleKey || !googleKey.startsWith("AIzaSy")) {
                status.textContent = "⚙️ CONFIGURA API KEY GOOGLE";
                status.style.color = "#ff4d4d";
                overlay.classList.add('hidden');
                return;
            }

            overlay.classList.remove('hidden');
            preview.classList.add('hidden');
            status.textContent = "CONECTANDO CON NANO BANANA...";
            status.style.color = "rgba(255,255,255,0.3)";

            try {
                // Prompt visual extraído de la IA o fallback
                const visualPrompt = localStorage.getItem('linkedin_v2_visual_prompt') || currentText.split("\n")[0];
                const aiPrompt = `professional cinematic photography, high-end commercial style, clean aesthetic, ultra-detailed: ${visualPrompt.substring(0, 300)}`;

                console.log("🚀 Solicitando imagen a Gemini 3.1 Flash Preview...");
                
                // ENDPOINT EXACTO PARA NANO BANANA 2
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-image-preview:generateContent?key=${googleKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: aiPrompt }] }]
                    })
                });

                const data = await response.json();

                if (response.ok && data.candidates && data.candidates[0].content) {
                    const imagePart = data.candidates[0].content.parts.find(p => p.inlineData);
                    if (imagePart) {
                        const base64Data = `data:${imagePart.inlineData.mimeType};base64,${imagePart.inlineData.data}`;
                        preview.src = base64Data;
                        confirmedImgUrl = base64Data;
                        
                        preview.onload = () => {
                            overlay.classList.add('hidden');
                            preview.classList.remove('hidden');
                            localStorage.setItem('linkedin_confirmed_img', base64Data);
                            
                            // Activar botones
                            btnS.disabled = false;
                            btnS.classList.add('enabled');
                            btnP.disabled = false;
                            btnP.classList.add('enabled');
                            
                            status.textContent = "IMAGEN GENERADA CON ÉXITO";
                            status.style.color = "var(--secondary)";
                        };
                    } else {
                        throw new Error("No inlineData in response");
                    }
                } else {
                    throw new Error(data.error?.message || "Google falló");
                }
            } catch (e) {
                console.warn("Error en Nano Banana 2:", e);
                status.textContent = "FALLO TÉCNICO. REINTENTANDO...";
                
                // Fallback ultraligero para no dejar al usuario vacío
                const seed = Math.floor(Math.random() * 9999);
                const query = currentText.split("\n")[0].replace(/[^a-zA-Z0-9 ]/g, '').substring(0, 30);
                const backupUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(query)}?width=1080&height=1350&seed=${seed}&nologo=true`;
                
                preview.src = backupUrl;
                preview.onload = () => {
                    overlay.classList.add('hidden');
                    preview.classList.remove('hidden');
                    confirmedImgUrl = backupUrl;
                    btnS.disabled = false; btnS.classList.add('enabled');
                    btnP.disabled = false; btnP.classList.add('enabled');
                    status.textContent = "LISTO (MODO RESURRECCIÓN)";
                };
            }
        }

        function downloadImage() {
            if (!confirmedImgUrl) return;
            const a = document.createElement('a');
            a.href = confirmedImgUrl;
            a.download = `IA_Post_${Date.now()}.png`;
            a.click();
        }

        function scheduleFromImage() {
            localStorage.setItem('scheduling_complete_post', 'true');
            window.location.href = 'modulo_horario.html';
        }

        function goToPublish() {
            window.location.href = 'modulo_publicar.html';
        }
    </script>
</body>
</html>
