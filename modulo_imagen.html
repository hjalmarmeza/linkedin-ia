<!DOCTYPE html>
<html class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Módulo B: Estudio Visual</title>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#330df2",
                        "secondary": "#00f2ff",
                        "background-dark": "#131022",
                        "card-dark": "#1d1b27"
                    },
                    fontFamily: { "display": ["Space Grotesk", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        .ai-loader {
            width: 48px;
            height: 48px;
            border: 3px solid #FFF;
            border-bottom-color: #330df2;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body class="bg-background-dark font-display text-white min-h-screen flex flex-col pb-64">

    <header
        class="sticky top-0 z-50 bg-[#1d1b27]/90 backdrop-blur-md border-b border-white/5 p-4 flex items-center justify-between shadow-lg">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='index.html'"
                class="text-white/60 hover:text-white transition p-1 rounded-full hover:bg-white/10">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <div>
                <h1 class="font-bold text-lg tracking-wide leading-none uppercase text-sm">Estudio Visual</h1>
                <p class="text-[8px] text-secondary font-bold tracking-widest mt-1">V4.0</p>
            </div>
        </div>
    </header>

    <main class="flex-1 p-5 max-w-md mx-auto w-full flex flex-col gap-8">
        
        <!-- Preview Area -->
        <section class="relative group">
            <div id="canvas-container"
                class="relative w-full aspect-[4/5] rounded-2xl overflow-hidden bg-[#0a0a0f] border border-white/10 shadow-2xl transition-all duration-500">

                <img id="preview-img" src=""
                    class="w-full h-full object-cover hidden">

                <div id="placeholder"
                    class="absolute inset-0 flex flex-col items-center justify-center text-white/30 p-8 text-center gap-4">
                    <span class="material-symbols-outlined text-5xl">cloud_upload</span>
                    <p class="text-sm font-light">Pulsa generar para crear la imagen de tu post.</p>
                </div>

                <div id="loading-overlay"
                    class="absolute inset-0 bg-black/80 backdrop-blur-sm hidden flex-col items-center justify-center z-20">
                    <span class="ai-loader mb-4"></span>
                    <p class="text-secondary text-xs font-bold tracking-[0.2em] animate-pulse">GENERANDO...</p>
                </div>
            </div>
        </section>

        <!-- Main Buttons -->
        <section class="flex flex-col gap-4">
            <button onclick="generateImage()" id="btn-generate"
                class="w-full py-4 rounded-xl bg-white text-black font-bold text-xs tracking-widest uppercase flex items-center justify-center gap-2 transition-all">
                <span class="material-symbols-outlined text-lg">auto_awesome</span> GENERAR IMAGEN
            </button>

            <button onclick="confirmImage()" id="btn-confirm"
                class="w-full py-3 rounded-xl border border-white/10 text-white/20 font-bold text-xs tracking-widest uppercase flex items-center justify-center gap-2 transition-all cursor-not-allowed"
                disabled>
                <span class="material-symbols-outlined text-lg">check_circle</span> CONFIRMAR IMAGEN
            </button>
        </section>

    </main>

    <!-- Essential Footer as requested -->
    <div class="fixed bottom-0 left-0 w-full bg-[#131022]/95 backdrop-blur-xl pt-4 pb-8 px-6 z-40 border-t border-white/5">
        <div class="max-w-md mx-auto flex flex-col gap-3">
            
            <button id="btn-schedule-img" onclick="scheduleFromImage()"
                class="w-full py-4 rounded-xl border border-white/20 text-white/40 font-bold text-xs tracking-widest uppercase flex items-center justify-center gap-2 cursor-not-allowed transition-all bg-white/5"
                disabled>
                <span class="material-symbols-outlined text-lg">calendar_month</span>
                AGENDAR PARA DESPUÉS (CALENDARIO)
            </button>

            <button id="btn-publish" onclick="goToPublish()"
                class="w-full py-4 rounded-xl border border-white/10 text-white/30 font-bold text-sm tracking-wide flex items-center justify-center gap-3 cursor-not-allowed transition-all"
                disabled>
                <span class="material-symbols-outlined text-lg">arrow_forward</span>
                <span>REVISAR Y PUBLICAR</span>
            </button>

            <p id="status-msg" class="text-center text-[10px] text-white/20 mt-1 font-mono uppercase tracking-widest font-bold">Confirma la imagen para desbloquear</p>
        </div>
    </div>

    <script>
        const CLOUD_NAME = "dmvkaq9zc";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxyceiNIiq1nXjdGltdpdySvpPX7O6iB2hjkaAdjL-JHGb5mp-4L2e0V0xWRZzwc-NF/exec";

        let currentText = "";
        let confirmedImgUrl = "";

        window.onload = function () {
            currentText = localStorage.getItem('linkedin_current_text') || localStorage.getItem('linkedin_v2_text') || "";
        };

        async function generateImage() {
            const btn = document.getElementById('btn-generate');
            const overlay = document.getElementById('loading-overlay');
            
            if (!currentText) return alert("Falta texto base para generar.");

            btn.disabled = true;
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');

            try {
                // Generación minimalista usando el primer fragmento de texto
                const cleanContext = currentText.split("\n")[0].replace(/[^a-zA-Z0-9 ]/g, '').substring(0, 100);
                const seed = Math.floor(Math.random() * 9999999);
                const finalPrompt = `Professional Masterpiece. ${cleanContext}. High quality, cinematic lighting, ultra-detailed.`;
                
                const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(finalPrompt)}?width=1080&height=1350&seed=${seed}&nologo=true&enhance=true`;

                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => {
                    document.getElementById('preview-img').src = url;
                    confirmedImgUrl = url;
                    document.getElementById('preview-img').classList.remove('hidden');
                    document.getElementById('placeholder').classList.add('hidden');
                    overlay.classList.add('hidden');
                    btn.disabled = false;

                    const btnConfirm = document.getElementById('btn-confirm');
                    btnConfirm.disabled = false;
                    btnConfirm.classList.replace('text-white/20', 'text-secondary');
                    btnConfirm.classList.replace('border-white/10', 'border-secondary');
                    btnConfirm.classList.remove('cursor-not-allowed');
                };
                img.onerror = () => {
                    overlay.classList.add('hidden');
                    btn.disabled = false;
                    alert("Error generando imagen. Prueba de nuevo.");
                };
                img.src = url;

            } catch (e) {
                overlay.classList.add('hidden');
                btn.disabled = false;
                alert("Problema con la conexión de IA.");
            }
        }

        function confirmImage() {
            const btnCheck = document.getElementById('btn-confirm');
            const btnPublish = document.getElementById('btn-publish');
            const btnSchedule = document.getElementById('btn-schedule-img');
            const status = document.getElementById('status-msg');

            // Visual confirm
            btnCheck.innerHTML = `<span class="material-symbols-outlined text-lg">verified</span> IMAGEN LISTA`;
            btnCheck.classList.replace('text-secondary', 'text-green-400');
            btnCheck.classList.replace('border-secondary', 'border-green-400');
            btnCheck.disabled = true;

            // Persistence
            localStorage.setItem('linkedin_confirmed_img', confirmedImgUrl);

            // Unlock actions
            btnPublish.disabled = false;
            btnPublish.classList.remove('border-white/10', 'text-white/30', 'cursor-not-allowed');
            btnPublish.classList.add('bg-primary', 'text-black', 'border-transparent');

            btnSchedule.disabled = false;
            btnSchedule.classList.remove('border-white/10', 'text-white/40', 'cursor-not-allowed');
            btnSchedule.classList.add('border-secondary', 'text-secondary');

            status.textContent = "LISTO PARA PROCEDER";
            status.className = "text-center text-[10px] text-green-400 mt-1 font-bold font-mono tracking-widest";
        }

        function scheduleFromImage() {
            localStorage.setItem('scheduling_complete_post', 'true');
            window.location.href = 'modulo_horario.html';
        }

        function goToPublish() {
            window.location.href = 'modulo_publicar.html';
        }
    </script>
</body>
</html>
