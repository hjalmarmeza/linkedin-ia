<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PostReady v4.0 - Centro de Publicación Pro</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: { 'display': ['Outfit', 'sans-serif'] },
                    colors: {
                        base: '#030712',
                        surface: '#0B0B0E',
                        surfaceLight: '#111827',
                        accent: '#38bdf8',
                        secondary: '#818cf8'
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .glass { @apply bg-surface/40 backdrop-blur-xl border border-white/5 shadow-2xl; }
            .glass-card { @apply bg-surfaceLight/30 backdrop-blur-md border border-white/10 rounded-[48px] shadow-lg transition-all duration-300; }
            .text-gradient { @apply bg-clip-text text-transparent bg-gradient-to-r from-accent to-secondary; }
        }
        body { @apply bg-base text-gray-100 font-display; }

        .ai-loader {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(56, 189, 248, 0.1);
            border-bottom-color: #38bdf8;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body class="w-full min-h-screen pb-40 px-5 flex flex-col items-center">

    <header class="w-full max-w-md pt-8 pb-6 flex justify-between items-center bg-base/80 backdrop-blur sticky top-0 z-50">
        <button onclick="window.location.href='modulo_imagen.html'" class="w-12 h-12 rounded-full bg-surfaceLight/30 flex items-center justify-center border border-white/5 hover:bg-white/10 transition-colors">
            <span class="material-symbols-rounded text-gray-300 text-2xl">arrow_back</span>
        </button>
        <div class="flex flex-col items-center">
            <h1 class="text-lg font-black tracking-tight leading-none text-center">
                POST<span class="text-accent">READY</span> <span class="text-secondary/60 text-xs font-medium ml-1">v4.0</span>
            </h1>
            <p class="text-[9px] text-accent uppercase tracking-[0.2em] font-extrabold mt-1 opacity-80">CENTRO DE PUBLICACIÓN PRO</p>
        </div>
        <div class="w-12 h-12"></div>
    </header>

    <main class="w-full max-w-md flex flex-col gap-6 mt-4">
        
        <!-- Vista previa del Post -->
        <section class="flex flex-col gap-4">
            <div class="glass-card overflow-hidden bg-surface/40 border border-white/5 p-2">
                <!-- Imagen confirmada -->
                <div class="relative w-full aspect-square rounded-[40px] overflow-hidden bg-black border border-white/5">
                    <img id="final-img" src="" class="w-full h-full object-cover">
                    <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black/80 via-black/40 to-transparent">
                        <span id="final-style" class="text-[9px] font-black text-accent uppercase tracking-[0.2em] bg-accent/10 px-3 py-1 rounded-full border border-accent/20 backdrop-blur">
                            ESTILO: --
                        </span>
                    </div>
                </div>

                <!-- Cuerpo del post -->
                <div class="p-6">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-accent to-secondary shadow-[0_0_15px_rgba(56,189,248,0.3)]"></div>
                        <div>
                            <p class="text-[11px] font-black uppercase tracking-widest text-white">Tu Perfil Profesional</p>
                            <p class="text-[9px] text-accent/60 font-medium tracking-tighter uppercase">Visualización Cloud Sync</p>
                        </div>
                    </div>
                    <div class="relative">
                        <p id="final-text" class="text-[13px] text-gray-300 leading-relaxed font-medium whitespace-pre-wrap"></p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Detalles Técnicos -->
        <section class="grid grid-cols-2 gap-4">
            <div class="bg-surfaceLight/20 rounded-[24px] border border-white/5 p-5 flex flex-col gap-1 backdrop-blur">
                <span class="text-[10px] text-gray-500 uppercase font-black tracking-widest">Intención</span>
                <span id="final-intention" class="text-xs font-bold text-accent tracking-tighter uppercase">--</span>
            </div>
            <div class="bg-surfaceLight/20 rounded-[24px] border border-white/5 p-5 flex flex-col gap-1 backdrop-blur">
                <span class="text-[10px] text-gray-500 uppercase font-black tracking-widest">Estado ID</span>
                <span id="final-row" class="text-xs font-bold text-secondary-400 tracking-tighter text-secondary">#--</span>
            </div>
        </section>

        <!-- Botón de Acción -->
        <section class="mt-6">
            <button onclick="publishNow()" id="btn-publish" class="w-full h-16 rounded-[32px] bg-accent text-white font-black text-xs tracking-[0.2em] uppercase flex items-center justify-center gap-3 shadow-[0_20px_50px_-10px_rgba(56,189,248,0.5)] active:scale-95 transition-all">
                <span class="material-symbols-rounded text-2xl">rocket_launch</span>
                DISPARAR PUBLICACIÓN
            </button>
            <p id="status-msg" class="text-center text-[10px] text-gray-600 font-bold tracking-[0.2em] uppercase mt-6 opacity-60">Sincronizando con Cloudinary & Make.com</p>
        </section>

    </main>

    <!-- Overlay de carga Premium -->
    <div id="publish-overlay" class="fixed inset-0 bg-base/95 backdrop-blur-xl hidden flex-col items-center justify-center z-[100] px-10 text-center">
        <div class="relative mb-12">
            <div class="absolute inset-0 bg-accent blur-[60px] opacity-20 animate-pulse"></div>
            <span class="ai-loader"></span>
        </div>
        <h2 id="overlay-title" class="text-3xl font-black mb-4 tracking-tighter uppercase">Despegando...</h2>
        <p id="overlay-msg" class="text-accent text-[10px] font-black tracking-[0.4em] uppercase leading-relaxed opacity-60">Conectando con Cloud Sync Engine</p>
    </div>

    <script>
        const UPLOAD_PRESET = "linkedinmatic_preset";
        const CLOUD_NAME = "dmvkaq9zc";
        const MAKE_WEBHOOK = "https://hook.eu2.make.com/4ykymbdc5iaz8q981tir3ublg6fpqe8g";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxyceiNIiq1nXjdGltdpdySvpPX7O6iB2hjkaAdjL-JHGb5mp-4L2e0V0xWRZzwc-NF/exec";

        let currentData = { text: "", img: "", row: "", intention: "", style: "" };

        window.onload = function () {
            currentData.text = localStorage.getItem('linkedin_current_text') || "Sin contenido detectable.";
            currentData.img = localStorage.getItem('linkedin_confirmed_img');
            currentData.row = localStorage.getItem('linkedin_current_row') || "0";
            currentData.intention = localStorage.getItem('linkedin_intention') || "authority";
            currentData.style = localStorage.getItem('linkedin_current_style') || "cinematic";

            if (!currentData.img) {
                alert("Sincronización de imagen fallida. Reintenta el estudio visual.");
                window.location.href = "modulo_imagen.html";
                return;
            }

            document.getElementById('final-img').src = currentData.img;
            document.getElementById('final-text').textContent = currentData.text;
            document.getElementById('final-row').textContent = `#${currentData.row}`;
            document.getElementById('final-intention').textContent = currentData.intention.toUpperCase();
            document.getElementById('final-style').textContent = `ESTILO: ${currentData.style.toUpperCase()}`;
        };

        async function publishNow() {
            const btn = document.getElementById('btn-publish');
            const overlay = document.getElementById('publish-overlay');
            const overlayMsg = document.getElementById('overlay-msg');
            const overlayTitle = document.getElementById('overlay-title');

            btn.disabled = true;
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');

            try {
                overlayMsg.textContent = "PASO 1: ENCRIPTANDO IMAGEN PARA LA NUBE...";
                const resBlob = await fetch(currentData.img);
                const blob = await resBlob.blob();

                const formData = new FormData();
                formData.append('file', blob);
                formData.append('upload_preset', UPLOAD_PRESET);

                const resCloud = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                const dataCloud = await resCloud.json();

                if (!dataCloud.secure_url) throw new Error("Error Cloudinary: " + (dataCloud.error?.message || "Check Credentials"));
                const permaLink = dataCloud.secure_url;

                overlayMsg.textContent = "PASO 2: DISPARANDO AUTOMATIZACIÓN (MAKE.COM)...";
                const payload = {
                    text: currentData.text,
                    imageUrl: permaLink,
                    rowNumber: parseInt(currentData.row),
                    style: currentData.style,
                    intention: currentData.intention
                };

                await fetch(MAKE_WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                overlayMsg.textContent = "PASO 3: REGISTRANDO EN GOOGLE CLOUD SYNC...";
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        rowNumber: parseInt(currentData.row),
                        imageUrl: permaLink,
                        style: currentData.style
                    })
                });

                overlayTitle.textContent = "¡MISIÓN CUMPLIDA!";
                overlayMsg.textContent = "CONTENIDO PUBLICADO Y SINCRONIZADO CORRECTAMENTE.";
                document.querySelector('.ai-loader').style.display = 'none';

                const checkIcon = document.createElement('span');
                checkIcon.className = "material-symbols-rounded text-accent text-7xl mb-6 shadow-[0_0_40px_rgba(56,189,248,0.4)]";
                checkIcon.textContent = "check_circle";
                document.querySelector('.relative.mb-12').appendChild(checkIcon);

                setTimeout(() => { window.location.href = "modulo_texto.html"; }, 3000);

            } catch (e) {
                console.error(e);
                overlayTitle.textContent = "ERROR CRÍTICO";
                overlayMsg.textContent = "FALLO EN EL LANZAMIENTO: " + e.message;
                overlayMsg.classList.replace('text-accent', 'text-red-400');

                const errorBtn = document.createElement('button');
                errorBtn.className = "mt-10 px-10 py-4 bg-white/5 border border-white/10 rounded-full text-[10px] font-black uppercase tracking-[0.2em] hover:bg-white/10 transition";
                errorBtn.textContent = "VOLVER A INTENTAR";
                errorBtn.onclick = () => location.reload();
                overlay.appendChild(errorBtn);
            }
        }
    </script>
</body>
</html>
