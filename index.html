<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinkedinMatic v41.40</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap');
        body { background-color: #050505; color: #e0e0e0; font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; }
        .cyber-card { background: rgba(10, 10, 10, 0.98); border: 1px solid #222; border-top: 3px solid #00f2ff; }
        .mobile-btn { height: 50px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; border: 1px solid #00f2ff; color: #00f2ff; font-size: 0.7rem; border-radius: 10px; font-weight: bold; background: rgba(0, 242, 255, 0.05); }
        .mobile-btn:active { background: #00f2ff; color: #000; transform: scale(0.95); }
        .publish-btn { background: #00f2ff; color: #000; border: none; font-size: 1rem; box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        .post-input { background: #000; border: 1px solid #333; color: #fff; line-height: 1.5; font-size: 13px; width: 100%; border-radius: 10px; padding: 15px; white-space: pre-wrap; }
    </style>
</head>
<body class="p-2 bg-black">
    <div class="max-w-md mx-auto space-y-4 pb-12">
        <div class="flex justify-between items-center p-4 cyber-card rounded-2xl mt-2">
            <div>
                <h1 class="text-xl font-bold font-['Orbitron'] text-white">LINKEDIN<span class="text-cyan-400">MATIC</span></h1>
                <p class="text-[9px] text-gray-500 tracking-[2px]">ESTRUCTURA JSON v41.40</p>
            </div>
        </div>

        <div class="p-4 cyber-card rounded-2xl grid grid-cols-2 gap-4">
            <button id="btnNewPost" class="mobile-btn">NUEVA NARRATIVA</button>
            <button id="btnNewImg" class="mobile-btn">NUEVA IMAGEN</button>
        </div>

        <div class="cyber-card rounded-2xl overflow-hidden relative min-h-[220px] flex items-center justify-center bg-[#111]">
            <img id="imgPreview" src="" class="w-full h-full object-cover transition-opacity duration-500 opacity-0">
            <div id="imgLoader" class="absolute text-cyan-400 text-xs animate-pulse font-['Orbitron']">SISTEMA OK...</div>
        </div>

        <div class="cyber-card rounded-2xl p-2">
            <textarea id="postText" rows="22" class="post-input border-none focus:ring-0" readonly></textarea>
        </div>

        <button id="btnPub" class="mobile-btn publish-btn w-full">PUBLICAR AHORA</button>
    </div>

    <script>
        const WEBHOOK_PUB = "https://hook.eu2.make.com/80rpa5t48aqprpltnwhrood646g91c63";

        const narrativas = [
            {
                t: "LA REVOLUCIÓN DE LA IA Y EL IMPACTO SOCIAL",
                c: "La Inteligencia Artificial está redefiniendo nuestro aporte a la sociedad al resolver problemas complejos de forma inmediata.\nAl democratizar el acceso a soluciones avanzadas, creamos un entorno equitativo donde el conocimiento fluye libremente.\n\nBeneficios clave de esta era digital:\n• Optimización de recursos en servicios básicos como salud y educación pública.\n• Reducción de barreras económicas para el desarrollo de nuevas ideas locales.\n• Ejecución de tareas críticas con una precisión que impulsa el crecimiento colectivo.\n\nLa IA actúa como un puente entre la necesidad y la solución, optimizando la entrega de valor en cada interacción humana.\nNo es solo automatización, sino una evolución en la colaboración profunda entre el pensamiento humano y la máquina.\nCada avance en procesamiento se traduce en una respuesta ágil ante desafíos globales y climáticos urgentes hoy.\nEstamos construyendo una base sólida para que las futuras generaciones hereden un sistema más justo y transparente.\nLa tecnología es el pilar fundamental que sostiene la nueva arquitectura de bienestar que diseñamos en este siglo.",
                p: "Futuristic artificial intelligence neural network, glowing cyan data flows, abstract digital brain, 8k cinematic lighting, no people"
            }
        ];

        function updatePost() {
            const data = narrativas[0];
            const tags = "#IA #Sociedad #Eficiencia #Tecnologia #Productividad #Futuro #Innovacion #Estrategia";
            document.getElementById('postText').value = `🚀 ${data.t}\n\n${data.c}\n\n\n${tags}`;
        }

        function updateImg() {
            const data = narrativas[0];
            const loader = document.getElementById('imgLoader');
            const img = document.getElementById('imgPreview');
            const url = `https://pollinations.ai/p/${encodeURIComponent(data.p)}?width=1080&height=600&seed=${Date.now()}&nologo=true`;
            img.src = url;
            img.dataset.url = url;
            img.onload = () => { img.classList.replace('opacity-0', 'opacity-100'); loader.style.display = "none"; };
        }

        async function publicar() {
            const btn = document.getElementById('btnPub');
            const payload = {
                "post": document.getElementById('postText').value,
                "Url_imagen": document.getElementById('imgPreview').dataset.url
            };

            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            try {
                // EL CAMBIO CLAVE: Quitamos 'no-cors' para que el navegador envíe el Content-Type correcto
                await fetch(WEBHOOK_PUB, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify(payload)
                });
                alert("✓ ENVIADO: Ahora Make debería ver los campos lila.");
            } catch (e) {
                alert("Error de envío. Revisa tu conexión.");
            } finally {
                btn.innerText = "PUBLICAR AHORA";
                btn.disabled = false;
            }
        }

        document.getElementById('btnNewPost').onclick = updatePost;
        document.getElementById('btnNewImg').onclick = updateImg;
        document.getElementById('btnPub').onclick = publicar;
        window.onload = () => { updatePost(); updateImg(); };
    </script>
</body>
</html>
