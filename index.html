    let paquetesUsados = JSON.parse(localStorage.getItem('paquetesUsados') || '[]');
    let paquetesPublicados = parseInt(localStorage.getItem('paquetesPublicados') || '0');
    let currentPaquete = null;

    actualizarContadores();

    function generarNarrativa() {
        if (paquetesUsados.length >= paquetes.length) {
            document.getElementById('warning-message').style.display = 'block';
            return;
        }

        let paquetesDisponibles = paquetes.filter(p => !paquetesUsados.includes(p.id));
        currentPaquete = paquetesDisponibles[Math.floor(Math.random() * paquetesDisponibles.length)];

        let postCompleto = `${currentPaquete.apertura}\n\n${currentPaquete.contexto}\n\n${currentPaquete.puntos.join('\n\n')}\n\n${currentPaquete.cierre}\n\n${currentPaquete.frase_transicion}\n\n${currentPaquete.tags}`;
        
        document.getElementById('post-text').value = postCompleto;
        paquetesUsados.push(currentPaquete.id);
        localStorage.setItem('paquetesUsados', JSON.stringify(paquetesUsados));
        
        regenerarImagen();
        actualizarContadores();
    }

    // ============================================
    // FUNCIÓN MODIFICADA: Usar Unsplash API
    // ============================================
    async function regenerarImagen() {
        if (!currentPaquete) return;
        
        const btnImg = document.getElementById('btn-img');
        const postImage = document.getElementById('post-image');
        
        btnImg.disabled = true;
        btnImg.innerHTML = '<div class="loading"></div> GENERANDO IMAGEN...';
        
        try {
            // Términos de búsqueda basados en la categoría del post
            const searchTerms = [
                'professional technology executive',
                'futuristic workspace',
                'artificial intelligence',
                'modern technology',
                'business innovation',
                'tech professional',
                'digital transformation',
                'cybersecurity',
                'data science'
            ];
            
            const randomTerm = searchTerms[Math.floor(Math.random() * searchTerms.length)];
            
            // Unsplash API (usando acceso público)
            const unsplashUrl = `https://source.unsplash.com/1200x630/?${encodeURIComponent(randomTerm)},professional,tech&sig=${Date.now()}`;
            
            // Cargar la imagen
            postImage.src = unsplashUrl;
            
            // Verificar que la imagen cargue correctamente
            postImage.onerror = function() {
                // Si falla, usar imagen de respaldo
                postImage.src = 'https://source.unsplash.com/1200x630/?technology,business&sig=' + Date.now();
            };
            
            btnImg.innerHTML = '🖼️ GENERAR IMAGEN CIBER-REALISTA';
            
        } catch (error) {
            console.error('Error al generar imagen:', error);
            btnImg.innerHTML = '⚠️ ERROR - REINTENTAR';
            // Imagen de respaldo en caso de error
            postImage.src = 'https://source.unsplash.com/1200x630/?technology&sig=' + Date.now();
        } finally {
            btnImg.disabled = false;
        }
    }
    // ============================================
    // FIN DE LA FUNCIÓN MODIFICADA
    // ============================================

    function publicarEnLinkedin() {
        let texto = document.getElementById('post-text').value;
        let url = `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}&summary=${encodeURIComponent(texto)}`;
        window.open(url, '_blank');
        
        paquetesPublicados++;
        localStorage.setItem('paquetesPublicados', paquetesPublicados.toString());
        actualizarContadores();
    }

    function reiniciarHistorial() {
        if (confirm('¿Estás seguro de que deseas reiniciar el historial? Esto borrará todos los registros de posts generados y publicados.')) {
            localStorage.removeItem('paquetesUsados');
            localStorage.removeItem('paquetesPublicados');
            paquetesUsados = [];
            paquetesPublicados = 0;
            actualizarContadores();
            document.getElementById('post-text').value = '';
            document.getElementById('post-image').src = '';
            document.getElementById('warning-message').style.display = 'none';
            currentPaquete = null;
        }
    }

    function actualizarContadores() {
        document.getElementById('total-posts').textContent = paquetes.length;
        document.getElementById('publicados').textContent = paquetesPublicados;
        document.getElementById('disponibles').textContent = paquetes.length - paquetesUsados.length;
        
        let circle = document.getElementById('status-circle');
        if (paquetesUsados.length >= paquetes.length) {
            circle.style.background = 'red';
        } else if (paquetesUsados.length > 0) {
            circle.style.background = 'orange';
        } else {
            circle.style.background = 'green';
        }
    }
</script>
