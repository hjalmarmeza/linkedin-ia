<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA LinkedIn Studio Pro</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 15px; margin: 0; }
        .container { background: #161b22; padding: 20px; border-radius: 12px; width: 100%; max-width: 500px; border: 1px solid #30363d; }
        textarea { width: 100%; height: 350px; background: #0d1117; color: #e6edf3; border: 1px solid #30363d; padding: 10px; border-radius: 6px; resize: none; box-sizing: border-box; font-size: 14px; line-height: 1.5; }
        .img-box { width: 100%; min-height: 250px; background: #000; border-radius: 8px; margin: 15px 0; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #444; position: relative; }
        #postImage { width: 100%; display: none; }
        button { width: 100%; padding: 15px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-gen { background: #238636; color: white; }
        .btn-pub { background: #1f6feb; color: white; }
        .btn-pub:disabled { opacity: 0.5; }
        #status { font-size: 0.8rem; text-align: center; color: #8b949e; }
    </style>
</head>
<body>
<div class="container">
    <textarea id="postText" placeholder="Haz clic en Generar..."></textarea>
    <div class="img-box">
        <span id="loader">Esperando IA...</span>
        <img id="postImage">
    </div>
    <button class="btn-gen" onclick="generar()">GENERAR POST E IMAGEN IA REAL</button>
    <button id="btnPub" class="btn-pub" onclick="publicar()" disabled>PUBLICAR EN LINKEDIN</button>
    <div id="status">v17.0 - Alta Impacto & IA Real</div>
</div>

<script>
    const WEBHOOK = "https://hook.eu2.make.com/hiurq1grt6euyiw1tdlkcw5rst9uxuuo";

    function generar() {
        const temas = [
            { t: "IA AGÉNTICA: El Futuro Autónomo", p: "autonomous_ai_agents_working_in_futuristic_digital_ecosystem_hyper_realistic_cinematic_4k" },
            { t: "CIUDADES INTELIGENTES: Gemelos Digitales", p: "smart_city_digital_twin_with_glowing_data_points_neural_networks_high_detail" }
        ];
        const sel = temas[Math.floor(Math.random() * temas.length)];
        
        // Texto de alto impacto (20 líneas)
        const texto = `🚀 TENDENCIA DISRUPTIVA: ${sel.t}\n\nLa inteligencia artificial ha pasado de ser una herramienta de consulta a un agente de ejecución. Este cambio redefine la eficiencia en empresas y el confort de los usuarios.\n\n🔹 BENEFICIOS CLAVE:\n1. Ejecución Autónoma: La IA toma decisiones lógicas sin supervisión constante.\n2. Análisis en Tiempo Real: Procesamiento de variables masivas al instante.\n3. Escalabilidad Total: Crecimiento orgánico sin aumentar costos fijos.\n\nEn conclusión, el futuro pertenece a quienes integren hoy estas tecnologías autónomas.\n\n#IA #Innovation #FutureTech #Analitica #SmartSystems`;

        document.getElementById('postText').value = texto;
        const img = document.getElementById('postImage');
        const loader = document.getElementById('loader');
        
        loader.innerText = "IA DIBUJANDO...";
        img.style.display = "none";
        
        // Generamos un enlace (URL) limpio. LinkedIn necesita un enlace HTTP/HTTPS real
        const seed = Math.floor(Math.random() * 1000000);
        const iaUrl = `https://image.pollinations.ai/prompt/${sel.p}?width=1024&height=512&seed=${seed}&nologo=true`;
        
        img.src = iaUrl;
        img.onload = () => {
            loader.style.display = "none";
            img.style.display = "block";
            document.getElementById('btnPub').disabled = false;
            document.getElementById('status').innerText = "✓ Post e Imagen IA listos.";
        };
    }

    async function publicar() {
        const btn = document.getElementById('btnPub');
        btn.disabled = true;
        
        // Enviamos los datos como texto plano (URL e Imagen)
        const payload = {
            mensaje: document.getElementById('postText').value,
            url_imagen: document.getElementById('postImage').src
        };

        try {
            const res = await fetch(WEBHOOK, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(payload) 
            });
            if(res.ok) document.getElementById('status').innerText = "✅ ENVIADO A LINKEDIN";
        } catch (e) {
            alert("Error al conectar con Make");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
