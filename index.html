<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LinkedinMatic v41.58 - Autoridad Exponencial</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #050505; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 650px; width: 100%; background: #111; padding: 25px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        h2 { color: #00f2ff; text-align: center; font-size: 1.4rem; margin-top: 0; letter-spacing: 2px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        #post-text { width: 100%; height: 480px; background: #000; color: #fff; border: 1px solid #444; padding: 18px; box-sizing: border-box; font-size: 14.5px; line-height: 1.7; border-radius: 5px; resize: none; font-family: 'Segoe UI', sans-serif; }
        #post-image { width: 100%; height: auto; margin-top: 15px; border-radius: 8px; display: block; background: #1a1a1a; min-height: 280px; border: 1px solid #222; }
        .controls { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 14px; cursor: pointer; font-weight: bold; border-radius: 6px; border: none; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-gen { background: #00f2ff; color: #000; grid-column: span 2; }
        .btn-img { background: #7000ff; color: #fff; }
        .btn-pub { background: #238636; color: #fff; }
        .status-area { display: flex; align-items: center; justify-content: center; margin-top: 15px; font-size: 11px; color: #555; }
        #status-circle { width: 10px; height: 10px; border-radius: 50%; background: gray; margin-left: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2>LinkedinMatic v41.58</h2>
    <textarea id="post-text" placeholder="Construyendo autoridad técnica..."></textarea>
    
    <img id="post-image" src="" alt="Visual Surrealismo Tecnológico">
    
    <div class="controls">
        <button class="btn-gen" onclick="generarNarrativa()">🚀 GENERAR POST DE AUTORIDAD</button>
        <button class="btn-img" onclick="regenerarImagen()">🖼️ ITERAR IMAGEN</button>
        <button class="btn-pub" onclick="publicarEnLinkedin()">📤 PUBLICAR AHORA</button>
    </div>

    <div class="status-area">
        SISTEMA DE ALTA DENSIDAD ACTIVO <div id="status-circle"></div>
    </div>
</div>

<script>
    const matriz = {
        "ESTRATEGIA": {
            titulos: ["EL ROI DE LA IA: De la experimentación a la monetización real.", "¿Tu IA genera eficiencia o ingresos? El dilema del C-Suite.", "IA ESTRATÉGICA: Cómo capturar cuota de mercado en la era algorítmica."],
            contexto: "En un mercado saturado de promesas técnicas, la diferencia entre el éxito y el gasto reside en la alineación del algoritmo con el flujo de caja.",
            puntos: [
                "• **Monetización de Activos Digitales:** No basta con procesar datos; el reto es empaquetar la inferencia como un producto de alto margen operativo.",
                "• **Captura de Cuota Algorítmica:** La ventaja competitiva hoy se mide en la velocidad para iterar modelos que respondan a la demanda del mercado en tiempo real.",
                "• **Gobernanza del C-Suite:** La IA debe dejar de ser un proyecto de TI para convertirse en el eje central de la planificación financiera y estratégica."
            ],
            cierre: "La estrategia no es 'implementar IA', es redefinir el modelo de negocio a través de la inteligencia.",
            tags: "#EstrategiaIA #Negocios #ROI #Liderazgo"
        },
        "SOSTENIBILIDAD": {
            titulos: ["IA VERDE: ¿Es tu infraestructura parte del problema o de la solución?", "Sostenibilidad Algorítmica: Innovar sin hipotecar el futuro energético."],
            contexto: "La escalabilidad de la inteligencia artificial enfrenta hoy su mayor límite: el consumo energético y la huella térmica de los grandes modelos.",
            puntos: [
                "• **Eficiencia Térmica:** La optimización de la refrigeración en centros de datos ya no es opcional, es una métrica de supervivencia operativa y financiera.",
                "• **Algoritmos de Bajo Consumo:** El desarrollo de arquitecturas 'Small Language Models' permite reducir TFLOPS sin sacrificar la precisión del resultado.",
                "• **Soberanía Energética:** La transición hacia nubes alimentadas por renovables define hoy quién puede escalar a largo plazo sin riesgos regulatorios."
            ],
            cierre: "La IA del mañana será sostenible o simplemente no podrá escalar en el mercado global.",
            tags: "#IAVerde #Sostenibilidad #CleanTech #ESG"
        }
        // ... (Aquí se completan los pilares con esta nueva densidad)
    };

    const categorias = [
        { n: "Economía de la Inteligencia", p: "ESTRATEGIA" },
        { n: "Sostenibilidad e IA Verde", p: "SOSTENIBILIDAD" }
        // ... Mapa de las 27 categorías
    ];

    const aperturas = [
        "El liderazgo moderno exige una visión clara sobre la infraestructura digital.",
        "La frontera entre lo posible y lo inevitable se ha disuelto hoy mismo.",
        "No estamos ante una era de cambios, sino ante un cambio de era sistémico."
    ];

    let categoriaActual = "";

    function generarNarrativa() {
        const item = categorias[Math.floor(Math.random() * categorias.length)];
        categoriaActual = item.n;
        const pilar = matriz[item.p];
        const hook = aperturas[Math.floor(Math.random() * aperturas.length)];
        const titulo = pilar.titulos[Math.floor(Math.random() * pilar.titulos.length)];
        
        let texto = `${titulo.toUpperCase()}\n\n${hook}\n\n${pilar.contexto}\n\nAnalizamos tres ejes fundamentales para la ejecución profesional en ${item.n}:\n\n`;
        pilar.puntos.forEach(pt => { texto += pt + "\n\n"; });
        texto += `${pilar.cierre}\n\n`;
        texto += "Es momento de construir sistemas que no solo procesen datos, sino que inspiren resultados reales y medibles.\n\n";
        texto += pilar.tags;

        document.getElementById('post-text').value = texto;
        regenerarImagen();
    }

    function regenerarImagen() {
        if (!categoriaActual) return;
        const prompt = `Hyper-realistic cinematic cyber-realism, surreal technological organic fusion of ${categoriaActual}, cosmic violet and gold lighting, high-impact textures, 8k, no text`;
        const seed = Math.floor(Math.random() * 999999);
        document.getElementById('post-image').src = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1080&height=1080&seed=${seed}`;
        document.getElementById('status-circle').style.background = "gray";
    }

    async function publicarEnLinkedin() {
        const text = document.getElementById('post-text').value;
        const image = document.getElementById('post-image').src;
        const webhookUrl = "https://hook.eu2.make.com/l7s7fv2ldmbrwvmbmoqw74x2jx68w4ox"; 
        try {
            const response = await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, image })
            });
            if (response.ok) document.getElementById('status-circle').style.background = "#238636";
        } catch (e) { alert("Error de conexión"); }
    }
</script>
</body>
</html>
