<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Deep Insight Pro v24.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent: #58a6ff; --bg: #0d1117; --card: #161b22; --success: #238636; --primary: #1f6feb; --danger: #f85149; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; padding: 15px; margin: 0; }
        .container { background: var(--card); padding: 25px; border-radius: 16px; width: 100%; max-width: 800px; border: 1px solid #30363d; box-shadow: 0 16px 48px rgba(0,0,0,0.6); }
        .news-badge { background: #f85149; color: white; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .news-title { font-size: 14px; color: var(--accent); margin-bottom: 15px; font-weight: bold; min-height: 40px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .control-row { display: flex; gap: 10px; margin-bottom: 15px; }
        select, button { border-radius: 8px; font-weight: 600; font-size: 13px; transition: 0.2s; }
        select { background: var(--bg); color: white; border: 1px solid #30363d; padding: 10px; flex: 1; }
        textarea { width: 100%; height: 380px; background: var(--bg); color: #e6edf3; border: 1px solid #30363d; padding: 15px; border-radius: 8px; font-size: 13px; line-height: 1.5; resize: none; box-sizing: border-box; }
        .img-preview { width: 100%; min-height: 250px; background: #000; border-radius: 12px; margin: 15px 0; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #444; }
        #postImg { width: 100%; display: none; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-gen { background: var(--success); color: white; height: 50px; }
        .btn-img { background: #8957e5; color: white; height: 50px; }
        .btn-clear { background: #30363d; color: #f85149; border: 1px solid #f85149; height: 50px; }
        .btn-pub { background: var(--primary); color: white; height: 55px; width: 100%; margin-top: 10px; font-size: 15px; }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.3; }
        #status { font-size: 12px; text-align: center; color: #8b949e; margin-top: 15px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="news-badge"><i class="fas fa-bolt"></i> TENDENCIAS REALES</div>
    <div id="newsTopic" class="news-title">Esperando nueva generación...</div>

    <div class="control-row">
        <select id="toneSelect">
            <option value="Inspirador">Redacción: Inspiradora</option>
            <option value="Técnico">Redacción: Técnica</option>
            <option value="Crítico">Redacción: Crítica</option>
        </select>
        <select id="formatSelect">
            <option value="list">Formato: Listado</option>
            <option value="story">Formato: Narrativo</option>
        </select>
    </div>

    <textarea id="postText" placeholder="Paso 1: Presiona GENERAR TEXTO..."></textarea>
    
    <div class="img-preview">
        <div id="loader" style="display:none;"><i class="fas fa-atom fa-spin fa-2x"></i></div>
        <img id="postImg">
    </div>

    <div class="btn-grid">
        <button class="btn-gen" onclick="generarAnalisis()"><i class="fas fa-file-alt"></i> GENERAR TEXTO</button>
        <button id="btnImg" class="btn-img" onclick="generarImagen()" disabled><i class="fas fa-image"></i> GENERAR IMAGEN</button>
        <button class="btn-clear" onclick="limpiarTodo()"><i class="fas fa-eraser"></i> LIMPIAR PIZARRA</button>
        <button id="btnPub" class="btn-pub" onclick="publicar()" disabled style="grid-column: span 1;"><i class="fab fa-linkedin"></i> PUBLICAR</button>
    </div>
    
    <div id="status">v24.0 - IA Dinámica Lista</div>
</div>

<script>
    const NEWS_API_KEY = "7b6710d7c32347a6b2810545dc5307a6b2810545dc530";
    const WEBHOOK_URL = "https://hook.eu2.make.com/6bbwbx4zr42kwe88t5ggvu9hbb9vyh7g";
    
    let currentTopic = "";
    let finalImageUrl = "";
    let newsPool = [
        "Impacto de la IA Agéntica en Procesos Corporativos",
        "Gemelos Digitales y la Eficiencia Operativa 4.0",
        "Seguridad Predictiva en Entornos Cloud Híbridos",
        "Democratización de la Analítica de Datos con IA"
    ];

    // Cargar noticias al inicio para tener variedad
    async function loadNews() {
        try {
            const res = await fetch(`https://newsapi.org/v2/everything?q=Artificial+Intelligence+Business&language=es&sortBy=publishedAt&pageSize=10&apiKey=${NEWS_API_KEY}`);
            const data = await res.json();
            if(data.articles && data.articles.length > 0) {
                newsPool = data.articles.map(a => a.title);
            }
        } catch(e) { console.log("Usando pool de respaldo."); }
    }

    function generarAnalisis() {
        // Seleccionar un tema nuevo aleatorio cada vez
        currentTopic = newsPool[Math.floor(Math.random() * newsPool.length)];
        const tone = document.getElementById('toneSelect').value;
        const format = document.getElementById('formatSelect').value;
        
        document.getElementById('newsTopic').innerText = "TEMA ACTUAL: " + currentTopic;

        let intro = format === 'list' ? 
            "¿Cómo influye este avance en la ventaja competitiva?" : 
            "Imaginen que lo que hoy es tendencia mañana será la base de nuestra operatividad.";

        let body = [
            `🚀 ANÁLISIS ESTRATÉGICO: ${currentTopic.toUpperCase()}`,
            "",
            intro,
            "",
            "La realidad tecnológica nos exige una adaptación constante para no perder relevancia en el ecosistema digital.",
            "Desde una perspectiva " + tone.toLowerCase() + ", esta evolución subraya que el liderazgo hoy es inseparable de la analítica avanzada.",
            "",
            "🔹 PUNTOS CLAVE DE VALOR:",
            "• Optimización de procesos críticos mediante lógica predictiva.",
            "• Reducción de la fricción operativa en entornos de alta demanda.",
            "• Fortalecimiento de la seguridad mediante protocolos neuronales.",
            "• Capacidad de respuesta inmediata ante variables del mercado.",
            "• Escalabilidad de soluciones basadas en aprendizaje continuo.",
            "",
            "Al observar el panorama global, queda claro que la tecnología es solo el punto de partida.",
            "El éxito real reside en la visión humana capaz de dirigir estos sistemas hacia resultados concretos.",
            "Integrar estas herramientas hoy permite construir las bases de la solidez empresarial para la próxima década.",
            "",
            "En conclusión, el cambio es inevitable; el liderazgo, opcional.",
            "¿Qué impacto proyectas tú para este desarrollo en tu sector?",
            "",
            "#IA #Innovation #Future #Liderazgo #Analitica #Estrategia #Negocios #Tech"
        ];

        document.getElementById('postText').value = body.join("\n");
        document.getElementById('btnImg').disabled = false;
        document.getElementById('status').innerText = "✓ Análisis nuevo generado.";
    }

    function generarImagen() {
        const loader = document.getElementById('loader');
        const img = document.getElementById('postImg');
        const style = document.getElementById('styleSelect')?.value || "photorealistic";

        img.style.display = "none";
        loader.style.display = "block";
        
        const seed = Date.now();
        // Genera imagen basada en el tema ACTUAL
        finalImageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(currentTopic + " " + style)}?width=1200&height=630&seed=${seed}&nologo=true`;
        
        img.src = finalImageUrl;
        img.onload = () => {
            loader.style.display = "none";
            img.style.display = "block";
            document.getElementById('btnPub').disabled = false;
            document.getElementById('status').innerText = "✓ Imagen coherente con el post lista.";
        };
    }

    function limpiarTodo() {
        document.getElementById('postText').value = "";
        document.getElementById('postImg').style.display = "none";
        document.getElementById('newsTopic').innerText = "Pizarra limpia";
        document.getElementById('btnImg').disabled = true;
        document.getElementById('btnPub').disabled = true;
        document.getElementById('status').innerText = "Esperando nueva generación...";
        finalImageUrl = "";
    }

    async function publicar() {
        const btn = document.getElementById('btnPub');
        btn.disabled = true;
        document.getElementById('status').innerText = "Publicando...";

        try {
            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    mensaje: document.getElementById('postText').value,
                    url_imagen: finalImageUrl
                })
            });
            if(res.ok) alert("¡Publicado exitosamente!");
        } catch(e) { alert("Error de conexión"); }
        btn.disabled = false;
    }

    window.onload = loadNews;
</script>
</body>
</html>
