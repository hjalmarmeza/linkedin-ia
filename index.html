<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA Strategic Studio v40.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent: #58a6ff; --bg: #0d1117; --card: #161b22; --success: #238636; --primary: #1f6feb; --danger: #f85149; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background: var(--card); padding: 15px; border-radius: 12px; width: 100%; max-width: 500px; border: 1px solid #30363d; }
        .header-status { font-size: 11px; font-weight: bold; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .status-red { color: var(--danger); background: rgba(248, 81, 73, 0.1); border-color: var(--danger); }
        .status-blue { color: var(--accent); background: rgba(88, 166, 255, 0.1); border-color: var(--accent); }
        .input-manual { width: 100%; background: #000; color: var(--accent); border: 1px solid #444; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; font-style: italic; }
        textarea { width: 100%; height: 420px; background: var(--bg); color: #e6edf3; border: 1px solid #30363d; padding: 15px; border-radius: 8px; font-size: 13px; line-height: 1.6; resize: none; margin-bottom: 12px; }
        .img-preview { width: 100%; height: 230px; background: #000; border-radius: 8px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; border: 1px solid #30363d; overflow: hidden; }
        #postImg { width: 100%; height: 100%; object-fit: cover; display: none; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { height: 50px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; color: white; transition: 0.2s; }
        .btn-gen { background: var(--success); }
        .btn-img { background: #8957e5; }
        .btn-clear { background: #30363d; border: 1px solid var(--danger); color: var(--danger); }
        .btn-pub { background: var(--primary); }
        button:disabled { opacity: 0.4; filter: grayscale(1); pointer-events: none; }
        #status { font-size: 10px; text-align: center; color: #8b949e; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
<div class="container">
    <div id="engineBox" class="header-status status-red">
        <span><i class="fas fa-shield-virus"></i> <span id="apiLabel">MODO RESILIENTE</span></span>
        <span id="newsSource">ESPERANDO</span>
    </div>
    <input type="text" id="manualTopic" class="input-manual" placeholder="Tema personalizado (Análisis Ético-Eficiente)...">
    <textarea id="postText" placeholder="Optimizando túneles de datos..."></textarea>
    <div class="img-preview">
        <div id="loader" style="display:none;"><i class="fas fa-atom fa-spin fa-3x"></i></div>
        <img id="postImg">
    </div>
    <div class="action-grid">
        <button id="btnGen" class="btn-gen" onclick="generarAnalisis()" disabled><i class="fas fa-sync fa-spin"></i> BUSCANDO...</button>
        <button id="btnImg" class="btn-img" onclick="generarImagen()" disabled><i class="fas fa-magic"></i> IMAGEN</button>
        <button class="btn-clear" onclick="limpiarYRefrescar()"><i class="fas fa-eraser"></i> LIMPIAR</button>
        <button id="btnPub" class="btn-pub" onclick="publicar()" disabled><i class="fab fa-linkedin"></i> PUBLICAR</button>
    </div>
    <div id="status">v40.0 - Redundancia de Proxies Activa</div>
</div>

<script>
    const API_KEYS = {
        newsapi: "7b6710d7c32347a6b2810545dc5307a6b2810545dc530",
        gnews: "b97f9baa6fcb9856ef2f803fd3e68c7a",
        currents: "2MPkzgzuySxwVFTooMFaC0HcOkl3yjwdKnfN3cPbVEUG9VDJ",
        mediastack: "21db872475f860207b63b3472f30588a"
    };
    const WEBHOOK_URL = "https://hook.eu2.make.com/6bbwbx4zr42kwe88t5ggvu9hbb9vyh7g";
    
    let activeTopic = "";
    let finalImageUrl = "";
    const searchTerms = ["Inteligencia Artificial ética", "automatización responsable", "IA eficiencia operativa", "gobierno IA corporativa"];

    async function fetchNewsInCascade() {
        const engineBox = document.getElementById('engineBox');
        const newsSource = document.getElementById('newsSource');
        const apiLabel = document.getElementById('apiLabel');
        const btnGen = document.getElementById('btnGen');

        activeTopic = ""; 
        engineBox.className = "header-status status-red";
        btnGen.disabled = true;
        btnGen.innerHTML = '<i class="fas fa-sync fa-spin"></i> BUSCANDO...';

        const query = searchTerms[Math.floor(Math.random() * searchTerms.length)];
        const order = ["newsapi", "gnews", "currents", "mediastack"];
        const proxies = [
            "https://api.allorigins.win/get?url=",
            "https://api.corsproxy.io/?url="
        ];

        for (let i = 0; i < order.length; i++) {
            let apiName = order[i];
            let currentProxy = proxies[i % proxies.length]; // Alternar proxies
            
            try {
                apiLabel.innerText = `PROBANDO ${apiName.toUpperCase()}...`;
                let baseUrl = "";
                const cb = Date.now();

                if(apiName === "newsapi") baseUrl = `https://newsapi.org/v2/everything?q=${query}&language=es&sortBy=publishedAt&pageSize=5&apiKey=${API_KEYS.newsapi}`;
                if(apiName === "gnews") baseUrl = `https://gnews.io/api/v4/search?q=${query}&lang=es&max=5&apikey=${API_KEYS.gnews}`;
                if(apiName === "currents") baseUrl = `https://api.currentsapi.services/v1/search?keywords=${query}&language=es&apiKey=${API_KEYS.currents}`;
                if(apiName === "mediastack") baseUrl = `http://api.mediastack.com/v1/news?access_key=${API_KEYS.mediastack}&keywords=${query}&languages=es`;

                const res = await fetch(`${currentProxy}${encodeURIComponent(baseUrl + '&t=' + cb)}`);
                const proxyData = await res.json();
                
                // Manejar diferentes estructuras de proxy
                let rawContent = proxyData.contents ? JSON.parse(proxyData.contents) : proxyData;
                let title = "";

                if(apiName === "newsapi" && rawContent.articles?.length) title = rawContent.articles[0].title;
                if(apiName === "gnews" && rawContent.articles?.length) title = rawContent.articles[0].title;
                if(apiName === "currents" && rawContent.news?.length) title = rawContent.news[0].title;
                if(apiName === "mediastack" && rawContent.data?.length) title = rawContent.data[0].title;

                if(title) {
                    activeTopic = title;
                    engineBox.className = "header-status status-blue";
                    apiLabel.innerText = `EXITO: [${apiName.toUpperCase()}]`;
                    newsSource.innerText = activeTopic.substring(0, 20).toUpperCase() + "...";
                    btnGen.disabled = false;
                    btnGen.innerHTML = '<i class="fas fa-brain"></i> GENERAR';
                    return; 
                }
                // Espera pequeña antes de saltar a la siguiente para evitar bloqueos
                await new Promise(r => setTimeout(r, 1000));
            } catch(e) { console.log(`${apiName} falló con proxy.`); }
        }
        
        // Fail-safe si todas fallan realmente
        activeTopic = "Soberanía Tecnológica y el Dilema de la Automatización Ética";
        engineBox.className = "header-status status-blue";
        apiLabel.innerText = "SISTEMA: [AUTÓNOMO]";
        newsSource.innerText = "MODO RESPALDO";
        btnGen.disabled = false;
        btnGen.innerHTML = '<i class="fas fa-brain"></i> GENERAR';
    }

    function generarAnalisis() {
        const manual = document.getElementById('manualTopic').value;
        const base = manual.trim() !== "" ? manual : activeTopic;

        // MOTOR DE REESCRITURA ESTRATÉGICA v40
        const verbs = ["Gobernanza", "Sincronía", "Disrupción", "Ética", "Optimización"];
        const verb = verbs[Math.floor(Math.random() * verbs.length)];
        const cleanBase = base.replace(/la |el |de |en |que /gi, "").trim();
        const rewrittenTitle = `🚀 ${verb}: El impacto invisible de ${cleanBase}`;
        
        const content = [
            rewrittenTitle.toUpperCase(),
            "",
            "En la frontera de la transformación digital, nos enfrentamos a una verdad ineludible: la eficiencia sin ética es una deuda técnica condenada al fracaso.",
            "",
            `Al analizar la evolución de ${base.toLowerCase()}, observamos que la optimización operativa no puede ser el único fin. El liderazgo estratégico reside en la capacidad de orquestar sistemas que no solo sean rápidos, sino transparentes y responsables.`,
            "",
            "La verdadera ventaja competitiva hoy no se mide en milisegundos de procesamiento, sino en la solidez del marco moral que sustenta cada decisión algorítmica. La automatización debe ser el puente hacia un propósito humano, no su reemplazo.",
            "",
            "🔹 EJES DE ACCIÓN ESTRATÉGICA:",
            "• Integración de métricas de eficiencia bajo protocolos éticos activos.",
            "• Eliminación de sesgos en los flujos de decisión automatizados.",
            "• Transparencia algorítmica como base de la confianza corporativa.",
            "• Escalabilidad resiliente orientada al impacto humano positivo.",
            "• Gobernanza proactiva en el manejo de datos de alta sensibilidad.",
            "",
            "En conclusión, el éxito en la era de la IA será de aquellas organizaciones que logren transformar la eficiencia en integridad, construyendo un futuro donde la tecnología potencie nuestra humanidad en lugar de comprometerla.",
            "",
            "#IA #Estrategia #Etica #Eficiencia #Liderazgo #Negocios #TechResponsable"
        ];
        
        document.getElementById('postText').value = content.join("\n");
        document.getElementById('btnImg').disabled = false;
        document.getElementById('status').innerText = "✓ POST REESCRITO CON ÉXITO";
    }

    function generarImagen() {
        const loader = document.getElementById('loader');
        const img = document.getElementById('postImg');
        img.style.display = "none";
        loader.style.display = "block";
        const seed = Date.now();
        finalImageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(activeTopic + " 3d isometric business ethics efficiency render")}?width=1200&height=630&seed=${seed}&nologo=true`;
        img.src = finalImageUrl;
        img.onload = () => {
            loader.style.display = "none";
            img.style.display = "block";
            document.getElementById('btnPub').disabled = false;
        };
    }

    function limpiarYRefrescar() {
        document.getElementById('postText').value = "";
        document.getElementById('postImg').style.display = "none";
        document.getElementById('manualTopic').value = "";
        document.getElementById('btnImg').disabled = true;
        document.getElementById('btnPub').disabled = true;
        document.getElementById('status').innerText = "VACIANDO Y BUSCANDO NUEVAS FUENTES...";
        fetchNewsInCascade(); 
    }

    async function publicar() {
        const btn = document.getElementById('btnPub');
        btn.disabled = true;
        document.getElementById('status').innerText = "PUBLICANDO...";
        try {
            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mensaje: document.getElementById('postText').value, url_imagen: finalImageUrl })
            });
            if(res.ok) document.getElementById('status').innerText = "✅ PUBLICADO EXITOSAMENTE";
        } catch(e) { alert("Error de red"); btn.disabled = false; }
    }
    
    window.onload = fetchNewsInCascade;
</script>
</body>
</html>
