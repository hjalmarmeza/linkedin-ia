<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LinkedinMatic v41.60 - Alta Densidad</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #050505; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 650px; width: 100%; background: #111; padding: 25px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        h2 { color: #00f2ff; text-align: center; font-size: 1.4rem; margin-top: 0; letter-spacing: 2px; }
        #post-text { width: 100%; height: 500px; background: #000; color: #fff; border: 1px solid #444; padding: 18px; box-sizing: border-box; font-size: 14px; line-height: 1.7; border-radius: 5px; resize: none; }
        #post-image { width: 100%; height: auto; margin-top: 15px; border-radius: 8px; border: 1px solid #222; min-height: 250px; }
        .controls { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 14px; cursor: pointer; font-weight: bold; border-radius: 6px; border: none; text-transform: uppercase; transition: 0.3s; }
        .btn-gen { background: #00f2ff; color: #000; grid-column: span 2; }
        .btn-img { background: #7000ff; color: #fff; }
        .btn-pub { background: #238636; color: #fff; }
        #status-circle { width: 12px; height: 12px; border-radius: 50%; background: gray; display: inline-block; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>LinkedinMatic v41.60</h2>
        <textarea id="post-text"></textarea>
        <img id="post-image" src="">
        <div class="controls">
            <button class="btn-gen" onclick="generarNarrativa()">🚀 GENERAR POST DE AUTORIDAD</button>
            <button class="btn-img" onclick="regenerarImagen()">🖼️ CAMBIAR IMAGEN</button>
            <button class="btn-pub" onclick="publicarEnLinkedin()">📤 PUBLICAR EN LINKEDIN</button>
        </div>
        <div style="text-align:center; margin-top:15px; font-size:12px; color:#555;">
            Estado: <div id="status-circle"></div>
        </div>
    </div>

<script>
    // --- AQUÍ EMPIEZAN LOS DATOS ---
    const matriz = {
        "ESTRATEGIA": {
            titulos: ["EL ROI DE LA IA: De la monetización al impacto real.", "IA ESTRATÉGICA: Capturando cuota de mercado algorítmica."],
            contexto: "La IA ha dejado de ser una promesa tecnológica para convertirse en el eje de la planificación financiera corporativa.",
            puntos: [
                "• **Monetización de Activos:** No basta con procesar datos; el reto es empaquetar la inferencia como producto de alto margen.",
                "• **Captura de Cuota:** La ventaja competitiva se mide en la velocidad para iterar modelos que respondan a la demanda real.",
                "• **Gobernanza C-Suite:** La IA debe ser el eje central de la estrategia, asegurando que cada token genere un retorno medible."
            ],
            cierre: "La estrategia no es usar IA, es redefinir el negocio a través de ella.",
            tags: "#InteligenciaArtificial #EstrategiaIA #Negocios #ROI #LiderazgoExponencial #Innovación #Futuro #TechLeadership"
        }
        // [INSERTAR_MAS_PILARES_AQUÍ]
    };

    const categorias = [
        { n: "Economía de la Inteligencia", p: "ESTRATEGIA" },
        { n: "Venture Capital e IA", p: "ESTRATEGIA" },
        { n: "Liderazgo Exponencial", p: "ESTRATEGIA" }
        // [INSERTAR_MAS_CATEGORIAS_AQUÍ]
    ];

    const aperturas = [
        "El liderazgo moderno exige una visión clara sobre la infraestructura digital.",
        "La frontera entre lo posible y lo inevitable se ha disuelto hoy mismo.",
        "No estamos ante una era de cambios, sino ante un cambio de era sistémico."
    ];

    let categoriaActual = "";

    function generarNarrativa() {
        const item = categorias[Math.floor(Math.random() * categorias.length)];
        categoriaActual = item.n;
        const pilar = matriz[item.p];
        const hook = aperturas[Math.floor(Math.random() * aperturas.length)];
        const titulo = pilar.titulos[Math.floor(Math.random() * pilar.titulos.length)];
        
        let texto = `${titulo.toUpperCase()}\n\n${hook}\n\n${pilar.contexto}\n\nAnalizamos tres ejes fundamentales para la ejecución profesional en ${item.n}:\n\n`;
        pilar.puntos.forEach(pt => { texto += pt + "\n\n"; });
        texto += `${pilar.cierre}\n\n`;
        texto += "Es momento de construir sistemas que no solo procesen datos, sino que inspiren resultados reales.\n\n";
        texto += pilar.tags;

        document.getElementById('post-text').value = texto;
        regenerarImagen();
    }

    function regenerarImagen() {
        if (!categoriaActual) return;
        const prompt = `Hyper-realistic cinematic cyber-realism, technological organic fusion of ${categoriaActual}, cosmic violet and gold lighting, 8k, no text`;
        const seed = Math.floor(Math.random() * 999999);
        document.getElementById('post-image').src = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1080&height=1080&seed=${seed}`;
    }

    async function publicarEnLinkedin() {
        const text = document.getElementById('post-text').value;
        const image = document.getElementById('post-image').src;
        const webhookUrl = "https://hook.eu2.make.com/l7s7fv2ldmbrwvmbmoqw74x2jx68w4ox"; 
        try {
            const response = await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, image })
            });
            if (response.ok) document.getElementById('status-circle').style.background = "#238636";
        } catch (e) { alert("Error de envío"); }
    }
</script>
</body>
</html>
