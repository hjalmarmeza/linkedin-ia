<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA Strategic Studio v35.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent: #58a6ff; --bg: #0d1117; --card: #161b22; --success: #238636; --primary: #1f6feb; --danger: #f85149; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background: var(--card); padding: 15px; border-radius: 12px; width: 100%; max-width: 500px; border: 1px solid #30363d; }
        .header-status { font-size: 11px; font-weight: bold; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .status-red { color: var(--danger); background: rgba(248, 81, 73, 0.1); border-color: var(--danger); }
        .status-blue { color: var(--accent); background: rgba(88, 166, 255, 0.1); border-color: var(--accent); }
        .input-manual { width: 100%; background: #000; color: var(--accent); border: 1px solid #444; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; font-style: italic; }
        textarea { width: 100%; height: 400px; background: var(--bg); color: #e6edf3; border: 1px solid #30363d; padding: 15px; border-radius: 8px; font-size: 14px; line-height: 1.6; resize: none; margin-bottom: 12px; }
        .img-preview { width: 100%; height: 230px; background: #000; border-radius: 8px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; border: 1px solid #30363d; position: relative; }
        #postImg { width: 100%; height: 100%; object-fit: cover; display: none; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { height: 50px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; color: white; transition: 0.2s; }
        .btn-gen { background: var(--success); }
        .btn-img { background: #8957e5; }
        .btn-clear { background: #30363d; border: 1px solid var(--danger); color: var(--danger); }
        .btn-pub { background: var(--primary); }
        button:disabled { opacity: 0.4; filter: grayscale(1); pointer-events: none; }
        #status { font-size: 10px; text-align: center; color: #8b949e; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
<div class="container">
    <div id="engineBox" class="header-status status-red">
        <span><i class="fas fa-satellite-dish"></i> <span id="apiLabel">BUSCANDO...</span></span>
        <span id="newsSource">STANDBY</span>
    </div>
    <input type="text" id="manualTopic" class="input-manual" placeholder="Tema personalizado (prioridad alta)...">
    <textarea id="postText" placeholder="Esperando combustible de noticias frescas..."></textarea>
    <div class="img-preview">
        <div id="loader" style="display:none;"><i class="fas fa-atom fa-spin fa-3x"></i></div>
        <img id="postImg">
    </div>
    <div class="action-grid">
        <button id="btnGen" class="btn-gen" onclick="generarAnalisis()" disabled><i class="fas fa-sync fa-spin"></i> BUSCANDO...</button>
        <button id="btnImg" class="btn-img" onclick="generarImagen()" disabled><i class="fas fa-magic"></i> IMAGEN</button>
        <button class="btn-clear" onclick="limpiarYRefrescar()"><i class="fas fa-eraser"></i> LIMPIAR</button>
        <button id="btnPub" class="btn-pub" onclick="publicar()" disabled><i class="fab fa-linkedin"></i> PUBLICAR</button>
    </div>
    <div id="status">v35.0 - Análisis Estratégico Real</div>
</div>

<script>
    const API_KEYS = {
        newsapi: "7b6710d7c32347a6b2810545dc5307a6b2810545dc530",
        gnews: "b97f9baa6fcb9856ef2f803fd3e68c7a",
        currents: "2MPkzgzuySxwVFTooMFaC0HcOkl3yjwdKnfN3cPbVEUG9VDJ",
        mediastack: "21db872475f860207b63b3472f30588a"
    };
    const WEBHOOK_URL = "https://hook.eu2.make.com/6bbwbx4zr42kwe88t5ggvu9hbb9vyh7g";
    
    let activeTopic = "";
    let finalImageUrl = "";
    let currentTermIndex = 0;
    const searchTerms = ["Inteligencia Artificial Negocios", "Automatización Industrial", "Ciberseguridad Corporativa", "Transformación Digital ROI", "Innovación Tecnológica 2026"];

    async function fetchNewsInCascade() {
        const engineBox = document.getElementById('engineBox');
        const newsSource = document.getElementById('newsSource');
        const apiLabel = document.getElementById('apiLabel');
        const btnGen = document.getElementById('btnGen');

        activeTopic = ""; 
        engineBox.className = "header-status status-red";
        btnGen.disabled = true;
        btnGen.innerHTML = '<i class="fas fa-sync fa-spin"></i> BUSCANDO...';

        // Rotar el término de búsqueda para forzar noticias nuevas
        const query = searchTerms[currentTermIndex];
        currentTermIndex = (currentTermIndex + 1) % searchTerms.length;

        const order = ["newsapi", "gnews", "currents", "mediastack"];
        
        for (let apiName of order) {
            try {
                apiLabel.innerText = `PROBANDO ${apiName.toUpperCase()}...`;
                let url = "";
                const cb = Date.now();

                if(apiName === "newsapi") url = `https://newsapi.org/v2/everything?q=${encodeURIComponent(query)}&language=es&sortBy=publishedAt&pageSize=10&apiKey=${API_KEYS.newsapi}&v=${cb}`;
                if(apiName === "gnews") url = `https://gnews.io/api/v4/search?q=${encodeURIComponent(query)}&lang=es&max=5&apikey=${API_KEYS.gnews}&v=${cb}`;
                if(apiName === "currents") url = `https://api.currentsapi.services/v1/search?keywords=${encodeURIComponent(query)}&language=es&apiKey=${API_KEYS.currents}&v=${cb}`;
                if(apiName === "mediastack") url = `http://api.mediastack.com/v1/news?access_key=${API_KEYS.mediastack}&keywords=${encodeURIComponent(query)}&languages=es&v=${cb}`;

                const res = await fetch(url);
                const data = await res.json();
                
                let title = "";
                if(apiName === "newsapi" && data.articles?.length) title = data.articles[0].title;
                if(apiName === "gnews" && data.articles?.length) title = data.articles[0].title;
                if(apiName === "currents" && data.news?.length) title = data.news[0].title;
                if(apiName === "mediastack" && data.data?.length) title = data.data[0].title;

                if(title && title !== activeTopic) {
                    activeTopic = title;
                    engineBox.className = "header-status status-blue";
                    apiLabel.innerText = `FUENTE: [${apiName.toUpperCase()}]`;
                    newsSource.innerText = activeTopic.substring(0, 20).toUpperCase() + "...";
                    btnGen.disabled = false;
                    btnGen.innerHTML = '<i class="fas fa-brain"></i> GENERAR';
                    return; 
                }
            } catch(e) { console.log(`${apiName} falló.`); }
        }
        
        // Modo Autónomo Variable
        const fallbacks = [
            "Estrategia de Implementación de Agentes de IA en 2026",
            "El Retorno de Inversión en Ciberseguridad Autónoma",
            "Nuevos Paradigmas en la Automatización de Flujos Corporativos"
        ];
        activeTopic = fallbacks[Math.floor(Math.random() * fallbacks.length)];
        engineBox.className = "header-status status-blue";
        apiLabel.innerText = "FUENTE: [AUTÓNOMO]";
        newsSource.innerText = "TEMA ESTRATÉGICO";
        btnGen.disabled = false;
        btnGen.innerHTML = '<i class="fas fa-brain"></i> GENERAR';
    }

    function generarAnalisis() {
        const manual = document.getElementById('manualTopic').value;
        if(manual.trim() !== "") activeTopic = manual;

        const content = [
            `🚀 PERSPECTIVA: ${activeTopic.toUpperCase()}`,
            "",
            "La noticia sobre este avance representa un punto de inflexión estratégico en la arquitectura operativa moderna.",
            "",
            "Desde un enfoque de liderazgo, este desarrollo no es solo una mejora tecnológica; es una reconfiguración de la eficiencia competitiva.",
            "",
            "Al analizar la integración de estas soluciones, observamos que el valor real reside en la orquestación de recursos, eliminando la fricción operativa para centrarse en la visión de largo plazo.",
            "",
            "🔹 IMPACTO EN EL MODELO DE NEGOCIO:",
            "• Redefinición de flujos mediante automatización inteligente de alto nivel.",
            "• Toma de decisiones basada en la síntesis de datos en tiempo real.",
            "• Fortalecimiento de la seguridad con protocolos autónomos resilientes.",
            "• Escalabilidad acelerada en entornos de demanda digital volátil.",
            "• Optimización del ROI mediante la implementación de IA aplicada.",
            "",
            "El éxito no reside en la adopción pasiva, sino en la capacidad estratégica para alinear estas herramientas con los objetivos corporativos.",
            "Las organizaciones que logren equilibrar el juicio humano con la potencia del procesamiento cognitivo serán las que lideren el mercado global.",
            "",
            "En conclusión, nos encontramos ante una oportunidad sin precedentes para reconstruir la resiliencia desde la innovación.",
            "La tecnología es el catalizador, pero la ejecución estratégica determinará quiénes consolidan una ventaja competitiva sostenible.",
            "",
            "#IA #Estrategia #Innovacion #Liderazgo #Negocios #Analitica #Futuro #Automation"
        ];
        
        document.getElementById('postText').value = content.join("\n");
        document.getElementById('btnImg').disabled = false;
        document.getElementById('status').innerText = "✓ ANÁLISIS ESTRATÉGICO GENERADO";
    }

    function generarImagen() {
        const loader = document.getElementById('loader');
        const img = document.getElementById('postImg');
        img.style.display = "none";
        loader.style.display = "block";
        const seed = Date.now();
        finalImageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(activeTopic + " professional business technology render high resolution")}?width=1200&height=630&seed=${seed}&nologo=true`;
        img.src = finalImageUrl;
        img.onload = () => {
            loader.style.display = "none";
            img.style.display = "block";
            document.getElementById('btnPub').disabled = false;
        };
    }

    function limpiarYRefrescar() {
        document.getElementById('postText').value = "";
        document.getElementById('postImg').style.display = "none";
        document.getElementById('manualTopic').value = "";
        document.getElementById('btnImg').disabled = true;
        document.getElementById('btnPub').disabled = true;
        document.getElementById('status').innerText = "BUSCANDO NUEVO ENFOQUE...";
        fetchNewsInCascade(); 
    }

    async function publicar() {
        const btn = document.getElementById('btnPub');
        btn.disabled = true;
        document.getElementById('status').innerText = "ENVIANDO A LINKEDIN...";
        try {
            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mensaje: document.getElementById('postText').value, url_imagen: finalImageUrl })
            });
            if(res.ok) document.getElementById('status').innerText = "✅ PUBLICADO EXITOSAMENTE";
        } catch(e) { alert("Error"); btn.disabled = false; }
    }
    
    window.onload = fetchNewsInCascade;
</script>
</body>
</html>
