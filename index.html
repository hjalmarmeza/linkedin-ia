<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA Strategic Studio v41.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent: #58a6ff; --bg: #0d1117; --card: #161b22; --success: #238636; --primary: #1f6feb; --danger: #f85149; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background: var(--card); padding: 15px; border-radius: 12px; width: 100%; max-width: 500px; border: 1px solid #30363d; }
        .header-status { font-size: 11px; font-weight: bold; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .status-red { color: var(--danger); background: rgba(248, 81, 73, 0.1); border-color: var(--danger); }
        .status-blue { color: var(--accent); background: rgba(88, 166, 255, 0.1); border-color: var(--accent); }
        .input-manual { width: 100%; background: #000; color: var(--accent); border: 1px solid #444; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; font-style: italic; }
        textarea { width: 100%; height: 420px; background: var(--bg); color: #e6edf3; border: 1px solid #30363d; padding: 15px; border-radius: 8px; font-size: 13px; line-height: 1.6; resize: none; margin-bottom: 12px; }
        .img-preview { width: 100%; height: 230px; background: #000; border-radius: 8px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; border: 1px solid #30363d; overflow: hidden; }
        #postImg { width: 100%; height: 100%; object-fit: cover; display: none; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { height: 50px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; color: white; transition: 0.2s; }
        .btn-gen { background: var(--success); }
        .btn-img { background: #8957e5; }
        .btn-clear { background: #30363d; border: 1px solid var(--danger); color: var(--danger); }
        .btn-pub { background: var(--primary); }
        button:disabled { opacity: 0.4; filter: grayscale(1); pointer-events: none; }
        #status { font-size: 10px; text-align: center; color: #8b949e; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
<div class="container">
    <div id="engineBox" class="header-status status-red">
        <span><i class="fas fa-satellite"></i> <span id="apiLabel">ESPERANDO SEÑAL</span></span>
        <span id="newsSource">OFFLINE</span>
    </div>
    <input type="text" id="manualTopic" class="input-manual" placeholder="Tema para Make (ej: IA Ética)...">
    <textarea id="postText" placeholder="Presiona LIMPIAR para solicitar noticia a Make..."></textarea>
    <div class="img-preview">
        <div id="loader" style="display:none;"><i class="fas fa-atom fa-spin fa-3x"></i></div>
        <img id="postImg">
    </div>
    <div class="action-grid">
        <button id="btnGen" class="btn-gen" onclick="generarAnalisis()" disabled><i class="fas fa-brain"></i> GENERAR</button>
        <button id="btnImg" class="btn-img" onclick="generarImagen()" disabled><i class="fas fa-magic"></i> IMAGEN</button>
        <button class="btn-clear" onclick="buscarNoticiaEnMake()"><i class="fas fa-eraser"></i> LIMPIAR</button>
        <button id="btnPub" class="btn-pub" onclick="publicar()" disabled><i class="fab fa-linkedin"></i> PUBLICAR</button>
    </div>
    <div id="status">v41.0 - Make Intelligence Activa</div>
</div>

<script>
    // Configuración Bi-Escenario
    const SEARCH_WEBHOOK_URL = "https://hook.eu2.make.com/6co1n3k568x7chpw5j45dihghj3yr963";
    const PUBLISH_WEBHOOK_URL = "https://hook.eu2.make.com/6bbwbx4zr42kwe88t5ggvu9hbb9vyh7g";
    
    let activeTopic = "";
    let finalImageUrl = "";

    async function buscarNoticiaEnMake() {
        const engineBox = document.getElementById('engineBox');
        const apiLabel = document.getElementById('apiLabel');
        const postText = document.getElementById('postText');
        const btnGen = document.getElementById('btnGen');
        const manual = document.getElementById('manualTopic').value;

        // Estado inicial de búsqueda
        activeTopic = "";
        postText.value = "Solicitando tendencia actual a Make...";
        engineBox.className = "header-status status-red";
        apiLabel.innerText = "BUSCANDO NOTICIA...";
        btnGen.disabled = true;

        try {
            const response = await fetch(SEARCH_WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ query: manual || "IA estratégica y ética" })
            });
            const data = await response.json();

            if(data.titulo) {
                activeTopic = data.titulo;
                postText.value = "✓ NOTICIA RECIBIDA: Lista para análisis de Ética y Eficiencia";
                engineBox.className = "header-status status-blue";
                apiLabel.innerText = "NOTICIA LISTA";
                btnGen.disabled = false;
            } else { throw new Error(); }
        } catch(e) {
            postText.value = "Error al conectar con Make. Asegúrate de que el escenario de búsqueda esté en ON.";
            apiLabel.innerText = "FALLO CONEXIÓN";
        }
    }

    function generarAnalisis() {
        const topicSource = activeTopic;
        const verbs = ["Orquestación", "Evolución", "Gobernanza", "Sincronía", "Integridad"];
        const verb = verbs[Math.floor(Math.random() * verbs.length)];
        
        const cleanTitle = topicSource.replace(/la |el |de |en |que /gi, "").trim();
        const rewrittenTitle = `🚀 ${verb}: El impacto estratégico de ${cleanTitle}`;
        
        const content = [
            rewrittenTitle.toUpperCase(),
            "",
            "Más allá del avance técnico, nos encontramos en una frontera donde la eficiencia ya no puede ser el único KPI. El liderazgo moderno se mide por la capacidad de integrar potencia algorítmica con un marco ético innegociable.",
            "",
            `Al analizar ${topicSource.toLowerCase()}, queda claro que la optimización operativa es el gran motor de nuestra era. Sin embargo, no debemos sacrificar la transparencia que sostiene la confianza corporativa.`,
            "",
            "La verdadera eficiencia no es solo velocidad; es la sostenibilidad de un sistema que respeta la integridad humana. La automatización sin ética es una deuda técnica que ninguna organización puede permitirse hoy.",
            "",
            "🔹 PILARES ÉTICO-EFICIENTES:",
            "• Sincronía entre rendimiento y responsabilidad algorítmica.",
            "• Eliminación de sesgos en la síntesis de datos estratégicos.",
            "• Blindaje ético como ventaja competitiva de mercado.",
            "• Optimización de recursos bajo gobernanza humana.",
            "• Escalabilidad resiliente que protege el propósito corporativo.",
            "",
            "En conclusión, el éxito real reside en la visión estratégica para orquestar un futuro donde la eficiencia y la ética se potencien mutuamente para construir una ventaja competitiva sostenible.",
            "",
            "#IA #Estrategia #EticaIA #Eficiencia #Liderazgo #Negocios #TechResponsable"
        ];
        
        document.getElementById('postText').value = content.join("\n");
        document.getElementById('btnImg').disabled = false;
        document.getElementById('status').innerText = "✓ ANÁLISIS ESTRATÉGICO GENERADO";
    }

    function generarImagen() {
        const loader = document.getElementById('loader');
        const img = document.getElementById('postImg');
        img.style.display = "none";
        loader.style.display = "block";
        const seed = Date.now();
        finalImageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(activeTopic + " futuristic business ethics and efficiency 3d render")}?width=1200&height=630&seed=${seed}&nologo=true`;
        img.src = finalImageUrl;
        img.onload = () => {
            loader.style.display = "none";
            img.style.display = "block";
            document.getElementById('btnPub').disabled = false;
        };
    }

    async function publicar() {
        const btn = document.getElementById('btnPub');
        btn.disabled = true;
        document.getElementById('status').innerText = "ENVIANDO A LINKEDIN...";
        try {
            const res = await fetch(PUBLISH_WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mensaje: document.getElementById('postText').value, url_imagen: finalImageUrl })
            });
            if(res.ok) document.getElementById('status').innerText = "✅ PUBLICADO EXITOSAMENTE";
        } catch(e) { alert("Error"); btn.disabled = false; }
    }
</script>
</body>
</html>
