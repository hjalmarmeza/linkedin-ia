<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA LinkedIn Studio Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent: #58a6ff; --bg: #0d1117; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 16px; width: 100%; max-width: 550px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        textarea { width: 100%; height: 350px; background: var(--bg); color: #e6edf3; border: 1px solid #30363d; padding: 15px; border-radius: 8px; font-size: 14px; line-height: 1.6; resize: none; box-sizing: border-box; }
        .img-preview { width: 100%; min-height: 250px; background: #000; border-radius: 12px; margin: 20px 0; border: 1px solid #444; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #postImage { width: 100%; display: none; }
        button { width: 100%; padding: 16px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 15px; }
        .btn-gen { background: #238636; color: white; }
        .btn-pub { background: #1f6feb; color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { font-size: 12px; text-align: center; color: #8b949e; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--accent)">IA Deep Insight Studio 🤖</h2>
    <textarea id="postText" placeholder="Haz clic en generar..."></textarea>
    
    <div class="img-preview">
        <span id="loader">Esperando IA...</span>
        <img id="postImage">
    </div>

    <button class="btn-gen" onclick="generar()">1. GENERAR POST E IMAGEN IA</button>
    <button id="btnPub" class="btn-pub" onclick="publicar()" disabled>2. PUBLICAR EN LINKEDIN</button>
    <div id="status">v19.0 - Enlace Directo Garantizado</div>
</div>

<script>
    const WEBHOOK_URL = "https://hook.eu2.make.com/hiurq1grt6euyiw1tdlkcw5rst9uxuuo";
    let globalImageUrl = ""; // Guardaremos solo el texto de la URL

    const temas = [
        { t: "IA AGÉNTICA: EL FUTURO AUTÓNOMO", p: "autonomous_ai_agents_futuristic_digital_landscape_cinematic_4k", c: "La transición de copilotos a agentes autónomos redefine la operatividad empresarial." },
        { t: "CIUDADES INTELIGENTES Y GEMELOS DIGITALES", p: "smart_city_digital_twin_neural_network_glowing_data_high_detail", c: "Simulaciones en tiempo real permiten optimizar infraestructuras antes de su construcción." }
    ];

    function generar() {
        const info = temas[Math.floor(Math.random() * temas.length)];
        const seed = Date.now();
        
        // 1. Generar texto
        document.getElementById('postText').value = `🚀 ${info.t}\n\n${info.c}\n\n#IA #Innovation #Future #Analitica`;
        
        // 2. Definir URL pura (esto es lo que LinkedIn necesita)
        globalImageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(info.p)}?width=1200&height=630&seed=${seed}&nologo=true`;
        
        // 3. Mostrar visualmente (sin procesar datos internos)
        const img = document.getElementById('postImage');
        document.getElementById('loader').style.display = "none";
        img.src = globalImageUrl;
        img.style.display = "block";
        document.getElementById('btnPub').disabled = false;
        document.getElementById('status').innerText = "✓ Contenido listo.";
    }

    async function publicar() {
        const btn = document.getElementById('btnPub');
        btn.disabled = true;
        document.getElementById('status').innerText = "Enviando enlace directo...";

        // Enviamos la URL como texto plano para evitar el error de LinkedIn
        const payload = {
            mensaje: document.getElementById('postText').value,
            url_imagen: globalImageUrl 
        };

        try {
            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if(res.ok) document.getElementById('status').innerText = "✅ PUBLICADO EXITOSAMENTE";
        } catch (e) {
            document.getElementById('status').innerText = "❌ Error de conexión.";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
