<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Deep Insight Pro v23.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent: #58a6ff; --bg: #0d1117; --card: #161b22; --success: #238636; --primary: #1f6feb; --text-muted: #8b949e; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: var(--card); padding: 25px; border-radius: 16px; width: 100%; max-width: 800px; border: 1px solid #30363d; box-shadow: 0 16px 48px rgba(0,0,0,0.6); }
        
        /* Layout */
        .grid-main { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid-main { grid-template-columns: 1fr; } }

        /* News Section */
        .news-badge { background: #f85149; color: white; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .news-title { font-size: 14px; color: var(--accent); margin-bottom: 15px; font-weight: bold; }

        /* Controls */
        .control-row { display: flex; gap: 10px; margin-bottom: 15px; }
        select, button { border-radius: 8px; font-weight: 600; font-size: 13px; }
        select { background: var(--bg); color: white; border: 1px solid #30363d; padding: 10px; flex: 1; }

        /* Preview Area (Option 3) */
        .linkedin-preview { background: white; color: rgba(0,0,0,0.9); padding: 15px; border-radius: 8px; margin-top: 20px; font-family: sans-serif; display: none; }
        .user-info { display: flex; gap: 10px; margin-bottom: 10px; }
        .user-circle { width: 40px; height: 40px; background: #ddd; border-radius: 50%; }
        .post-content { font-size: 14px; line-height: 1.4; white-space: pre-wrap; }

        textarea { width: 100%; height: 350px; background: var(--bg); color: #e6edf3; border: 1px solid #30363d; padding: 15px; border-radius: 8px; font-size: 14px; line-height: 1.5; resize: none; box-sizing: border-box; }
        
        .img-preview { width: 100%; min-height: 250px; background: #000; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #444; }
        #postImg { width: 100%; display: none; }
        
        .btn-gen { background: var(--success); color: white; width: 100%; height: 50px; }
        .btn-pub { background: var(--primary); color: white; width: 100%; height: 50px; margin-top: 10px; }
        
        .stats-bar { display: flex; justify-content: space-around; margin-top: 20px; border-top: 1px solid #30363d; padding-top: 15px; color: var(--text-muted); font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="news-badge"><i class="fas fa-bolt"></i> TENDENCIAS HOY</div>
    <div id="newsTopic" class="news-title">Cargando noticias de última hora...</div>

    <div class="grid-main">
        <div class="edit-zone">
            <div class="control-row">
                <select id="formatSelect">
                    <option value="list">Modo: Listado Técnico</option>
                    <option value="story">Modo: Storytelling</option>
                </select>
                <select id="styleSelect">
                    <option value="photorealistic">Estilo: Fotorrealista</option>
                    <option value="cyberpunk">Estilo: Cyberpunk</option>
                </select>
            </div>
            <textarea id="postText" placeholder="El análisis se generará aquí..."></textarea>
            <div id="lineCount" style="font-size:10px; text-align:right; color:var(--text-muted)">Líneas: 0</div>
        </div>

        <div class="visual-zone">
            <div class="img-preview">
                <div id="loader"><i class="fas fa-atom fa-spin fa-2x"></i></div>
                <img id="postImg">
            </div>
            <button class="btn-gen" onclick="generarTodo()"><i class="fas fa-sync"></i> GENERAR ANÁLISIS</button>
            <button id="btnPub" class="btn-pub" onclick="publicar()" disabled><i class="fab fa-linkedin"></i> PUBLICAR AHORA</button>
        </div>
    </div>

    <div id="preview" class="linkedin-preview">
        <div class="user-info">
            <div class="user-circle"></div>
            <div><strong>Tu Perfil</strong><br><small>Analista de IA</small></div>
        </div>
        <div id="previewText" class="post-content"></div>
    </div>

    <div class="stats-bar">
        <span><i class="fas fa-chart-line"></i> Posts: <span id="statCount">0</span></span>
        <span><i class="fas fa-heart"></i> Favoritos: <span id="statFav">0</span></span>
    </div>
</div>

<script>
    const NEWS_API_KEY = "7b6710d7c32347a6b2810545dc5307a6b2810545dc530"; // Tu llave
    const WEBHOOK_URL = "https://hook.eu2.make.com/npbtxec20xxq92ef67qxijvvc4hl5kud";
    let currentImage = "";
    let lastNewsTitle = "La IA Agéntica redefine la autonomía";

    // 1. Cargar Noticias (Opción 1)
    async function fetchNews() {
        try {
            const res = await fetch(`https://newsapi.org/v2/everything?q=Artificial+Intelligence+Business&language=es&sortBy=publishedAt&pageSize=1&apiKey=7b6710d7c32347a6b2810545dc5307a6b2810545dc530`);
            const data = await res.json();
            if(data.articles && data.articles[0]) {
                lastNewsTitle = data.articles[0].title;
                document.getElementById('newsTopic').innerText = "NOTICIA: " + lastNewsTitle;
            }
        } catch(e) {
            document.getElementById('newsTopic').innerText = "TEMA: Evolución de la IA Autónoma";
        }
    }

    function generarTodo() {
        const format = document.getElementById('formatSelect').value;
        const style = document.getElementById('styleSelect').value;
        const loader = document.getElementById('loader');
        const img = document.getElementById('postImg');
        const status = document.getElementById('newsTopic');

        // Generar Texto (20-25 líneas)
        let body = format === 'list' ? 
            "🔹 PUNTOS CLAVE DE IMPACTO:\n• Eficiencia en tiempo real\n• Reducción de sesgos operativos\n• Escalabilidad cuántica\n• Seguridad reforzada" :
            "Imaginen un mundo donde la noticia de hoy no es el final, sino el inicio de una automatización sin precedentes. Esta mañana leímos sobre " + lastNewsTitle + ", y esto cambia todo.";

        let text = `🚀 ANÁLISIS DEL DÍA: ${lastNewsTitle.toUpperCase()}\n\n¿Cómo influye esta noticia en tu estrategia para 2026?\n\n${body}\n\nLa inteligencia artificial ha dejado de ser una promesa para convertirse en la columna vertebral de la industria global.\n\nAl observar el mercado hoy, vemos que el éxito no depende de la herramienta, sino del criterio humano que la dirige.\n\nEn conclusión, el liderazgo digital hoy exige una actualización constante de nuestras capacidades analíticas.\n\n¿Cuál es tu opinión sobre este avance?\n\n#IA #TechNews #Innovacion #Liderazgo #Analitica #Futuro #Estrategia #Negocios`;

        document.getElementById('postText').value = text;
        document.getElementById('previewText').innerText = text;
        document.getElementById('preview').style.display = "block";
        
        // Contador de líneas
        const lines = text.split('\n').length;
        document.getElementById('lineCount').innerText = "Líneas: " + lines;

        // Generar Imagen (Opción 6)
        img.style.display = "none";
        loader.style.display = "block";
        const seed = Math.floor(Math.random() * 99999);
        currentImage = `https://image.pollinations.ai/prompt/${encodeURIComponent(lastNewsTitle + " " + style)}?width=1200&height=630&seed=${seed}&nologo=true`;
        
        img.src = currentImage;
        img.onload = () => {
            loader.style.display = "none";
            img.style.display = "block";
            document.getElementById('btnPub').disabled = false;
        };
    }

    async function publicar() {
        const btn = document.getElementById('btnPub');
        btn.disabled = true;
        try {
            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    mensaje: document.getElementById('postText').value,
                    url_imagen: currentImage
                })
            });
            if(res.ok) {
                alert("¡Publicado!");
                // Actualizar Stats (Opción 5)
                let count = parseInt(localStorage.getItem('postCount') || 0) + 1;
                localStorage.setItem('postCount', count);
                document.getElementById('statCount').innerText = count;
            }
        } catch(e) { alert("Error al publicar"); btn.disabled = false; }
    }

    fetchNews(); // Iniciar al cargar
</script>
</body>
</html>
