<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA Deep Insight Studio v27.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent: #58a6ff; --bg: #0d1117; --card: #161b22; --success: #238636; --primary: #1f6feb; --danger: #f85149; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background: var(--card); padding: 15px; border-radius: 12px; width: 100%; max-width: 500px; border: 1px solid #30363d; }
        
        .header-status { font-size: 11px; font-weight: bold; color: var(--accent); margin-bottom: 10px; display: flex; justify-content: space-between; }
        .input-manual { width: 100%; background: #000; color: var(--accent); border: 1px solid #444; padding: 10px; border-radius: 6px; font-size: 12px; margin-bottom: 12px; }

        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        select { background: var(--bg); color: white; border: 1px solid #30363d; padding: 12px; border-radius: 6px; font-size: 13px; width: 100%; }

        textarea { width: 100%; height: 350px; background: var(--bg); color: #e6edf3; border: 1px solid #30363d; padding: 12px; border-radius: 8px; font-size: 13.5px; line-height: 1.5; resize: none; margin-bottom: 12px; }
        
        .img-preview { width: 100%; height: 220px; background: #000; border-radius: 8px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #30363d; }
        #postImg { width: 100%; height: 100%; object-fit: cover; display: none; }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { height: 50px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; color: white; }
        .btn-gen { background: var(--success); }
        .btn-img { background: #8957e5; }
        .btn-clear { background: #30363d; border: 1px solid var(--danger); color: var(--danger); }
        .btn-pub { background: var(--primary); }
        
        #status { font-size: 12px; text-align: center; color: #8b949e; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-status">
        <span><i class="fas fa-rss"></i> NEWS ENGINE ACTIVE</span>
        <span id="newsSource">ESPERANDO TEMA</span>
    </div>

    <input type="text" id="manualTopic" class="input-manual" placeholder="Escribe un tema o deja vacío para noticias...">

    <div class="controls-grid">
        <select id="toneSelect">
            <option value="Inspirador">Análisis: Inspirador</option>
            <option value="Tecnológico">Análisis: Tecnológico</option>
            <option value="Estratégico">Análisis: Estratégico</option>
        </select>
        <select id="formatSelect">
            <option value="list">Formato: Listado</option>
            <option value="story">Formato: Narrativo</option>
        </select>
    </div>

    <textarea id="postText" placeholder="Paso 1: Toca GENERAR ANÁLISIS DINÁMICO..."></textarea>
    
    <div class="img-preview">
        <div id="loader" style="display:none;"><i class="fas fa-atom fa-spin fa-2x" style="color:var(--accent)"></i></div>
        <img id="postImg">
    </div>

    <div class="action-grid">
        <button class="btn-gen" onclick="generarDinamico()"><i class="fas fa-brain"></i> GENERAR ANÁLISIS</button>
        <button id="btnImg" class="btn-img" onclick="generarImagen()" disabled><i class="fas fa-magic"></i> GENERAR IMAGEN</button>
        <button class="btn-clear" onclick="limpiar()"><i class="fas fa-eraser"></i> LIMPIAR</button>
        <button id="btnPub" class="btn-pub" onclick="publicar()" disabled><i class="fab fa-linkedin"></i> PUBLICAR</button>
    </div>
    
    <div id="status">Generación v27.0 Dinámica</div>
</div>

<script>
    const NEWS_API_KEY = "7b6710d7c32347a6b2810545dc5307a6b2810545dc530";
    const WEBHOOK_URL = "https://hook.eu2.make.com/6bbwbx4zr42kwe88t5ggvu9hbb9vyh7g";
    
    let activeTopic = "";
    let finalImageUrl = "";

    async function obtenerNoticia() {
        try {
            const res = await fetch(`https://newsapi.org/v2/everything?q=Artificial+Intelligence+Business&language=es&sortBy=publishedAt&pageSize=10&apiKey=${NEWS_API_KEY}`);
            const data = await res.json();
            return data.articles[Math.floor(Math.random() * data.articles.length)].title;
        } catch(e) { return "Innovación en Inteligencia Artificial y Negocios"; }
    }

    async function generarDinamico() {
        const status = document.getElementById('status');
        const manual = document.getElementById('manualTopic').value;
        status.innerText = "Pensando análisis original...";

        // Determinar tema: Manual o Noticia
        activeTopic = manual || await obtenerNoticia();
        document.getElementById('newsSource').innerText = activeTopic.substring(0, 20) + "...";

        const tone = document.getElementById('toneSelect').value;
        const format = document.getElementById('formatSelect').value;

        // Diccionarios lógicos para evitar repetición
        const perspectives = [
            "Desde la óptica del rendimiento financiero, este avance cambia las reglas de inversión.",
            "Si analizamos el impacto humano, la tecnología se posiciona como el gran habilitador del talento.",
            "Estructuralmente, estamos viendo una transición hacia flujos de trabajo 100% integrados."
        ];

        const bullets = [
            "• Reducción exponencial de la carga operativa.",
            "• Toma de decisiones basada en datos sintéticos en tiempo real.",
            "• Blindaje de procesos críticos mediante lógica autónoma.",
            "• Escalabilidad de infraestructura sin fricción técnica.",
            "• Identificación de patrones invisibles para el análisis tradicional."
        ];

        let intro = format === 'list' ? "¿Qué implicaciones estratégicas conlleva este desarrollo?" : "Imaginen un ecosistema donde la lógica y la ejecución no tienen intermediarios.";

        // Construcción del post (20-25 líneas garantizadas)
        const content = [
            `🚀 PERSPECTIVA DINÁMICA: ${activeTopic.toUpperCase()}`,
            "",
            intro,
            "",
            "La noticia sobre este avance nos obliga a replantear la solidez de nuestras estrategias actuales.",
            "Bajo un enfoque " + tone.toLowerCase() + ", queda claro que no estamos ante una simple mejora de software.",
            "",
            perspectives[Math.floor(Math.random() * perspectives.length)],
            "",
            "🔹 PILARES DE TRANSFORMACIÓN:",
            bullets[0],
            bullets[1],
            bullets[2],
            bullets[3],
            bullets[4],
            "",
            "La ventaja competitiva en esta era no reside en poseer la herramienta, sino en la capacidad de orquestarla.",
            "El éxito real vendrá de las organizaciones que logren fusionar el juicio humano con estas capacidades autónomas.",
            "Es el momento de dejar de ser espectadores y comenzar a liderar el despliegue de soluciones inteligentes.",
            "No se trata de rapidez, sino de precisión en la implementación táctica.",
            "",
            "En conclusión, el futuro es de quienes integren esta visión hoy mismo.",
            "¿Cómo planeas adaptar esta tendencia en tu flujo de trabajo?",
            "",
            "#IA #Innovacion #Futuro #DigitalStrategy #Tech #Analitica #Liderazgo #Estrategia"
        ];

        document.getElementById('postText').value = content.join("\n");
        document.getElementById('btnImg').disabled = false;
        status.innerText = "✓ Análisis 100% dinámico generado.";
    }

    function generarImagen() {
        const loader = document.getElementById('loader');
        const img = document.getElementById('postImg');
        img.style.display = "none";
        loader.style.display = "block";
        
        const seed = Date.now();
        finalImageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(activeTopic + " futuristic high tech") }?width=1200&height=630&seed=${seed}&nologo=true`;
        
        img.src = finalImageUrl;
        img.onload = () => {
            loader.style.display = "none";
            img.style.display = "block";
            document.getElementById('btnPub').disabled = false;
            document.getElementById('status').innerText = "✓ Imagen coherente lista.";
        };
    }

    function limpiar() {
        document.getElementById('postText').value = "";
        document.getElementById('postImg').style.display = "none";
        document.getElementById('manualTopic').value = "";
        document.getElementById('btnImg').disabled = true;
        document.getElementById('btnPub').disabled = true;
        document.getElementById('status').innerText = "Pizarra limpia.";
        activeTopic = "";
    }

    async function publicar() {
        const btn = document.getElementById('btnPub');
        btn.disabled = true;
        document.getElementById('status').innerText = "Publicando...";
        try {
            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    mensaje: document.getElementById('postText').value,
                    url_imagen: finalImageUrl
                })
            });
            if(res.ok) {
                document.getElementById('status').innerText = "✅ PUBLICADO EXITOSAMENTE";
            }
        } catch(e) { 
            alert("Error de conexión"); 
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
