<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Deep Insight Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent: #58a6ff; --bg: #0d1117; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; padding: 15px; margin: 0; }
        .container { background: var(--card); padding: 20px; border-radius: 12px; width: 100%; max-width: 500px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 1.1rem; color: var(--accent); text-align: center; margin-bottom: 20px; }
        textarea { width: 100%; height: 380px; background: var(--bg); color: #e6edf3; border: 1px solid #30363d; padding: 12px; border-radius: 8px; font-size: 14px; line-height: 1.5; resize: none; box-sizing: border-box; margin-bottom: 10px; }
        .img-preview { width: 100%; min-height: 280px; background: #000; border-radius: 8px; margin-bottom: 15px; border: 1px solid #444; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #postImage { width: 100%; height: auto; display: none; }
        #loader { color: var(--accent); font-weight: bold; text-align: center; display: none; }
        button { width: 100%; padding: 16px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 14px; }
        .btn-gen { background: #238636; color: white; }
        .btn-pub { background: #1f6feb; color: white; }
        .btn-pub:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { font-size: 12px; text-align: center; color: #8b949e; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>IA LinkedIn Deep Insight 🤖</h1>
    <textarea id="postText" placeholder="Toca GENERAR para crear contenido de alto impacto..."></textarea>
    
    <div class="img-preview">
        <div id="loader"><i class="fas fa-atom fa-spin"></i> IA PINTANDO...</div>
        <img id="postImage">
    </div>

    <button class="btn-gen" onclick="generarPropuesta()">1. GENERAR POST E IMAGEN IA</button>
    <button id="btnPub" class="btn-pub" onclick="publicar()" disabled>2. PUBLICAR EN LINKEDIN</button>
    <div id="status">v18.0 - Cero Procesamiento Local</div>
</div>

<script>
    const WEBHOOK_URL = "https://hook.eu2.make.com/hiurq1grt6euyiw1tdlkcw5rst9uxuuo";
    let urlParaMake = ""; // Guardaremos aquí la URL pura de la IA

    const baseNoticias = [
        { 
            t: "IA AGÉNTICA: EL FIN DE LOS COPILOTOS", 
            p: "autonomous_ai_agents_working_in_futuristic_digital_landscape_hyper_realistic_cinematic_4k",
            d: "Estamos ante el inicio de los agentes capaces de ejecutar procesos completos sin supervisión humana constante."
        },
        { 
            t: "CIUDADES INTELIGENTES Y GEMELOS DIGITALES", 
            p: "smart_city_digital_twin_with_glowing_data_points_neural_networks_high_detail",
            d: "La integración de simulaciones en tiempo real con IA permite a las empresas probar estrategias en entornos virtuales."
        }
    ];

    function generarPropuesta() {
        const info = baseNoticias[Math.floor(Math.random() * baseNoticias.length)];
        const loader = document.getElementById('loader');
        const img = document.getElementById('postImage');
        const btnPub = document.getElementById('btnPub');

        // Texto de alto impacto (20 líneas)
        document.getElementById('postText').value = `🔥 ANÁLISIS DE VANGUARDIA: ${info.t}\n\nLa evolución tecnológica actual está marcando un punto de inflexión. ${info.d}\n\n🔹 BENEFICIOS CLAVE:\n1. Eficiencia Exponencial: Automatización de flujos lógicos complejos.\n2. Seguridad Predictiva: Blindaje de activos mediante redes neuronales.\n3. Crecimiento Orgánico: Escalabilidad total sin aumento de costos.\n\nEn conclusión, el futuro pertenece a quienes se atreven a innovar hoy.\n\n#IA #Innovation #FutureTech #Analitica #DigitalTransformation`;

        img.style.display = "none";
        loader.style.display = "block";
        btnPub.disabled = true;

        const seed = Math.floor(Math.random() * 999999);
        // Creamos la URL pero NO la descargamos con funciones de datos
        urlParaMake = `https://image.pollinations.ai/prompt/${encodeURIComponent(info.p)}?width=1024&height=512&seed=${seed}&nologo=true`;

        // Simplemente la mostramos. El navegador solo la "dibuja", no la convierte
        img.src = urlParaMake;
        img.onload = () => {
            loader.style.display = "none";
            img.style.display = "block";
            btnPub.disabled = false;
            document.getElementById('status').innerText = "✓ Post e Imagen listos.";
        };
    }

    async function publicar() {
        const btn = document.getElementById('btnPub');
        const status = document.getElementById('status');
        btn.disabled = true;
        status.innerText = "Enviando URL directa a LinkedIn...";

        // Enviamos la URL original del motor de IA, no el código del navegador
        const payload = {
            mensaje: document.getElementById('postText').value,
            url_imagen: urlParaMake 
        };

        try {
            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if(res.ok) status.innerText = "✅ PUBLICADO EXITOSAMENTE";
        } catch (e) {
            status.innerText = "❌ Error de conexión.";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
