<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA LinkedIn Studio Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent: #58a6ff; --bg: #0d1117; --card: #161b22; --success: #238636; --primary: #1f6feb; --danger: #f85149; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background: var(--card); padding: 15px; border-radius: 12px; width: 100%; max-width: 500px; border: 1px solid #30363d; }
        
        .news-header { background: #f85149; color: white; padding: 5px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-bottom: 5px; display: inline-block; }
        .news-title { font-size: 13px; color: var(--accent); margin-bottom: 15px; font-weight: bold; line-height: 1.3; min-height: 35px; }

        /* Controles parejos en celular */
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        select { background: var(--bg); color: white; border: 1px solid #30363d; padding: 12px; border-radius: 6px; font-size: 13px; width: 100%; }

        textarea { width: 100%; height: 300px; background: var(--bg); color: #e6edf3; border: 1px solid #30363d; padding: 12px; border-radius: 8px; font-size: 14px; line-height: 1.5; resize: none; margin-bottom: 12px; }
        
        .img-preview { width: 100%; height: 220px; background: #000; border-radius: 8px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #30363d; }
        #postImg { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* Botones simétricos */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { height: 50px; border-radius: 8px; border: none; font-weight: bold; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; color: white; }
        .btn-gen { background: var(--success); }
        .btn-img { background: #8957e5; }
        .btn-clear { background: #30363d; border: 1px solid var(--danger); color: var(--danger); }
        .btn-pub { background: var(--primary); }
        button:disabled { opacity: 0.3; }

        #status { font-size: 12px; text-align: center; color: #8b949e; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="news-header">TENDENCIA IA</div>
    <div id="newsTopic" class="news-title">Listo para generar contenido...</div>

    <div class="controls-grid">
        <select id="toneSelect">
            <option value="Inspiradora">Tono: Inspirador</option>
            <option value="Técnica">Tono: Técnico</option>
            <option value="Crítica">Tono: Crítico</option>
        </select>
        <select id="formatSelect">
            <option value="list">Modo: Listado</option>
            <option value="story">Modo: Narrativo</option>
        </select>
    </div>

    <textarea id="postText" placeholder="Paso 1: Toca GENERAR TEXTO..."></textarea>
    
    <div class="img-preview">
        <div id="loader" style="display:none;"><i class="fas fa-atom fa-spin fa-2x" style="color:var(--accent)"></i></div>
        <img id="postImg">
    </div>

    <div class="action-grid">
        <button class="btn-gen" onclick="generarAnalisis()"><i class="fas fa-file-alt"></i> TEXTO</button>
        <button id="btnImg" class="btn-img" onclick="generarImagen()" disabled><i class="fas fa-image"></i> IMAGEN</button>
        <button class="btn-clear" onclick="limpiarTodo()"><i class="fas fa-eraser"></i> LIMPIAR</button>
        <button id="btnPub" class="btn-pub" onclick="publicar()" disabled><i class="fab fa-linkedin"></i> PUBLICAR</button>
    </div>
    
    <div id="status">Esperando comandos...</div>
</div>

<script>
    const NEWS_API_KEY = "7b6710d7c32347a6b2810545dc5307a6b2810545dc530";
    const WEBHOOK_URL = "https://hook.eu2.make.com/6bbwbx4zr42kwe88t5ggvu9hbb9vyh7g";
    
    let currentTopic = "";
    let finalImageUrl = "";
    let backupIndex = 0;
    const backupTopics = [
        "IA Agéntica: El fin de los copilotos convencionales",
        "Gemelos Digitales y la eficiencia operativa en 2025",
        "Soberanía de Datos: El nuevo activo estratégico",
        "Ciberseguridad Predictiva con Redes Neuronales"
    ];

    async function generarAnalisis() {
        const status = document.getElementById('status');
        const newsTitle = document.getElementById('newsTopic');
        status.innerText = "Buscando noticias frescas...";

        // Intentar obtener noticia, pero sin bloquear el proceso si falla (CORS Fix)
        try {
            const res = await fetch(`https://newsapi.org/v2/everything?q=AI+Business&language=es&pageSize=5&apiKey=${NEWS_API_KEY}`);
            const data = await res.json();
            if(data.articles && data.articles.length > 0) {
                currentTopic = data.articles[Math.floor(Math.random() * data.articles.length)].title;
            } else { throw new Error(); }
        } catch(e) {
            // Rotar temas de respaldo para que nunca sea el mismo
            currentTopic = backupTopics[backupIndex];
            backupIndex = (backupIndex + 1) % backupTopics.length;
        }

        newsTitle.innerText = "ANÁLISIS: " + currentTopic;
        const tone = document.getElementById('toneSelect').value;
        const format = document.getElementById('formatSelect').value;
        
        let intro = format === 'list' ? "¿Cómo impacta esto en la eficiencia?" : "Imaginen un mundo donde la tecnología anticipa cada decisión.";

        const body = [
            `🚀 ANÁLISIS: ${currentTopic.toUpperCase()}`,
            "",
            intro,
            "",
            "La realidad actual nos obliga a cuestionar si nuestras estructuras están listas.",
            "Bajo un enfoque " + tone.toLowerCase() + ", esta evolución no es solo técnica.",
            "",
            "🔹 PUNTOS CLAVE DE VALOR:",
            "• Optimización profunda mediante lógica predictiva.",
            "• Reducción de la fricción en entornos de alta demanda.",
            "• Fortalecimiento de la seguridad con IA autónoma.",
            "• Capacidad de respuesta inmediata ante el mercado.",
            "• Escalabilidad de soluciones basadas en datos.",
            "",
            "Al observar el panorama, queda claro que la tecnología es el punto de partida.",
            "El éxito real reside en el talento humano capaz de orquestar estos sistemas.",
            "Integrar estas herramientas permite construir una solidez empresarial única.",
            "",
            "En conclusión, el cambio es inevitable; el liderazgo es opcional.",
            "¿Qué impacto proyectas tú para este desarrollo en tu industria?",
            "",
            "#IA #Innovacion #Futuro #Analitica #Estrategia #Negocios #Tech #Liderazgo"
        ];

        document.getElementById('postText').value = body.join("\n");
        document.getElementById('btnImg').disabled = false;
        status.innerText = "✓ Nuevo post generado.";
    }

    function generarImagen() {
        const loader = document.getElementById('loader');
        const img = document.getElementById('postImg');
        img.style.display = "none";
        loader.style.display = "block";
        
        const seed = Date.now();
        finalImageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(currentTopic)}?width=1200&height=630&seed=${seed}&nologo=true`;
        
        img.src = finalImageUrl;
        img.onload = () => {
            loader.style.display = "none";
            img.style.display = "block";
            document.getElementById('btnPub').disabled = false;
            document.getElementById('status').innerText = "✓ Imagen lista para publicar.";
        };
    }

    function limpiarTodo() {
        document.getElementById('postText').value = "";
        document.getElementById('postImg').style.display = "none";
        document.getElementById('newsTopic').innerText = "Listo para iniciar...";
        document.getElementById('btnImg').disabled = true;
        document.getElementById('btnPub').disabled = true;
        document.getElementById('status').innerText = "Pizarra limpia.";
        currentTopic = "";
    }

    async function publicar() {
        const btn = document.getElementById('btnPub');
        btn.disabled = true;
        document.getElementById('status').innerText = "Enviando a LinkedIn...";

        try {
            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    mensaje: document.getElementById('postText').value,
                    url_imagen: finalImageUrl
                })
            });
            if(res.ok) {
                document.getElementById('status').innerText = "✅ PUBLICADO EXITOSAMENTE";
            }
        } catch(e) { 
            alert("Error de conexión"); 
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
