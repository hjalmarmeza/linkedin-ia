<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Deep Insight Pro - LinkedIn</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent: #58a6ff; --bg: #0d1117; --card: #161b22; --success: #238636; --primary: #1f6feb; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 16px; width: 100%; max-width: 600px; border: 1px solid #30363d; box-shadow: 0 16px 48px rgba(0,0,0,0.6); }
        h1 { font-size: 1.4rem; color: var(--accent); text-align: center; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        textarea { width: 100%; height: 350px; background: var(--bg); color: #e6edf3; border: 1px solid #30363d; padding: 15px; border-radius: 8px; font-size: 14px; line-height: 1.6; resize: vertical; box-sizing: border-box; margin-bottom: 12px; }
        .img-preview { width: 100%; min-height: 300px; background: #000; border-radius: 12px; margin-bottom: 20px; border: 2px solid #30363d; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #postImage { width: 100%; height: auto; display: none; }
        #loader { color: var(--accent); font-weight: 600; text-align: center; display: none; flex-direction: column; gap: 15px; align-items: center; }
        button { width: 100%; padding: 16px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; margin-bottom: 12px; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-gen { background: var(--success); color: white; }
        .btn-pub { background: var(--primary); color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { font-size: 13px; text-align: center; color: #8b949e; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-robot"></i> LinkedIn IA Auto-Poster</h1>
    <textarea id="postText" placeholder="Toca GENERAR para crear un análisis disruptivo..."></textarea>
    
    <div class="img-preview">
        <div id="loader">
            <i class="fas fa-atom fa-spin fa-2x"></i>
            <span>IA GENERANDO VISUAL...</span>
        </div>
        <img id="postImage" alt="Preview">
    </div>

    <button class="btn-gen" onclick="generarPropuesta()">
        <i class="fas fa-magic"></i> 1. GENERAR ANÁLISIS E IMAGEN
    </button>
    
    <button id="btnPub" class="btn-pub" onclick="publicar()" disabled>
        <i class="fab fa-linkedin"></i> 2. PUBLICAR EN LINKEDIN
    </button>
    
    <div id="status">Esperando inicio...</div>
</div>

<script>
    // URL ACTUALIZADA SEGÚN TU SOLICITUD
    const WEBHOOK_URL = "https://hook.eu2.make.com/npbtxec20xxq92ef67qxijvvc4hl5kud";
    let finalImageUrl = "";

    const baseNoticias = [
        { 
            t: "IA AGÉNTICA: MÁS ALLÁ DE LOS CHATS", 
            p: "autonomous_ai_agents_working_in_futuristic_digital_landscape_hyper_realistic_cinematic_4k",
            d: "La transición de copilotos a agentes autónomos marca el inicio de una nueva era en la productividad empresarial sin intervención constante."
        },
        { 
            t: "CIUDADES INTELIGENTES Y GEMELOS DIGITALES", 
            p: "smart_city_digital_twin_glowing_data_neural_networks_cinematic_lighting",
            d: "El uso de simulaciones en tiempo real permite optimizar infraestructuras urbanas y servicios públicos con precisión milimétrica."
        }
    ];

    function generarPropuesta() {
        const info = baseNoticias[Math.floor(Math.random() * baseNoticias.length)];
        const loader = document.getElementById('loader');
        const img = document.getElementById('postImage');
        const btnPub = document.getElementById('btnPub');
        const status = document.getElementById('status');

        document.getElementById('postText').value = `🚀 ANÁLISIS DISRUPTIVO: ${info.t}\n\n${info.d}\n\n🔹 IMPACTO ESTRATÉGICO:\n1. Eficiencia Operativa\n2. Análisis Predictivo\n3. Escalabilidad Total\n\n#IA #Innovation #FutureTech #Analitica`;

        img.style.display = "none";
        loader.style.display = "flex";
        btnPub.disabled = true;

        const seed = Date.now();
        // URL DIRECTA para que LinkedIn descargue el archivo sin errores
        finalImageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(info.p)}?width=1200&height=630&seed=${seed}&nologo=true`;

        img.src = finalImageUrl;
        img.onload = () => {
            loader.style.display = "none";
            img.style.display = "block";
            btnPub.disabled = false;
            status.textContent = "✓ Post e Imagen IA real listos.";
        };
    }

    async function publicar() {
        const btn = document.getElementById('btnPub');
        const status = document.getElementById('status');
        btn.disabled = true;
        status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Publicando...';

        const payload = {
            mensaje: document.getElementById('postText').value,
            url_imagen: finalImageUrl 
        };

        try {
            const response = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (response.ok) {
                status.textContent = "✅ PUBLICADO EXITOSAMENTE";
                btn.disabled = false;
            } else { throw new Error(); }
        } catch (error) {
            status.textContent = "❌ Error de conexión con Make.";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
