    function obtenerSimboloCategoria(categoria) {
        // Buscar coincidencias parciales en las categorías
        const categoriaLower = categoria.toLowerCase();
        
        // Primero buscar coincidencias exactas
        for (const [key, value] of Object.entries(simbolosCategoria)) {
            if (categoriaLower.includes(key.toLowerCase())) {
                return value;
            }
        }
        
        // Si no encuentra coincidencia, usar símbolos generales
        const palabrasClave = categoriaLower.split(' ');
        for (const palabra of palabrasClave) {
            for (const [key, value] of Object.entries(simbolosCategoria)) {
                if (palabra.includes(key.toLowerCase()) || key.toLowerCase().includes(palabra)) {
                    return value;
                }
            }
        }
        
        return "floating holographic interfaces, glowing data streams, digital technology symbols, futuristic UI elements";
    }

    function obtenerPublicados() {
        const publicados = localStorage.getItem('postsPublicados');
        return publicados ? JSON.parse(publicados) : [];
    }

    function guardarPublicado(id) {
        const publicados = obtenerPublicados();
        if (!publicados.includes(id)) {
            publicados.push(id);
            localStorage.setItem('postsPublicados', JSON.stringify(publicados));
        }
        actualizarEstadisticas();
    }

    function actualizarEstadisticas() {
        const publicados = obtenerPublicados();
        const disponibles = paquetes.length - publicados.length;
        
        document.getElementById('publicados').textContent = publicados.length;
        document.getElementById('disponibles').textContent = disponibles;
        
        if (disponibles === 0) {
            document.getElementById('warning-message').style.display = 'block';
        } else {
            document.getElementById('warning-message').style.display = 'none';
        }
    }

    function generarNarrativa() {
        try {
            const publicados = obtenerPublicados();
            const disponibles = paquetes.filter(p => !publicados.includes(p.id));
            
            if (disponibles.length === 0) {
                alert('⚠️ Ya has usado todos los posts disponibles. Usa "Reiniciar Historial" para comenzar de nuevo.');
                return;
            }
            
            const paquete = disponibles[Math.floor(Math.random() * disponibles.length)];
            categoriaActual = paquete.categoria;
            postActualId = paquete.id;
            
            let texto = `${paquete.titulo.toUpperCase()}\n\n`;
            texto += `${paquete.apertura}\n\n`;
            texto += `${paquete.contexto}\n\n`;
            texto += `Tres claves para entender ${paquete.categoria}:\n\n`;
            paquete.puntos.forEach(pt => { texto += pt + "\n\n"; });
            texto += `${paquete.cierre}\n\n`;
            texto += `${paquete.frase_transicion}\n\n`;
            texto += paquete.tags;

            document.getElementById('post-text').value = texto;
            document.getElementById('status-circle').style.background = "#ffaa00";
            regenerarImagen();
        } catch (error) {
            console.error("Error al generar narrativa:", error);
            alert("Error al generar el post: " + error.message);
        }
    }

    function regenerarImagen() {
        if (!categoriaActual) {
            alert("Primero genera un post usando el botón 'Generar Post'");
            return;
        }

        if (imagenCargando) return;
        
        try {
            imagenCargando = true;
            const btnImg = document.getElementById('btn-img');
            const textoOriginal = btnImg.innerHTML;
            btnImg.innerHTML = '<span class="loading"></span> GENERANDO IMAGEN...';
            btnImg.disabled = true;
            
            // Obtener símbolos específicos para la categoría
            const simbolos = obtenerSimboloCategoria(categoriaActual);
            
            // Prompt maestro con estilo Ciber-Realismo Cinematográfico mejorado
            const prompt = `Hyper-realistic cinematic cyber-realism with holographic data fusion. 
            Composition: Three dynamic layers - foreground with sharp floating digital elements (${simbolos}), 
            middle plane with integrated human figures interacting with technology, 
            background with futuristic urban canyon of towering skyscrapers with neon lights creating dramatic chiaroscuro.
            
            Lighting: Dramatic chiaroscuro contrast with deep shadows and bright highlights. 
            Color palette: Electric Cyan (#00f2ff) for data streams and holograms, 
            Neon Violet (#7000ff) for contrast accents and depth, 
            Gold (#FFD700) and Amber (#FF8C00) for street lights and warmth against cool technological blues.
            
            Visual elements: Glowing translucent holographic interfaces, 3D floating icons representing ${categoriaActual}, 
            data streams flowing through air, light particles, refractive effects.
            
            Style: 8k resolution, ultra-detailed textures, professional commercial photography, 
            cinematic depth of field with soft bokeh background, volumetric lighting, lens flares.
            
            Mood: Futuristic, technological, intelligent, innovative. 
            No text, no logos, no people recognizable as celebrities.`;
            
            const seed = Math.floor(Math.random() * 999999);
            
            // Limpiar el prompt para URL
            const promptLimpio = prompt.replace(/\s+/g, ' ').trim();
            
            // URL optimizada para pollinations.ai
            const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(promptLimpio)}?width=1080&height=1080&seed=${seed}&nologo=true&model=flux&style=cinematic&enhance=true`;
            
            console.log("🌐 Generando imagen con estilo Ciber-Realismo para:", categoriaActual);
            console.log("🔧 Símbolos utilizados:", simbolos);
            
            const imgElement = document.getElementById('post-image');
            imgElement.src = "";
            imgElement.style.opacity = "0.5";
            imgElement.style.transition = "opacity 0.5s ease";
            
            // Precargar imagen
            const img = new Image();
            img.crossOrigin = "anonymous";
            
            img.onload = function() {
                imgElement.src = imageUrl;
                setTimeout(() => {
                    imgElement.style.opacity = "1";
                }, 100);
                
                document.getElementById('status-circle').style.background = "#00f2ff";
                console.log("✅ Imagen Ciber-Realista generada exitosamente");
                
                // Restaurar botón
                setTimeout(() => {
                    btnImg.innerHTML = textoOriginal;
                    btnImg.disabled = false;
                    imagenCargando = false;
                }, 500);
            };
            
            img.onerror = function() {
                console.warn("⚠️ Pollinations.ai no disponible, usando fallback mejorado...");
                
                // Fallback mejorado con múltiples opciones
                const fallbacks = [
                    `https://picsum.photos/seed/cyber-${seed}/1080/1080?grayscale`,
                    `https://picsum.photos/seed/future-${seed}/1080/1080`,
                    `https://picsum.photos/seed/tech-${seed}/1080/1080?blur=2`
                ];
                
                const fallbackUrl = fallbacks[seed % fallbacks.length];
                imgElement.src = fallbackUrl;
                
                // Aplicar filtros CSS para simular estilo cibernético
                imgElement.style.filter = `
                    contrast(1.3) 
                    saturate(1.4) 
                    hue-rotate(200deg) 
                    brightness(0.85)
                    sepia(0.1)
                `;
                
                setTimeout(() => {
                    imgElement.style.opacity = "1";
                }, 100);
                
                document.getElementById('status-circle').style.background = "#ffaa00";
                console.log("🔄 Usando fallback con filtros CSS");
                
                // Restaurar botón
                setTimeout(() => {
                    btnImg.innerHTML = textoOriginal;
                    btnImg.disabled = false;
                    imagenCargando = false;
                }, 500);
            };
            
            // Iniciar carga
            img.src = imageUrl;
            
            // Timeout de seguridad (15 segundos)
            setTimeout(() => {
                if (imagenCargando) {
                    console.warn("⏰ Timeout alcanzado, usando placeholder");
                    imgElement.src = `https://via.placeholder.com/1080x1080/0a0a1a/00f2ff?text=${encodeURIComponent(categoriaActual.substring(0, 30))}`;
                    imgElement.style.filter = "none";
                    imgElement.style.opacity = "1";
                    
                    btnImg.innerHTML = textoOriginal;
                    btnImg.disabled = false;
                    imagenCargando = false;
                    document.getElementById('status-circle').style.background = "#ff4444";
                }
            }, 15000);
            
        } catch (error) {
            console.error("❌ Error crítico al regenerar imagen:", error);
            document.getElementById('post-image').src = `https://via.placeholder.com/1080x1080/0a0a1a/00f2ff?text=${encodeURIComponent(categoriaActual || "IA")}`;
            document.getElementById('btn-img').innerHTML = '🖼️ GENERAR IMAGEN CIBER-REALISTA';
            document.getElementById('btn-img').disabled = false;
            imagenCargando = false;
            document.getElementById('status-circle').style.background = "#ff4444";
        }
    }

    async function publicarEnLinkedin() {
        const text = document.getElementById('post-text').value;
        const image = document.getElementById('post-image').src;
        const webhookUrl = "https://hook.eu2.make.com/xbfleegfnwx93ri9m260xfi3lf5ovf23"; 
        
        if (!text || text === "") {
            alert("Por favor genera un post primero usando el botón 'Generar Post'");
            return;
        }
        
        if (!postActualId) {
            alert("Error: No se puede identificar el post actual");
            return;
        }
        
        document.getElementById('status-circle').style.background = "#ffaa00";
        
        try {
            const response = await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    text, 
                    image,
                    categoria: categoriaActual,
                    id: postActualId,
                    timestamp: new Date().toISOString(),
                    version: "LinkedinMatic v42.0 - Ciber-Realismo"
                })
            });
            
            if (response.ok) {
                guardarPublicado(postActualId);
                document.getElementById('status-circle').style.background = "#238636";
                alert("✅ Post enviado correctamente a LinkedIn");
                
                // Limpiar
                document.getElementById('post-text').value = "";
                document.getElementById('post-image').src = "";
                categoriaActual = "";
                postActualId = null;
            } else {
                document.getElementById('status-circle').style.background = "#ff4444";
                alert("❌ Error al publicar. Código: " + response.status);
            }
        } catch (e) { 
            document.getElementById('status-circle').style.background = "#ff4444";
            alert("❌ Error de conexión: " + e.message); 
        }
    }
