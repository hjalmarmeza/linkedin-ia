<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA Strategic Studio v39.0</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent: #58a6ff; --bg: #0d1117; --card: #161b22; --success: #238636; --primary: #1f6feb; --danger: #f85149; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { background: var(--card); padding: 15px; border-radius: 12px; width: 100%; max-width: 500px; border: 1px solid #30363d; }
        .header-status { font-size: 11px; font-weight: bold; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .status-red { color: var(--danger); background: rgba(248, 81, 73, 0.1); border-color: var(--danger); }
        .status-blue { color: var(--accent); background: rgba(88, 166, 255, 0.1); border-color: var(--accent); }
        .input-manual { width: 100%; background: #000; color: var(--accent); border: 1px solid #444; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; font-style: italic; }
        textarea { width: 100%; height: 420px; background: var(--bg); color: #e6edf3; border: 1px solid #30363d; padding: 15px; border-radius: 8px; font-size: 14px; line-height: 1.6; resize: none; margin-bottom: 12px; }
        .img-preview { width: 100%; height: 230px; background: #000; border-radius: 8px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; border: 1px solid #30363d; position: relative; }
        #postImg { width: 100%; height: 100%; object-fit: cover; display: none; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { height: 50px; border-radius: 8px; border: none; font-weight: bold; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; color: white; transition: 0.2s; }
        .btn-gen { background: var(--success); }
        .btn-img { background: #8957e5; }
        .btn-clear { background: #30363d; border: 1px solid var(--danger); color: var(--danger); }
        .btn-pub { background: var(--primary); }
        button:disabled { opacity: 0.4; filter: grayscale(1); pointer-events: none; }
        #status { font-size: 10px; text-align: center; color: #8b949e; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
<div class="container">
    <div id="engineBox" class="header-status status-red">
        <span><i class="fas fa-microchip"></i> <span id="apiLabel">SINCRONIZANDO...</span></span>
        <span id="newsSource">STANDBY</span>
    </div>
    <input type="text" id="manualTopic" class="input-manual" placeholder="Tópico personalizado (Opcional)...">
    <textarea id="postText" placeholder="El motor está reescribiendo la realidad tecnológica bajo un lente ético-eficiente..."></textarea>
    <div class="img-preview">
        <div id="loader" style="display:none;"><i class="fas fa-atom fa-spin fa-3x"></i></div>
        <img id="postImg">
    </div>
    <div class="action-grid">
        <button id="btnGen" class="btn-gen" onclick="generarAnalisis()" disabled><i class="fas fa-sync fa-spin"></i> BUSCANDO...</button>
        <button id="btnImg" class="btn-img" onclick="generarImagen()" disabled><i class="fas fa-magic"></i> IMAGEN</button>
        <button class="btn-clear" onclick="limpiarYRefrescar()"><i class="fas fa-eraser"></i> LIMPIAR</button>
        <button id="btnPub" class="btn-pub" onclick="publicar()" disabled><i class="fab fa-linkedin"></i> PUBLICAR</button>
    </div>
    <div id="status">v39.0 - Reescritura Estratégica</div>
</div>

<script>
    const API_KEYS = {
        newsapi: "7b6710d7c32347a6b2810545dc5307a6b2810545dc530",
        gnews: "b97f9baa6fcb9856ef2f803fd3e68c7a",
        currents: "2MPkzgzuySxwVFTooMFaC0HcOkl3yjwdKnfN3cPbVEUG9VDJ",
        mediastack: "21db872475f860207b63b3472f30588a"
    };
    const WEBHOOK_URL = "https://hook.eu2.make.com/6bbwbx4zr42kwe88t5ggvu9hbb9vyh7g";
    
    let activeTopic = "";
    let finalImageUrl = "";
    const searchTerms = ["IA ética negocios", "eficiencia algoritmos", "automatización responsable", "gobierno de datos IA"];

    async function fetchNewsInCascade() {
        const engineBox = document.getElementById('engineBox');
        const newsSource = document.getElementById('newsSource');
        const apiLabel = document.getElementById('apiLabel');
        const btnGen = document.getElementById('btnGen');

        activeTopic = ""; 
        engineBox.className = "header-status status-red";
        btnGen.disabled = true;
        btnGen.innerHTML = '<i class="fas fa-sync fa-spin"></i> BUSCANDO...';

        const query = searchTerms[Math.floor(Math.random() * searchTerms.length)];
        const order = ["newsapi", "gnews", "currents", "mediastack"];
        const proxy = "https://api.allorigins.win/get?url=";

        for (let apiName of order) {
            try {
                apiLabel.innerText = `BYPASS ${apiName.toUpperCase()}...`;
                let baseUrl = "";
                const cb = Date.now();

                if(apiName === "newsapi") baseUrl = `https://newsapi.org/v2/everything?q=${query}&language=es&sortBy=publishedAt&pageSize=5&apiKey=${API_KEYS.newsapi}`;
                if(apiName === "gnews") baseUrl = `https://gnews.io/api/v4/search?q=${query}&lang=es&max=5&apikey=${API_KEYS.gnews}`;
                if(apiName === "currents") baseUrl = `https://api.currentsapi.services/v1/search?keywords=${query}&language=es&apiKey=${API_KEYS.currents}`;
                if(apiName === "mediastack") baseUrl = `http://api.mediastack.com/v1/news?access_key=${API_KEYS.mediastack}&keywords=${query}&languages=es`;

                const res = await fetch(`${proxy}${encodeURIComponent(baseUrl + '&nocache=' + cb)}`);
                const proxyData = await res.json();
                const data = JSON.parse(proxyData.contents);
                
                let title = "";
                if(apiName === "newsapi" && data.articles?.length) title = data.articles[0].title;
                if(apiName === "gnews" && data.articles?.length) title = data.articles[0].title;
                if(apiName === "currents" && data.news?.length) title = data.news[0].title;
                if(apiName === "mediastack" && data.data?.length) title = data.data[0].title;

                if(title) {
                    activeTopic = title;
                    engineBox.className = "header-status status-blue";
                    apiLabel.innerText = `ESTADO: [${apiName.toUpperCase()}]`;
                    newsSource.innerText = activeTopic.substring(0, 18).toUpperCase() + "...";
                    btnGen.disabled = false;
                    btnGen.innerHTML = '<i class="fas fa-brain"></i> GENERAR';
                    return; 
                }
            } catch(e) { console.log(`${apiName} sin respuesta.`); }
        }
        
        activeTopic = "El dilema de la autonomía algorítmica y la ética humana";
        engineBox.className = "header-status status-blue";
        apiLabel.innerText = "ESTADO: [AUTÓNOMO]";
        newsSource.innerText = "MODO ESTRATÉGICO";
        btnGen.disabled = false;
        btnGen.innerHTML = '<i class="fas fa-brain"></i> GENERAR';
    }

    function generarAnalisis() {
        const manual = document.getElementById('manualTopic').value;
        const topicSource = manual.trim() !== "" ? manual : activeTopic;

        // MOTOR DE REESCRITURA ESTRATÉGICA
        const powerVerbs = ["Orquestación", "Evolución", "Redefinición", "Integridad", "Gobernanza"];
        const selectedVerb = powerVerbs[Math.floor(Math.random() * powerVerbs.length)];
        
        // Transformar el título original en uno de autoridad
        const rewrittenTitle = `🚀 ${selectedVerb}: El nuevo paradigma de la ${topicSource.toLowerCase().replace(/la |el |de |en /g, "")}`;
        
        const intro = "Más allá del ruido tecnológico, nos encontramos en una frontera donde la eficiencia ya no puede ser el único KPI. El liderazgo moderno se mide por la capacidad de integrar potencia algorítmica con un marco ético innegociable.";
        
        const efParagraph = `Al analizar la ${topicSource.toLowerCase()}, queda claro que la optimización operativa es el gran motor de nuestra era. Sin embargo, en la carrera por eliminar la fricción táctica, no debemos sacrificar la transparencia que sostiene la confianza de los stakeholders.`;
        
        const etParagraph = "La verdadera eficiencia no es solo velocidad; es la sostenibilidad de un sistema que respeta la privacidad y la integridad humana. La automatización sin ética es, en última instancia, una deuda técnica y moral que ninguna organización puede permitirse.";

        const bullets = [
            "• Sincronía entre alto rendimiento y responsabilidad algorítmica.",
            "• Eliminación de sesgos en la síntesis de datos estratégicos.",
            "• Blindaje ético como ventaja competitiva en el mercado global.",
            "• Optimización de recursos bajo una gobernanza humana transparente.",
            "• Escalabilidad resiliente que protege el propósito corporativo."
        ];

        const conclusion = "En definitiva, el éxito real no reside en la potencia del software adoptado, sino en la visión estratégica para orquestar un ecosistema donde la eficiencia y la ética no solo coexistan, sino que se potencien mutuamente.";

        const content = [
            rewrittenTitle.toUpperCase(),
            "",
            intro,
            "",
            efParagraph,
            "",
            etParagraph,
            "",
            "🔹 PILARES DE LIDERAZGO EN IA:",
            bullets[0],
            bullets[1],
            bullets[2],
            bullets[3],
            bullets[4],
            "",
            conclusion,
            "",
            "#IA #Estrategia #EticaIA #Eficiencia #Liderazgo #Negocios #TechResponsable"
        ];
        
        document.getElementById('postText').value = content.join("\n");
        document.getElementById('btnImg').disabled = false;
        document.getElementById('status').innerText = "✓ POST REESCRITO Y LISTO";
    }

    function generarImagen() {
        const loader = document.getElementById('loader');
        const img = document.getElementById('postImg');
        img.style.display = "none";
        loader.style.display = "block";
        const seed = Date.now();
        finalImageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(activeTopic + " ethical artificial intelligence efficiency business render")}?width=1200&height=630&seed=${seed}&nologo=true`;
        img.src = finalImageUrl;
        img.onload = () => {
            loader.style.display = "none";
            img.style.display = "block";
            document.getElementById('btnPub').disabled = false;
        };
    }

    function limpiarYRefrescar() {
        document.getElementById('postText').value = "";
        document.getElementById('postImg').style.display = "none";
        document.getElementById('manualTopic').value = "";
        document.getElementById('btnImg').disabled = true;
        document.getElementById('btnPub').disabled = true;
        document.getElementById('status').innerText = "GENERANDO NUEVO PENSAMIENTO...";
        fetchNewsInCascade(); 
    }

    async function publicar() {
        const btn = document.getElementById('btnPub');
        btn.disabled = true;
        document.getElementById('status').innerText = "PUBLICANDO...";
        try {
            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mensaje: document.getElementById('postText').value, url_imagen: finalImageUrl })
            });
            if(res.ok) document.getElementById('status').innerText = "✅ ENVIADO A LINKEDIN";
        } catch(e) { alert("Error"); btn.disabled = false; }
    }
    
    window.onload = fetchNewsInCascade;
</script>
</body>
</html>
