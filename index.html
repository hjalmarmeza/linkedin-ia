    let categoriaActual = "";
    let postActualId = null;
    let imagenCargando = false;

    function obtenerPublicados() {
        const publicados = localStorage.getItem('postsPublicados');
        return publicados ? JSON.parse(publicados) : [];
    }

    function guardarPublicado(id) {
        const publicados = obtenerPublicados();
        if (!publicados.includes(id)) {
            publicados.push(id);
            localStorage.setItem('postsPublicados', JSON.stringify(publicados));
        }
        actualizarEstadisticas();
    }

    function actualizarEstadisticas() {
        const publicados = obtenerPublicados();
        const disponibles = paquetes.length - publicados.length;
        document.getElementById('publicados').textContent = publicados.length;
        document.getElementById('disponibles').textContent = disponibles;
        if (disponibles === 0) {
            document.getElementById('warning-message').style.display = 'block';
        } else {
            document.getElementById('warning-message').style.display = 'none';
        }
    }

    function generarNarrativa() {
        try {
            const publicados = obtenerPublicados();
            const disponibles = paquetes.filter(p => !publicados.includes(p.id));
            if (disponibles.length === 0) {
                alert('⚠️ Ya has usado todos los posts disponibles.');
                return;
            }
            const paquete = disponibles[Math.floor(Math.random() * disponibles.length)];
            categoriaActual = paquete.categoria;
            postActualId = paquete.id;
            let texto = `${paquete.titulo.toUpperCase()}\n\n${paquete.apertura}\n\n${paquete.contexto}\n\nTres claves:\n\n`;
            paquete.puntos.forEach(pt => { texto += pt + "\n\n"; });
            texto += `${paquete.cierre}\n\n${paquete.frase_transicion}\n\n${paquete.tags}`;
            document.getElementById('post-text').value = texto;
            document.getElementById('status-circle').style.background = "#ffaa00";
            regenerarImagen();
        } catch (error) { alert("Error al generar narrativa."); }
    }

    function regenerarImagen() {
        if (!categoriaActual || imagenCargando) return;
        
        imagenCargando = true;
        const btnImg = document.getElementById('btn-img');
        const imgElement = document.getElementById('post-image');
        const textoOriginal = btnImg.innerHTML;
        
        btnImg.innerHTML = '<span class="loading"></span> BUSCANDO IMAGEN CIBER-REALISTA...';
        btnImg.disabled = true;
        imgElement.style.opacity = "0.3";

        // NUEVO MÉTODO: Lexica Art API para imágenes de alto nivel garantizadas
        // Usamos una búsqueda estratégica que combine tu prompt con la categoría
        const queryBase = `cinematic cyber-realism professional tech executive interacting with holographic data interfaces, brushed metal, carbon fiber, 8k, moody lighting, industrial technology, high-end photography`;
        const queryFinal = `${queryBase} ${categoriaActual}`;
        
        const url = `https://lexica.art/api/v1/search?q=${encodeURIComponent(queryFinal)}`;

        fetch(url)
            .then(res => res.json())
            .then(data => {
                if (data.images && data.images.length > 0) {
                    // Elegimos una imagen aleatoria de los mejores resultados (primeros 15)
                    // Esto asegura variedad y calidad extrema
                    const randomIndex = Math.floor(Math.random() * Math.min(data.images.length, 15));
                    const imgUrl = data.images[randomIndex].src;
                    
                    imgElement.src = imgUrl;
                    imgElement.onload = () => {
                        imgElement.style.opacity = "1";
                        document.getElementById('status-circle').style.background = "#00f2ff";
                        btnImg.innerHTML = textoOriginal;
                        btnImg.disabled = false;
                        imagenCargando = false;
                    };
                } else {
                    throw new Error("No se encontraron imágenes");
                }
            })
            .catch(error => {
                console.error("Error Lexica:", error);
                // Si falla Lexica (raro), volvemos a una búsqueda más simple
                imgElement.src = "https://source.unsplash.com/1080x1080/?cyber-technology,futuristic";
                btnImg.innerHTML = textoOriginal;
                btnImg.disabled = false;
                imagenCargando = false;
            });
    }

    async function publicarEnLinkedin() {
        const text = document.getElementById('post-text').value;
        const image = document.getElementById('post-image').src;
        if (!text) return alert("Genera un post primero.");
        document.getElementById('status-circle').style.background = "#ffaa00";
        try {
            const response = await fetch("https://hook.eu2.make.com/xbfleegfnwx93ri9m260xfi3lf5ovf23", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, image, id: postActualId, version: "v42.0-Lexica-Cyber" })
            });
            if (response.ok) {
                guardarPublicado(postActualId);
                document.getElementById('status-circle').style.background = "#238636";
                alert("✅ Post enviado correctamente a LinkedIn");
                document.getElementById('post-text').value = "";
                document.getElementById('post-image').src = "";
                categoriaActual = "";
                postActualId = null;
            }
        } catch (e) { alert("Error de conexión."); }
    }

    function reiniciarHistorial() {
        if (confirm('¿Reiniciar historial?')) {
            localStorage.removeItem('postsPublicados');
            actualizarEstadisticas();
            alert('✅ Reiniciado');
        }
    }

    document.addEventListener('DOMContentLoaded', actualizarEstadisticas);
</script>
