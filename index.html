<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Deep Insight Pro v23.3</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent: #58a6ff; --bg: #0d1117; --card: #161b22; --success: #238636; --primary: #1f6feb; --text-muted: #8b949e; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; padding: 15px; margin: 0; }
        .container { background: var(--card); padding: 25px; border-radius: 16px; width: 100%; max-width: 800px; border: 1px solid #30363d; box-shadow: 0 16px 48px rgba(0,0,0,0.6); }
        .grid-main { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid-main { grid-template-columns: 1fr; } }
        .news-badge { background: #f85149; color: white; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .news-title { font-size: 14px; color: var(--accent); margin-bottom: 15px; font-weight: bold; min-height: 20px; }
        .control-row { display: flex; gap: 10px; margin-bottom: 15px; }
        select, button { border-radius: 8px; font-weight: 600; font-size: 13px; }
        select { background: var(--bg); color: white; border: 1px solid #30363d; padding: 10px; flex: 1; }
        .linkedin-preview { background: white; color: rgba(0,0,0,0.9); padding: 15px; border-radius: 8px; margin-top: 20px; font-family: sans-serif; display: none; border: 1px solid #ddd; }
        .post-content { font-size: 14px; line-height: 1.4; white-space: pre-wrap; color: #333; }
        textarea { width: 100%; height: 380px; background: var(--bg); color: #e6edf3; border: 1px solid #30363d; padding: 15px; border-radius: 8px; font-size: 13px; line-height: 1.5; resize: none; box-sizing: border-box; }
        .img-preview { width: 100%; min-height: 250px; background: #000; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #444; }
        #postImg { width: 100%; display: none; }
        .btn-gen { background: var(--success); color: white; width: 100%; height: 50px; }
        .btn-img { background: #8957e5; color: white; width: 100%; height: 50px; margin-top: 10px; }
        .btn-pub { background: var(--primary); color: white; width: 100%; height: 50px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="news-badge"><i class="fas fa-bolt"></i> TENDENCIAS REALES</div>
    <div id="newsTopic" class="news-title">Sistema listo para analizar</div>

    <div class="grid-main">
        <div class="edit-zone">
            <div class="control-row">
                <select id="toneSelect">
                    <option value="Inspirador">Redacción: Inspiradora</option>
                    <option value="Técnico">Redacción: Técnica</option>
                    <option value="Crítico">Redacción: Crítica</option>
                </select>
                <select id="formatSelect">
                    <option value="list">Formato: Listado</option>
                    <option value="story">Formato: Narrativo</option>
                </select>
            </div>
            <textarea id="postText" placeholder="El análisis aparecerá aquí..."></textarea>
            <div id="lineCount" style="font-size:10px; text-align:right; color:var(--text-muted); margin-top:5px;">Líneas: 0 / 20-25</div>
        </div>

        <div class="visual-zone">
            <div class="img-preview">
                <div id="loader"><i class="fas fa-atom fa-spin fa-2x"></i></div>
                <img id="postImg">
            </div>
            <select id="styleSelect" style="width:100%; margin-bottom:10px;">
                <option value="photorealistic">Visual: Fotorrealista</option>
                <option value="cyberpunk">Visual: Cyberpunk</option>
                <option value="minimalist">Visual: Minimalista</option>
            </select>
            <button class="btn-gen" onclick="generarAnalisis()"><i class="fas fa-file-alt"></i> GENERAR TEXTO</button>
            <button id="btnImg" class="btn-img" onclick="generarImagen()" disabled><i class="fas fa-image"></i> GENERAR IMAGEN</button>
            <button id="btnPub" class="btn-pub" onclick="publicar()" disabled><i class="fab fa-linkedin"></i> PUBLICAR</button>
        </div>
    </div>

    <div id="preview" class="linkedin-preview">
        <strong>Vista Previa LinkedIn:</strong>
        <div id="previewText" class="post-content" style="margin-top:10px;"></div>
    </div>
</div>

<script>
    const NEWS_API_KEY = "7b6710d7c32347a6b2810545dc5307a6b2810545dc530";
    const WEBHOOK_URL = "https://hook.eu2.make.com/6bbwbx4zr42kwe88t5ggvu9hbb9vyh7g";
    let currentImage = "";
    let lastNewsTitle = "Evolución de la Inteligencia Artificial Agéntica";

    // Respaldo de temas para cuando la API no responde
    const backupTopics = [
        "El impacto de la IA Agéntica en la autonomía empresarial",
        "Gemelos Digitales: La revolución de las ciudades inteligentes",
        "Ética y Soberanía de Datos en la era de la IA Generativa",
        "Computación Cuántica y el futuro de la ciberseguridad"
    ];

    async function fetchNews() {
        try {
            const res = await fetch(`https://newsapi.org/v2/everything?q=Artificial+Intelligence+Business&language=es&sortBy=publishedAt&pageSize=5&apiKey=${NEWS_API_KEY}`);
            const data = await res.json();
            if(data.articles && data.articles.length > 0) {
                // Elegir una noticia aleatoria de las 5 recibidas para variar
                const randomNews = data.articles[Math.floor(Math.random() * data.articles.length)];
                lastNewsTitle = randomNews.title;
                document.getElementById('newsTopic').innerText = "ÚLTIMA NOTICIA: " + lastNewsTitle;
            }
        } catch(e) {
            lastNewsTitle = backupTopics[Math.floor(Math.random() * backupTopics.length)];
            document.getElementById('newsTopic').innerText = "TEMA: " + lastNewsTitle;
        }
    }

    function generarAnalisis() {
        // Cada vez que presionas el botón, intentamos traer noticia nueva o cambiar tema
        fetchNews(); 
        
        const tone = document.getElementById('toneSelect').value;
        const format = document.getElementById('formatSelect').value;
        
        let intro = format === 'list' ? 
            "¿Cómo impacta este avance en la eficiencia operativa?" : 
            "Imaginen que la noticia sobre " + lastNewsTitle + " es solo la punta del iceberg.";

        let body = [
            `🚀 ANÁLISIS ESTRATÉGICO: ${lastNewsTitle.toUpperCase()}`,
            "",
            intro,
            "",
            "El panorama tecnológico actual nos obliga a cuestionar si nuestras estructuras corporativas están preparadas para esta velocidad de cambio.",
            "Bajo un enfoque " + tone.toLowerCase() + ", esta evolución demuestra que el éxito no es solo técnico, sino profundamente estratégico.",
            "",
            "🔹 PUNTOS CLAVE DE VALOR:",
            "• Optimización de procesos críticos mediante lógica predictiva autónoma.",
            "• Reducción de la fricción operativa en entornos de alta demanda digital.",
            "• Fortalecimiento de la seguridad mediante modelos neuronales avanzados.",
            "• Capacidad de respuesta inmediata ante variables imprevistas del mercado.",
            "• Democratización de herramientas de alto nivel para equipos operativos.",
            "",
            "Este avance redefine lo que entendemos por ventaja competitiva en el sector tecnológico.",
            "Al observar el mercado global, queda claro que la tecnología es solo el habilitador.",
            "El éxito real reside en el talento humano capaz de orquestar estos sistemas con criterio.",
            "No se trata de sustituir el juicio humano, sino de potenciarlo a una escala sin precedentes.",
            "",
            "En conclusión, el futuro pertenece a quienes se atrevan a integrar estas innovaciones hoy mismo.",
            "¿Cuál es tu visión estratégica sobre este desarrollo?",
            "",
            "#IA #TechNews #Innovacion #Liderazgo #Analitica #Estrategia #Negocios #Futuro"
        ];

        const finalContent = body.join("\n");
        document.getElementById('postText').value = finalContent;
        document.getElementById('previewText').innerText = finalContent;
        document.getElementById('preview').style.display = "block";
        document.getElementById('btnImg').disabled = false;
        
        const lines = finalContent.split('\n').filter(l => l.trim() !== "").length;
        document.getElementById('lineCount').innerText = "Líneas: " + lines;
    }

    function generarImagen() {
        const loader = document.getElementById('loader');
        const img = document.getElementById('postImg');
        const style = document.getElementById('styleSelect').value;

        img.style.display = "none";
        loader.style.display = "flex";
        
        const seed = Date.now();
        // Usamos el título actual para que la imagen siempre coincida con el texto
        currentImage = `https://image.pollinations.ai/prompt/${encodeURIComponent(lastNewsTitle + " " + style)}?width=1200&height=630&seed=${seed}&nologo=true`;
        
        img.src = currentImage;
        img.onload = () => {
            loader.style.display = "none";
            img.style.display = "block";
            document.getElementById('btnPub').disabled = false;
        };
    }

    async function publicar() {
        const btn = document.getElementById('btnPub');
        btn.disabled = true;
        try {
            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    mensaje: document.getElementById('postText').value,
                    url_imagen: currentImage
                })
            });
            if(res.ok) alert("✓ Publicado exitosamente");
        } catch(e) { alert("Error de conexión con Make"); }
        btn.disabled = false;
    }

    // Cargar noticias iniciales
    window.onload = fetchNews;
</script>
</body>
</html>
