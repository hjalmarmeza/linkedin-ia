<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinkedinMatic v41.10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap');
        body { background-color: #050505; color: #e0e0e0; font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; }
        .cyber-card { background: rgba(10, 10, 10, 0.98); border: 1px solid #222; border-top: 3px solid #00f2ff; }
        .mobile-btn { height: 55px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; border: 1px solid #00f2ff; color: #00f2ff; font-size: 0.75rem; border-radius: 12px; font-weight: bold; background: rgba(0, 242, 255, 0.05); }
        .mobile-btn:active { background: #00f2ff; color: #000; transform: scale(0.96); }
        .publish-btn { background: #00f2ff; color: #000; border: none; font-size: 1rem; box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }
        .post-input { background: #000; border: 1px solid #333; color: #fff; line-height: 1.6; font-size: 15px; width: 100%; border-radius: 10px; padding: 15px; }
        select { color: #00f2ff !important; font-weight: bold; appearance: none; }
    </style>
</head>
<body class="p-2 bg-black">

    <div class="max-w-md mx-auto space-y-4 pb-12">
        <div class="flex justify-between items-center p-4 cyber-card rounded-2xl mt-2">
            <div>
                <h1 class="text-xl font-bold font-['Orbitron'] text-white">LINKEDIN<span class="text-cyan-400">MATIC</span></h1>
                <p class="text-[9px] text-gray-500 tracking-[3px]">DYNAMIC ANALYTICS</p>
            </div>
            <div class="text-[10px] text-cyan-400 font-bold px-2 py-1 border border-cyan-900 rounded">v41.10</div>
        </div>

        <div class="p-4 cyber-card rounded-2xl">
            <label class="block text-[10px] text-gray-500 mb-2 uppercase font-bold">Línea de Investigación Actual</label>
            <select id="topicSelector" class="post-input mb-4" onchange="actualizarTodo()">
                </select>
            
            <div class="grid grid-cols-2 gap-4">
                <button id="btnRegen" class="mobile-btn">NUEVO TEMA</button>
                <button id="btnNewImg" class="mobile-btn">NUEVA IMAGEN</button>
            </div>
        </div>

        <div class="cyber-card rounded-2xl overflow-hidden relative border-none">
            <img id="imgPreview" src="" class="w-full aspect-video object-cover transition-opacity duration-300">
            <div class="absolute top-2 right-2 bg-black/70 px-2 py-1 rounded text-[8px] text-cyan-400 font-bold">HQ AI RENDER</div>
        </div>

        <div class="cyber-card rounded-2xl p-2">
            <textarea id="postText" rows="16" class="post-input border-none focus:ring-0" placeholder="Escribiendo análisis estratégico..."></textarea>
        </div>

        <button id="btnPub" class="mobile-btn publish-btn w-full">
            PUBLICAR EN LINKEDIN
        </button>
    </div>

    <script>
        const WEBHOOK_PUB = "https://hook.eu2.make.com/hiurq1grt6euyiw1tdlkcw5rst9uxuuo";

        // Base de datos de enfoques estratégicos (20 variantes)
        const temasInves = [
            { h: "La Paradoja de la Autonomía IA", t: "Gobernanza y Ética" },
            { h: "Arquitecturas de Datos Soberanas", t: "Infraestructura Tech" },
            { h: "El Ocaso de los Modelos Masivos", t: "Small Language Models" },
            { h: "Sistemas Auto-Evolutivos", t: "Ingeniería de Software" },
            { h: "Neuromarketing Algorítmico", t: "Estrategia de Mercado" },
            { h: "Ciber-Resiliencia Proactiva", t: "Seguridad Digital" },
            { h: "Tokenización de la Inteligencia", t: "Economía Web3" },
            { h: "Interfaces Cerebro-Máquina", t: "Futuro del Trabajo" },
            { h: "Descarbonización del Cómputo", t: "Green Tech" },
            { h: "Analítica Predictiva de Caos", t: "Gestión de Riesgos" }
            // Se repiten y mezclan para llegar a 20
        ];

        function poblarTemas() {
            const selector = document.getElementById('topicSelector');
            selector.innerHTML = "";
            for(let i=0; i<20; i++) {
                let base = temasInves[i % temasInves.length];
                let opt = document.createElement('option');
                opt.value = i;
                opt.text = `Investigación #${i+1}: ${base.t}`;
                opt.dataset.hook = base.h;
                selector.appendChild(opt);
            }
        }

        function generarNuevoTexto() {
            const selector = document.getElementById('topicSelector');
            const hook = selector.options[selector.selectedIndex].dataset.hook;
            
            const desarrollos = [
                "La aceleración tecnológica actual está forzando una reestructuración de los cimientos corporativos. No se trata solo de eficiencia, sino de la capacidad de los sistemas para interpretar la ambigüedad en tiempo real.",
                "Estamos presenciando el fin de la era de la IA como herramienta externa para entrar en la era de la IA como sistema operativo central de la industria global.",
                "La clave de la próxima década no será quién tiene el modelo más grande, sino quién posee la arquitectura de datos más limpia y auditable."
            ];

            let post = `⚡ ${hook.toUpperCase()}\n\n`;
            post += `${desarrollos[Math.floor(Math.random()*desarrollos.length)]}\n\n`;
            post += `Al profundizar en este análisis, identificamos 4 vectores de cambio que están redefiniendo el mercado en este momento:\n\n`;
            post += `• Descentralización del Procesamiento: La migración hacia nodos locales para garantizar latencia cero y soberanía absoluta.\n`;
            post += `• Integridad Multimodal: La convergencia de visión, texto y audio en una sola capa de decisión estratégica.\n`;
            post += `• Ética Operativa: La transformación de los valores humanos en parámetros de código innegociables.\n`;
            post += `• Escalabilidad Sintética: La creación de flujos de trabajo que no dependen del crecimiento lineal de la fuerza laboral.\n\n`;
            post += `La profundidad de este cambio sugiere que las organizaciones que no logren integrar estos vectores en su pipeline actual enfrentarán desafíos de competitividad insalvables antes del próximo ciclo de innovación.\n\n`;
            post += `Este estudio confirma que la ventaja competitiva es ahora un activo dinámico, que requiere una vigilancia constante de los foros técnicos y los papers de investigación más recientes.\n\n`;
            post += `#IA #Estrategia #TechAnalytics #Innovacion #FutureOfWork #DataIntegrity #DeepTech #Liderazgo`;

            document.getElementById('postText').value = post;
        }

        function generarNuevaImagen() {
            const selector = document.getElementById('topicSelector');
            const hook = selector.options[selector.selectedIndex].dataset.hook;
            const img = document.getElementById('imgPreview');
            
            // Usamos un seed mucho más grande y dinámico para forzar el cambio
            const seed = Date.now() + Math.floor(Math.random() * 10000);
            const prompt = `Professional cinematic photography, futuristic technology representing ${hook}, high-end industrial design, clean aesthetics, 8k, bokeh effect, neon accents`;
            
            const url = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1080&height=600&seed=${seed}&nologo=true`;
            
            img.style.opacity = '0.3';
            img.src = url;
            img.dataset.url = url;
            img.onload = () => img.style.opacity = '1';
        }

        function actualizarTodo() {
            generarNuevoTexto();
            generarNuevaImagen();
        }

        // Botón "Nuevo Tema" que avanza en la lista y regenera todo
        function avanzarTema() {
            const selector = document.getElementById('topicSelector');
            let nextIndex = (selector.selectedIndex + 1) % selector.length;
            selector.selectedIndex = nextIndex;
            actualizarTodo();
        }

        async function publicar() {
            const btn = document.getElementById('btnPub');
            const payload = {
                post: document.getElementById('postText').value,
                image_url: document.getElementById('imgPreview').dataset.url
            };

            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            try {
                const res = await fetch(WEBHOOK_PUB, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                if(res.ok) alert("✓ ENVIADO A LINKEDINMATIC");
            } catch(e) {
                alert("Error de conexión");
            } finally {
                btn.innerText = "PUBLICAR EN LINKEDIN";
                btn.disabled = false;
            }
        }

        // ASIGNACIÓN DIRECTA DE EVENTOS PARA MÓVIL
        document.getElementById('btnRegen').addEventListener('click', avanzarTema);
        document.getElementById('btnNewImg').addEventListener('click', generarNuevaImagen);
        document.getElementById('btnPub').addEventListener('click', publicar);

        window.onload = () => {
            poblarTemas();
            actualizarTodo();
        };
    </script>
</body>
</html>
