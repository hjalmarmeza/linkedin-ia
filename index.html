<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LinkedinMatic v41.11</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap');
        body { background-color: #050505; color: #e0e0e0; font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; }
        .cyber-card { background: rgba(10, 10, 10, 0.98); border: 1px solid #222; border-top: 3px solid #00f2ff; }
        .mobile-btn { height: 50px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; border: 1px solid #00f2ff; color: #00f2ff; font-size: 0.75rem; border-radius: 8px; font-weight: bold; background: rgba(0, 242, 255, 0.05); }
        .mobile-btn:active { background: #00f2ff; color: #000; transform: scale(0.96); }
        .publish-btn { background: #00f2ff; color: #000; border: none; font-size: 1rem; box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        .post-input { background: #000; border: 1px solid #333; color: #fff; line-height: 1.6; font-size: 14px; width: 100%; border-radius: 8px; padding: 12px; }
        select.post-input { color: #00f2ff !important; font-weight: bold; appearance: none; }
    </style>
</head>
<body class="p-2 bg-black">

    <div class="max-w-md mx-auto space-y-4 pb-12">
        <div class="flex justify-between items-center p-4 cyber-card rounded-2xl mt-2">
            <div>
                <h1 class="text-xl font-bold font-['Orbitron'] text-white">LINKEDIN<span class="text-cyan-400">MATIC</span></h1>
                <p class="text-[9px] text-gray-500 tracking-[3px]">DYNAMIC ANALYTICS</p>
            </div>
            <div class="text-[10px] text-cyan-400 font-bold px-2 py-1 border border-cyan-900 rounded">V41.11</div>
        </div>

        <div class="p-4 cyber-card rounded-2xl">
            <label class="block text-[10px] text-gray-500 mb-2 uppercase font-bold">Línea Narrativa Actual</label>
            <select id="topicSelector" class="post-input mb-4" onchange="actualizarContenido()">
                </select>
            
            <div class="grid grid-cols-2 gap-4">
                <button id="btnNewPost" class="mobile-btn">NUEVA NARRATIVA</button>
                <button id="btnNewImg" class="mobile-btn">NUEVA IMAGEN</button>
            </div>
        </div>

        <div class="cyber-card rounded-2xl overflow-hidden relative border-none">
            <img id="imgPreview" src="" class="w-full aspect-video object-cover transition-opacity duration-300">
            <div class="absolute top-2 right-2 bg-black/70 px-2 py-1 rounded text-[8px] text-cyan-400 font-bold">HQ AI RENDER</div>
        </div>

        <div class="cyber-card rounded-2xl p-2">
            <textarea id="postText" rows="15" class="post-input border-none focus:ring-0" placeholder="Generando análisis..."></textarea>
        </div>

        <button id="btnPub" class="mobile-btn publish-btn w-full">
            PUBLICAR EN LINKEDIN
        </button>
    </div>

    <script>
        const WEBHOOK_PUB = "https://hook.eu2.make.com/hiurq1grt6euyiw1tdlkcw5rst9uxuuo";

        // Base de narrativas y ganchos de título
        const narrativasBase = [
            { gancho: "EL CO-PILOTO INTELIGENTE: TU MEJOR ALIA", tema: "Productividad IA" },
            { gancho: "REINVENTANDO LA CREATIVIDAD CON IA", tema: "Innovación y Diseño" },
            { gancho: "LA IA: EL ACELERADOR DE LA EFICIENCIA EMPRESARIAL", tema: "Optimización y Gestión" },
            { gancho: "EL FUTURO YA ESTÁ AQUÍ: IA AL SERVICIO DEL USUARIO", tema: "Experiencia de Usuario" },
            { gancho: "DESBLOQUEANDO EL TIEMPO: CÓMO LA IA LIBERA POTENCIAL", tema: "Gestión del Tiempo" },
            { gancho: "IA Y SOCIEDAD: CONSTRUYENDO UN FUTURO MÁS INTELIGENTE", tema: "Impacto Social" },
            { gancho: "LA ALTA FIDELIDAD DE DATOS GRACIAS A LA IA", tema: "Calidad de Datos" },
            { gancho: "LA VENTAJA ESTRATÉGICA DE LA INTELIGENCIA ARTIFICIAL", tema: "Competitividad Empresarial" }
        ];

        function poblarTemas() {
            const selector = document.getElementById('topicSelector');
            selector.innerHTML = "";
            narrativasBase.forEach((narrativa, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.text = `${narrativa.tema} - ${narrativa.gancho}`;
                opt.dataset.gancho = narrativa.gancho;
                selector.appendChild(opt);
            });
            // Aseguramos que haya 20 opciones repitiendo las bases para la selección
            while(selector.options.length < 20) {
                let base = narrativasBase[selector.options.length % narrativasBase.length];
                let opt = document.createElement('option');
                opt.value = selector.options.length;
                opt.text = `${base.tema} - ${base.gancho}`;
                opt.dataset.gancho = base.gancho;
                selector.appendChild(opt);
            }
        }

        function generarPostNarrativo() {
            const selector = document.getElementById('topicSelector');
            const selectedNarrative = narrativasBase[selector.value % narrativasBase.length];
            const gancho = selectedNarrative.gancho;

            const intros = [
                "La Inteligencia Artificial ya no es una promesa lejana; es el motor que impulsa la transformación actual. Desde la optimización de procesos hasta la redefinición de la experiencia del usuario, su impacto es innegable.",
                "Estamos inmersos en una era donde la capacidad de la IA para procesar información y generar soluciones está revolucionando cada sector. La clave reside en entender cómo esta tecnología puede potenciar nuestras capacidades humanas.",
                "En el dinámico panorama tecnológico, la IA se erige como un catalizador fundamental para el progreso. Su habilidad para desentrañar patrones complejos y automatizar tareas abre un abanico de posibilidades sin precedentes."
            ];

            const beneficios = [
                "La eficiencia es solo el punto de partida. La IA permite liberar a los equipos de tareas repetitivas, reorientando el talento hacia la innovación y la estrategia. Esto se traduce directamente en una mejora de tiempos de respuesta y una optimización sustancial de los recursos.",
                "Imagina un mundo donde las decisiones se toman con una precisión milimétrica y el tiempo se convierte en un aliado. La IA no solo acelera la ejecución, sino que enriquece la calidad de los resultados, ofreciendo insights que antes eran inalcanzables.",
                "Más allá de la velocidad, la IA introduce una nueva dimensión de inteligencia colectiva. Permite a las empresas entender mejor a sus usuarios, anticipar tendencias y personalizar experiencias a una escala nunca vista, lo que fomenta una conexión más profunda y relevante."
            ];

            const impactos = [
                "La sociedad se beneficia de sistemas más inteligentes en áreas críticas como la salud, la educación y la sostenibilidad. La IA facilita soluciones a problemas complejos, mejorando la calidad de vida y abriendo caminos hacia un futuro más equitativo y eficiente.",
                "Para los usuarios, la IA se traduce en experiencias más intuitivas y personalizadas. Desde asistentes inteligentes hasta recomendaciones precisas, la tecnología se adapta a nuestras necesidades, haciendo que la interacción digital sea más fluida y enriquecedora.",
                "El aporte de la IA trasciende lo meramente tecnológico. Está impulsando una era de eficiencia sin precedentes, donde el valor se crea no solo por lo que hacemos, sino por la inteligencia con la que lo hacemos. Esto redefine la productividad y el potencial humano."
            ];

            let post = `🚀 ${gancho.toUpperCase()}\n\n`;
            post += `${intros[Math.floor(Math.random()*intros.length)]}\n\n`;
            post += `**Beneficios palpables:**\n${beneficios[Math.floor(Math.random()*beneficios.length)]}\n\n`;
            post += `**Impacto en usuarios y sociedad:**\n${impactos[Math.floor(Math.random()*impactos.length)]}\n\n`;
            post += `La IA no es el futuro, es el presente que estamos co-creando. Su correcta integración es la clave para desbloquear una nueva era de posibilidades para empresas y usuarios.\n\n`;
            post += `¿Estás listo para liderar esta transformación?\n\n`;
            post += `#InteligenciaArtificial #Innovacion #FuturoDelTrabajo #Tecnologia #DigitalTransformation #Eficiencia #Automatizacion #Productividad #AI`;

            document.getElementById('postText').value = post;
        }

        function generarNuevaImagen() {
            const selector = document.getElementById('topicSelector');
            const selectedNarrative = narrativasBase[selector.value % narrativasBase.length];
            const promptKeyword = selectedNarrative.tema;
            const img = document.getElementById('imgPreview');
            
            // Usamos un seed con timestamp y un número aleatorio grande para asegurar unicidad
            const seed = Date.now() + Math.floor(Math.random() * 100000);
            const prompt = `Professional cinematic illustration, positive, futuristic technology, ${promptKeyword}, abstract data flows, vibrant cyan and purple tones, high detail, 8k, concept art, clean UI elements`;
            
            // Añadimos un timestamp a la URL para romper la caché del navegador y de la API
            const url = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1000&height=560&seed=${seed}&nologo=true&t=${Date.now()}`;
            
            img.style.opacity = '0.3'; // Efecto de carga
            img.src = url;
            img.dataset.url = url; // Guardamos la URL final
            img.onload = () => img.style.opacity = '1'; // Mostrar imagen al cargar
        }

        function actualizarContenido() {
            generarPostNarrativo();
            generarNuevaImagen();
        }

        // Función para avanzar al siguiente tema en la lista o volver al principio
        function avanzarTema() {
            const selector = document.getElementById('topicSelector');
            let nextIndex = (selector.selectedIndex + 1) % selector.options.length;
            selector.selectedIndex = nextIndex;
            actualizarContenido(); // Llama a la función principal para generar nuevo post e imagen
        }

        async function publicar() {
            const btn = document.getElementById('btnPub');
            const payload = {
                post: document.getElementById('postText').value,
                image_url: document.getElementById('imgPreview').dataset.url
            };

            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            try {
                const res = await fetch(WEBHOOK_PUB, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                if(res.ok) alert("✓ POST ENVIADO A LINKEDINMATIC");
            } catch(e) {
                alert("Error de conexión con el Webhook.");
            } finally {
                btn.innerText = "PUBLICAR EN LINKEDIN";
                btn.disabled = false;
            }
        }

        // ASIGNACIÓN DIRECTA DE EVENTOS
        document.getElementById('btnNewPost').addEventListener('click', avanzarTema); // Nuevo nombre para "Regenerar Post"
        document.getElementById('btnNewImg').addEventListener('click', generarNuevaImagen);
        document.getElementById('btnPub').addEventListener('click', publicar);

        window.onload = () => {
            poblarTemas();
            actualizarContenido();
        };
    </script>
</body>
</html>
