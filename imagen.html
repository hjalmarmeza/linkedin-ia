<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Linkedinmatic v2 - Creador Visual</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: { 'sans': ['Outfit', 'sans-serif'] },
                    colors: {
                        base: '#030712',
                        surface: '#111827',
                        surfaceLight: '#1f2937',
                        accent: '#38bdf8',
                        secondary: '#818cf8',
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.37)',
                        'accent-glow': '0 0 25px rgba(56, 189, 248, 0.3)',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass {
                @apply bg-surface/60 backdrop-blur-2xl border border-white/5 shadow-glass;
            }
            .glass-card {
                @apply bg-surfaceLight/40 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl transition-all duration-300;
            }
            .hide-scrollbar::-webkit-scrollbar {
                display: none;
            }
            .hide-scrollbar {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
        }

        body {
            @apply bg-base text-gray-100 overflow-hidden font-sans;
        }
        
        /* Controles circulares de edición */
        .edit-tool {
            @apply w-[50px] h-[50px] rounded-full bg-surfaceLight border border-white/10 flex items-center justify-center text-gray-300 hover:text-white hover:bg-surfaceLight/80 hover:border-accent transition-all duration-300 cursor-pointer shadow-lg;
        }
        .edit-tool.active {
            @apply bg-accent text-white border-accent shadow-[0_0_15px_rgba(56,189,248,0.4)];
        }
    </style>
</head>

<body class="w-full h-screen flex items-center justify-center relative">

    <!-- Fondo espacial Desktop -->
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none hidden md:block">
        <div class="absolute top-1/4 left-1/4 w-[40%] h-[40%] bg-accent/10 rounded-full blur-[120px] mix-blend-screen">
        </div>
    </div>

    <!-- CONTENEDOR MÓVIL SIMULADO -->
    <div
        class="relative z-10 w-full h-full md:w-[400px] md:h-[800px] md:max-h-[90vh] md:rounded-[40px] md:border-[8px] md:border-gray-900 md:shadow-2xl overflow-hidden bg-base flex flex-col">

        <!-- Header con botón de volver -->
        <header class="glass w-full px-5 py-4 flex justify-between items-center z-20">
            <button onclick="window.location.href='index.html'"
                class="w-10 h-10 rounded-full bg-surfaceLight/50 flex items-center justify-center border border-white/5 hover:bg-white/10 transition-colors cursor-pointer">
                <span class="material-symbols-rounded text-gray-300 text-xl">arrow_back</span>
            </button>
            <h1 class="text-lg font-bold tracking-wide">ESTUDIO <span
                    class="bg-clip-text text-transparent bg-gradient-to-r from-accent to-secondary">VISUAL</span></h1>
            <div
                class="w-10 h-10 rounded-full bg-surfaceLight/50 flex items-center justify-center border border-white/5 shadow-lg">
                <span class="material-symbols-rounded text-accent text-lg">image</span>
            </div>
        </header>

        <!-- Zona Interactiva Principal -->
        <main
            class="flex-1 overflow-y-auto hide-scrollbar px-4 pb-32 pt-5 flex flex-col items-center gap-6 relative z-10 w-full">

            <!-- EL CANVAS DE DISEÑO -->
            <div class="w-full aspect-square bg-surfaceLight/40 rounded-3xl border border-white/10 overflow-hidden relative shadow-[0_10px_40px_rgba(0,0,0,0.5)] flex items-center justify-center"
                id="canvas-container">

                <!-- Feedback Loader de la imagen de IA -->
                <div id="loader"
                    class="absolute inset-0 bg-base/80 flex flex-col items-center justify-center z-20 backdrop-blur-sm transition-opacity duration-300">
                    <span
                        class="material-symbols-rounded animate-spin text-accent text-5xl mb-3">motion_photos_auto</span>
                    <p class="text-[11px] uppercase tracking-[0.2em] font-bold text-gray-300">Sintetizando imagen...</p>
                </div>

                <!-- El Canvas Real Oculto. Lo mostramos luego de cargar -->
                <canvas id="post-canvas" width="1080" height="1080"
                    class="w-full h-full object-cover opacity-0 transition-opacity duration-500"></canvas>
            </div>

            <!-- CONTROLES (Estilo App de Fotos de iPhone) -->
            <div class="w-full flex justify-between items-center px-4 mt-2">
                <button onclick="changeBackground()" class="flex flex-col items-center gap-1 group">
                    <div class="edit-tool group-hover:bg-surfaceLight/80">
                        <span class="material-symbols-rounded text-[22px]">shuffle</span>
                    </div>
                    <span
                        class="text-[10px] uppercase tracking-wider font-semibold text-gray-400 group-hover:text-accent transition">Fondo</span>
                </button>

                <button onclick="toggleOverlay()" class="flex flex-col items-center gap-1 group">
                    <div class="edit-tool active" id="btn-overlay">
                        <span class="material-symbols-rounded text-[22px]">contrast</span>
                    </div>
                    <span
                        class="text-[10px] uppercase tracking-wider font-semibold text-gray-400 group-hover:text-accent transition">Filtro</span>
                </button>

                <button onclick="downloadImage()" class="flex flex-col items-center gap-1 group">
                    <div class="edit-tool group-hover:bg-surfaceLight/80">
                        <span class="material-symbols-rounded text-[22px]">save_alt</span>
                    </div>
                    <span
                        class="text-[10px] uppercase tracking-wider font-semibold text-gray-400 group-hover:text-accent transition">Guardar</span>
                </button>
            </div>
        </main>

        <!-- Botonera Acción Primaria (Nativa) -->
        <div class="absolute bottom-0 w-full glass p-5 pt-8 bg-gradient-to-t from-base via-base to-transparent z-30">
            <button onclick="shareToLinkedIn()"
                class="w-full h-14 rounded-2xl bg-gradient-to-r from-[#0077b5] to-[#00a0dc] text-white font-bold text-[13px] tracking-widest uppercase flex items-center justify-center gap-3 shadow-[0_0_20px_rgba(0,119,181,0.4)] hover:shadow-[0_0_30px_rgba(0,119,181,0.6)] hover:scale-[1.02] transition-all duration-300">
                Llevar a LinkedIn
                <span class="material-symbols-rounded leading-none text-[20px]">ios_share</span>
            </button>
        </div>
    </div>

    <!-- SCRIPT DE INTELIGENCIA DE IMAGEN -->
    <script>
        const canvas = document.getElementById('post-canvas');
        const ctx = canvas.getContext('2d');
        const loader = document.getElementById('loader');

        // Estado del creador
        let currentImageObj = null;
        let useDarkOverlay = true;
        let aiText = "";

        // 1. Inicialización (Extraer de LocaStorage)
        window.onload = () => {
            const savedText = localStorage.getItem('linkedin_v2_text');
            if (savedText) {
                // Sacar el título (ej: 🔥 El secreto que...)
                const parts = savedText.split('\n');
                aiText = parts[0] + "\n" + (parts[1] || "");
            } else {
                aiText = "🔥 Diseñando el Futuro\nDescubre el secreto.";
            }

            // Iniciar búsqueda de imagen
            fetchNewUnsplashImage();
        };

        // 2. Extraer imagen de I.A. Fotográfica usando Interfaz Proxy Seguro
        // 2. Extraer imagen espectacular, Inteligencia Artificial REAL
        async function fetchNewUnsplashImage() {
            loader.style.opacity = '1';
            loader.style.display = 'flex';
            canvas.style.opacity = '0';

            const llmPrompt = localStorage.getItem('linkedin_v2_visual_prompt');
            const fallbackIdea = localStorage.getItem('linkedin_v2_raw_idea') || aiText.substring(0, 50);
            const visualCore = llmPrompt ? llmPrompt : fallbackIdea.replace(/\n/g, ' ').replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ0-9 ]/g, '');
            const siliconKey = localStorage.getItem('silicon_api_key');

            const aiPrompt = `masterpiece, award winning photography, 4k resolution, sharp focus, highly detailed, cinematic dramatic lighting, perfect composition, hyper-realistic, ultra-detailed subject: ${visualCore}`;

            const googleKey = localStorage.getItem('gemini_api_key');
            const statusText = loader.querySelector('p');

            try {
                // ESTRATEGIA ALPHA 2026: GOOGLE GEMINI NATIVE IMAGE (NANO BANANA 2)
                if (googleKey && googleKey.trim().startsWith("AIzaSy")) {
                    console.log("✨ Usando Inteligencia Nativa Google (Gemini 2.5 Flash Image)...");
                    if (statusText) statusText.textContent = "GOOGLE AI: SINTETIZANDO NANO BANANA...";

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image:generateContent?key=${googleKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: aiPrompt }] }]
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        // Google devuelve la imagen en base64 dentro de inlineData
                        const imagePart = data.candidates[0].content.parts.find(p => p.inlineData);
                        if (imagePart) {
                            console.log("✅ Imagen Google generada con éxito.");
                            const base64Image = `data:${imagePart.inlineData.mimeType};base64,${imagePart.inlineData.data}`;
                            return loadImageToCanvas(base64Image);
                        }
                    } else {
                        const errData = await response.json().catch(() => ({}));
                        console.error("❌ Google Image API falló:", errData.error?.message || response.statusText);
                    }
                }

                // ESTRATEGIA A: SILICONFLOW (FLUX.1-SCHNELL)
                if (siliconKey && siliconKey.trim() !== "") {
                    console.log("🚀 Usando SiliconFlow...");
                    if (statusText) statusText.textContent = "SILICON: GENERANDO...";
                    const response = await fetch("https://api.siliconflow.cn/v1/images/generations", {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${siliconKey}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            model: "black-forest-labs/FLUX.1-schnell",
                            prompt: aiPrompt,
                            image_size: "1024x1024",
                            batch_size: 1,
                            seed: Math.floor(Math.random() * 9999999)
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        if (data.images && data.images[0] && data.images[0].url) {
                            return loadImageToCanvas(data.images[0].url);
                        }
                    }
                }

                // ESTRATEGIA A: SILICONFLOW (FLUX.1-SCHNELL)
                if (siliconKey && siliconKey.trim() !== "") {
                    console.log("🚀 Iniciando síntesis con SiliconFlow...");
                    if (statusText) statusText.textContent = "SILICON: GENERANDO...";
                    const response = await fetch("https://api.siliconflow.cn/v1/images/generations", {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${siliconKey}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            model: "black-forest-labs/FLUX.1-schnell",
                            prompt: aiPrompt,
                            image_size: "1024x1024",
                            batch_size: 1,
                            seed: Math.floor(Math.random() * 9999999)
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        if (data.images && data.images[0] && data.images[0].url) {
                            console.log("✅ Imagen generada con éxito.");
                            return loadImageToCanvas(data.images[0].url);
                        }
                    } else {
                        const errData = await response.json().catch(() => ({}));
                        console.error("❌ SiliconFlow falló:", errData.error?.message || response.statusText);
                    }
                }

                // ESTRATEGIA B: UNASPLASH PREMIUM (FALLBACK)
                // Si la IA falla o no hay API Key, usamos Unsplash con búsqueda inteligente.
                console.warn("🛸 Usando Bóveda de Inspiración Unsplash (Fallback de Calidad)...");
                if (statusText) statusText.textContent = "UNSPLASH: BUSCANDO ARTE...";

                // Nota: source.unsplash.com está siendo deprecado, usamos la URL directa de alta resolución optimizada
                const fallbackGallery = [
                    "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1080", // Tech
                    "https://images.unsplash.com/photo-1518005020951-eccb494ad742?q=80&w=1080", // Architecture
                    "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1080", // Cyber
                    "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1080"  // Business
                ];
                const finalFallback = fallbackGallery[Math.floor(Math.random() * fallbackGallery.length)];
                loadImageToCanvas(finalFallback);

            } catch (error) {
                console.error("⚠️ Fallo crítico en generación:", error);
                renderCanvasColorFallback();
                loader.style.display = 'none';
                canvas.style.opacity = '1';
            }
        }

        function loadImageToCanvas(url) {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => {
                currentImageObj = img;
                renderCanvas();
                setTimeout(() => {
                    loader.style.display = 'none';
                    canvas.style.opacity = '1';
                }, 400);
            };
            img.onerror = () => {
                console.error("Error cargando imagen:", url);
                renderCanvasColorFallback();
                loader.style.display = 'none';
                canvas.style.opacity = '1';
            };
            img.src = url;
        }

        function changeBackground() {
            fetchNewUnsplashImage();
        }

        function toggleOverlay() {
            useDarkOverlay = !useDarkOverlay;

            const btn = document.getElementById('btn-overlay');
            if (useDarkOverlay) btn.classList.add('active');
            else btn.classList.remove('active');

            if (currentImageObj) renderCanvas();
            else renderCanvasColorFallback();
        }

        // 3. Renderización en Canvas (El Mini-Photoshop)
        function renderCanvas() {
            // Limpiar
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // A. Dibujar la foto de IA
            // Cubrir toda el área (object-fit: cover logica manual)
            const scale = Math.max(canvas.width / currentImageObj.width, canvas.height / currentImageObj.height);
            const x = (canvas.width / 2) - (currentImageObj.width / 2) * scale;
            const y = (canvas.height / 2) - (currentImageObj.height / 2) * scale;

            ctx.drawImage(currentImageObj, x, y, currentImageObj.width * scale, currentImageObj.height * scale);

            // B. EFECTO CINEMATOGRÁFICO Y TECNOLÓGICO "SCROLL STOPPER"

            // 1. Viñeta Cinematográfica Intensa (Oscurece poderosamente los bordes para obligar al cerebro a mirar al centro)
            const vignette = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, canvas.width * 0.2, // Centro iluminado
                canvas.width / 2, canvas.height / 2, canvas.height * 0.8  // Bordes oscuros profundos
            );
            vignette.addColorStop(0, "rgba(0,0,0,0)");
            vignette.addColorStop(1, "rgba(2, 6, 23, 0.85)"); // Deep Slate cinematic
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Tinte Tecnológico (Da un brillo "Matrix" / "Cyberpunk" constante)
            if (useDarkOverlay) {
                const cyberGradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                cyberGradient.addColorStop(0, "rgba(6, 182, 212, 0.15)"); // Cyan Tech Glow
                cyberGradient.addColorStop(1, "rgba(139, 92, 246, 0.15)"); // Neon Purple Glow
                ctx.fillStyle = cyberGradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // 3. Scanlines Holográficos y Grid Teórico (Muy tenue para que se perciba inconscientemente tecnológico)
            ctx.strokeStyle = "rgba(255,255,255,0.03)";
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.height; i += 8) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // 4. Elementos de Interfaz IA "Cinemática" (Típico de películas de ciencia ficción)
            ctx.fillStyle = "rgba(6, 182, 212, 0.8)"; // Neon Cyan Text
            ctx.font = 'bold 22px "Courier New", monospace';
            ctx.textAlign = 'left';
            ctx.fillText("IA.SYS [ONLINE]", 50, 70);

            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            ctx.font = '18px "Courier New", monospace';
            ctx.fillText("DATA_STK_OVR", 50, 100);

            ctx.textAlign = 'right';
            ctx.fillText("SEQ-994//AI", canvas.width - 50, canvas.height - 50);

            // Cruces de focalización HUD (Cámaras tecnológicas)
            ctx.strokeStyle = "rgba(6, 182, 212, 0.6)";
            ctx.lineWidth = 2;
            const crossSize = 20;
            // Cross 1 (Arriba-Izquierda)
            ctx.beginPath(); ctx.moveTo(40, 50); ctx.lineTo(40 + crossSize, 50); ctx.moveTo(40, 50); ctx.lineTo(40, 50 + crossSize); ctx.stroke();
            // Cross 2 (Abajo-Derecha)
            ctx.beginPath(); ctx.moveTo(canvas.width - 40, canvas.height - 50); ctx.lineTo(canvas.width - 40 - crossSize, canvas.height - 50); ctx.moveTo(canvas.width - 40, canvas.height - 50); ctx.lineTo(canvas.width - 40, canvas.height - 50 - crossSize); ctx.stroke();

            // --- WATERMARK SUTIL (By Hjalmar Meza) ---
            const watermarkText = "By Hjalmar Meza";
            ctx.font = '15px "Inter", sans-serif';
            const tm = ctx.measureText(watermarkText);
            const wWidth = tm.width + 30; // Más compacta
            const wHeight = 36;
            const wx = canvas.width - wWidth - 40; // Esquina inferior derecha
            const wy = canvas.height - wHeight - 40;

            // Pastilla Sutil (Translúcida sin borde neón)
            ctx.fillStyle = "rgba(0, 0, 0, 0.4)"; // Negro suave para contraste, no opaco
            ctx.beginPath();
            ctx.roundRect(wx, wy, wWidth, wHeight, 18); // Redondeo pequeño
            ctx.fill();

            // Texto de la Marca de Agua (Blanco Suave)
            ctx.fillStyle = "rgba(255, 255, 255, 0.75)";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(watermarkText, wx + (wWidth / 2), wy + (wHeight / 2) + 2);

            // Esto convierte incluso una foto aburrida en un marco de una película de tecnología del año 2040.
        }

        function renderCanvasColorFallback() {
            ctx.fillStyle = '#1e293b'; // Slate dark
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // Si falla, mostramos un error visual en el lienzo
            ctx.fillStyle = '#94a3b8';
            ctx.font = 'bold 40px "Outfit", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText("Error al generar imagen de IA.", canvas.width / 2, canvas.height / 2);
            ctx.fillText("Toca 'FONDO' para intentar de nuevo.", canvas.width / 2, (canvas.height / 2) + 60);
        }

        // Función eliminada: queríamos imagen pura sin texto superpuesto

        // 4. Compartir Directo sin Make.com (Funcionalidad Nativa Móvil)
        async function shareToLinkedIn() {
            const dataUrl = canvas.toDataURL("image/jpeg", 0.9);
            const fullPostText = localStorage.getItem('linkedin_v2_text') || 'Nuevo contenido';

            // Adaptar visual de carga temporalmente para mostrar "Publicando..."
            loader.style.opacity = '1';
            loader.style.display = 'flex';
            const originalHTML = loader.innerHTML;

            loader.innerHTML = `
                <span class="material-symbols-rounded animate-bounce text-accent text-5xl mb-3">rocket_launch</span>
                <p class="text-[11px] uppercase tracking-[0.2em] font-bold text-gray-300 px-4 text-center">Inyectando post en LinkedIn...</p>
            `;

            try {
                // El Puente Secreto de Google Apps Script 
                const GAS_URL = "https://script.google.com/macros/s/AKfycbxgYPVfo1XM0Q309jIkYeDD6lSIbOnr1DNLh_9CccQdzl_xiAnKw_77-uQFRq5ghFnBBA/exec";

                // Enviar como texto plano stringificado para evitar bloqueo preflight de navegadores (CORS)
                const payload = JSON.stringify({
                    text: fullPostText,
                    image_base64: dataUrl
                });

                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: payload
                });

                const result = await response.json();

                if (result.success) {
                    alert('🚀 ¡COMPLETADO! Tu post con la imagen ha sido publicado automáticamente en tu Feed de LinkedIn real en 1 solo clic.');
                } else {
                    console.error("Error del backend privado:", result);
                    alert('⚠️ El servidor de Google conectó con LinkedIn pero dio un error publicando: ' + (result.error || 'Autenticación vieja. Vuelve a entrar a tu Web App.'));
                }
            } catch (err) {
                console.error("Fallo de red conectando al puente:", err);
                alert('⚠️ No se pudo conectar a tu automatización. Inténtalo de nuevo.');
            } finally {
                // Devolver todo a la vista normal
                loader.style.display = 'none';
                loader.innerHTML = originalHTML;
            }
        }

        function downloadImage() {
            try {
                const link = document.createElement('a');
                link.download = 'MTC_Generado_' + Date.now() + '.jpg';
                link.href = canvas.toDataURL("image/jpeg", 1.0);
                link.click();
            } catch (err) {
                console.error("No se pudo descargar la imagen. Posible restricción de seguridad:", err);
                alert("Uy, hubo un problema técnico para descargarla directo. Haz click derecho en la imagen y elige 'Guardar Imagen'.");
            }
        }
    </script>
</body>

</html>
